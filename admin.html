<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客后台管理 (静态版)</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        .admin-container { max-width: 1000px; margin: 50px auto; padding: 20px; background: #fff; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .config-container { max-width: 500px; margin: 100px auto; padding: 30px; background: #fff; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .admin-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 20px; margin-bottom: 20px; }
        .article-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .article-table th, .article-table td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        .article-table th { background-color: #f8f9fa; }
        .action-btn { padding: 6px 12px; margin-right: 8px; border: none; border-radius: 4px; cursor: pointer; color: white; }
        .edit-btn { background-color: #4CAF50; }
        .delete-btn { background-color: #f44336; }
        .editor-container { display: none; margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; }
        #config-section { display: none; }
        #admin-section { display: none; }
        .help-text { font-size: 13px; color: #666; margin-top: 5px; }
    </style>
</head>
<body style="background-color: #f4f6f9;">
    
    <!-- 配置页面 -->
    <div id="config-section" class="config-container">
        <h2>后台配置 (Vercel + GitHub)</h2>
        <p style="margin-bottom: 20px; color: #666;">文章将保存到云端数据库，图片将上传到 GitHub 仓库。</p>
        <form id="config-form">
            <div class="form-group">
                <label>管理员密码 (Vercel ADMIN_TOKEN)</label>
                <input type="password" id="vercel-token" required placeholder="你在 Vercel 设置的 ADMIN_TOKEN">
            </div>
            <div class="form-group">
                <label>GitHub 用户名 (用于传图片)</label>
                <input type="text" id="github-owner" required placeholder="例如: zhangsan">
            </div>
            <div class="form-group">
                <label>仓库名 (用于传图片)</label>
                <input type="text" id="github-repo" required placeholder="例如: my-blog">
            </div>
            <div class="form-group">
                <label>GitHub Token (用于传图片)</label>
                <input type="password" id="github-token" required placeholder="请在 GitHub Developer settings 中生成">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">保存配置并进入后台</button>
        </form>
    </div>

    <!-- 管理页面 -->
    <div id="admin-section" class="admin-container">
        <div class="admin-header">
            <h2>博客后台管理</h2>
            <div>
                <button onclick="showArticles()" class="btn btn-primary" id="nav-articles-btn" style="margin-right: 10px;">文章管理</button>
                <button onclick="showComments()" class="btn btn-secondary" id="nav-comments-btn" style="margin-right: 10px;">最新评论</button>
                <a href="index.html" class="btn btn-secondary" style="margin-right: 10px;">返回前台</a>
                <button onclick="clearConfig()" class="btn btn-secondary">重新配置</button>
            </div>
        </div>

        <div id="loading-msg" style="text-align: center; padding: 20px; display: none;">正在从 GitHub 拉取数据，请稍候...</div>

        <!-- 文章管理模块 -->
        <div id="articles-container">
            <div style="margin-bottom: 15px;">
                <button onclick="showEditor()" class="btn btn-primary">发布新文章</button>
            </div>
            <table class="article-table" id="articles-table">
                <thead>
                    <tr>
                        <th>标题</th>
                        <th>分类</th>
                        <th>发布日期</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="articles-tbody">
                    <!-- 动态填充 -->
                </tbody>
            </table>
        </div>

        <!-- 评论管理模块 -->
        <div id="comments-container" style="display: none;">
            <div id="comments-loading-msg" style="text-align: center; padding: 20px; display: none;">正在拉取评论数据，请稍候...</div>
            <table class="article-table" id="comments-table">
                <thead>
                    <tr>
                        <th>头像/昵称</th>
                        <th>评论内容</th>
                        <th>所属文章</th>
                        <th>评论时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="comments-tbody">
                    <!-- 动态填充 -->
                </tbody>
            </table>
        </div>

        <div id="editor-section" class="editor-container">
            <h3 id="editor-title">发布新文章</h3>
            <form id="editor-form">
                <input type="hidden" id="edit-id">
                <div class="form-group">
                    <label>标题</label>
                    <input type="text" id="edit-title" required>
                </div>
                <div class="form-group">
                    <label>分类</label>
                    <div style="display: flex; gap: 10px;">
                        <select id="edit-category" required style="flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; background-color: #f8f9fa;">
                            <option value="" disabled selected>请选择文章分类</option>
                            <option value="技术学习">技术学习</option>
                            <option value="随笔">生活随笔</option>
                        </select>
                        <button type="button" class="btn btn-secondary" onclick="addNewCategoryPrompt()" style="white-space: nowrap;">添加新栏目</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>
                        内容 (支持HTML)
                        <button type="button" id="insert-img-btn" class="btn btn-secondary" style="padding: 2px 8px; font-size: 12px; margin-left: 10px;">插入图片</button>
                        <button type="button" id="insert-code-btn" class="btn btn-secondary" style="padding: 2px 8px; font-size: 12px; margin-left: 5px;">插入代码块</button>
                        <button type="button" id="insert-link-btn" class="btn btn-secondary" style="padding: 2px 8px; font-size: 12px; margin-left: 5px;">插入跳转链接</button>
                        <button type="button" id="insert-bold-btn" class="btn btn-secondary" style="padding: 2px 8px; font-size: 12px; margin-left: 5px; font-weight: bold;">B</button>
                        <button type="button" id="insert-title-btn" class="btn btn-secondary" style="padding: 2px 8px; font-size: 12px; margin-left: 5px;">H3</button>
                        <button type="button" id="insert-red-btn" class="btn btn-secondary" style="padding: 2px 8px; font-size: 12px; margin-left: 5px; color: red;">红字</button>
                        <button type="button" id="insert-blue-btn" class="btn btn-secondary" style="padding: 2px 8px; font-size: 12px; margin-left: 5px; color: #0366d6;">蓝字</button>
                        <button type="button" id="insert-yellow-btn" class="btn btn-secondary" style="padding: 2px 8px; font-size: 12px; margin-left: 5px; color: #e3a600;">黄字</button>
                        <span id="img-upload-status" style="font-size: 12px; color: #666; margin-left: 10px; display: none;"></span>
                    </label>
                    <input type="file" id="image-upload-input" accept="image/*" style="display: none;">
                    <textarea id="edit-content" rows="15" required></textarea>
                </div>
                <div>
                    <button type="submit" class="btn btn-primary" id="save-btn">保存文章到云端数据库</button>
                    <button type="button" class="btn btn-secondary" onclick="hideEditor()">取消</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let articles = [];
        let fileSha = null; // 用于更新文件时所需的 sha 值

        // 初始化
        window.onload = function() {
            const vercelToken = localStorage.getItem('vercel_token');
            const token = localStorage.getItem('github_token');
            const owner = localStorage.getItem('github_owner');
            const repo = localStorage.getItem('github_repo');

            if (vercelToken && token && owner && repo) {
                document.getElementById('config-section').style.display = 'none';
                document.getElementById('admin-section').style.display = 'block';
                document.getElementById('vercel-token').value = vercelToken;
                document.getElementById('github-owner').value = owner;
                document.getElementById('github-repo').value = repo;
                document.getElementById('github-token').value = token;
                fetchArticlesFromVercel();
            } else {
                document.getElementById('config-section').style.display = 'block';
                document.getElementById('admin-section').style.display = 'none';
            }
        };

        // 保存配置并验证
        document.getElementById('config-form').onsubmit = async function(e) {
            e.preventDefault();
            const vercelInput = document.getElementById('vercel-token').value.trim();
            const ownerInput = document.getElementById('github-owner').value.trim();
            const repoInput = document.getElementById('github-repo').value.trim();
            const tokenInput = document.getElementById('github-token').value.trim();
            
            const submitBtn = this.querySelector('button[type="submit"]');
            const originalBtnText = submitBtn.innerText;
            submitBtn.disabled = true;
            submitBtn.innerText = '正在验证配置信息...';

            try {
                // 调用 GitHub API 验证 Token 和仓库权限
                const verifyUrl = `https://api.github.com/repos/${ownerInput}/${repoInput}`;
                const response = await fetch(verifyUrl, {
                    headers: {
                        'Authorization': `token ${tokenInput}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    if (data.permissions && data.permissions.push) {
                        // 验证通过，保存到本地
                        localStorage.setItem('vercel_token', vercelInput);
                        localStorage.setItem('github_owner', ownerInput);
                        localStorage.setItem('github_repo', repoInput);
                        localStorage.setItem('github_token', tokenInput);
                        
                        document.getElementById('config-section').style.display = 'none';
                        document.getElementById('admin-section').style.display = 'block';
                        fetchArticlesFromVercel();
                    } else {
                        alert('验证失败：该 Token 没有对该仓库的写入(push)权限。');
                    }
                } else {
                    alert('验证失败：GitHub 配置不正确。');
                }
            } catch (error) {
                alert('网络错误，无法连接到 GitHub 验证信息。');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = originalBtnText;
            }
        };

        function clearConfig() {
            localStorage.removeItem('vercel_token');
            localStorage.removeItem('github_token');
            localStorage.removeItem('github_owner');
            localStorage.removeItem('github_repo');
            window.location.reload();
        }

        // Base64 编码和解码（支持中文）
        function utf8_to_b64(str) {
            return window.btoa(unescape(encodeURIComponent(str)));
        }

        function b64_to_utf8(str) {
            try {
                return decodeURIComponent(escape(window.atob(str)));
            } catch (e) {
                const binString = window.atob(str);
                const bytes = new Uint8Array(binString.length);
                for (let i = 0; i < binString.length; i++) {
                    bytes[i] = binString.charCodeAt(i);
                }
                return new TextDecoder('utf-8').decode(bytes);
            }
        }

        // 从 Vercel 获取文章
        async function fetchArticlesFromVercel() {
            const url = `https://api.aoiblog.top/api/getArticles`;
            
            document.getElementById('loading-msg').style.display = 'block';
            document.getElementById('articles-table').style.display = 'none';

            try {
                // Vercel Edge Cache 可能对带有随机 query 参数和自定义 headers 的跨域请求进行拦截并返回不带 CORS 头的 500/502
                // 回退到最简单、最兼容的 GET 请求，不带任何可能触发 OPTIONS 预检的自定义 header 和参数
                const response = await fetch(url, {
                    method: 'GET',
                    cache: 'no-store' // 使用标准的 fetch API 禁用缓存，而不是手动拼接时间戳
                });
                if (response.ok) {
                    const data = await response.json();
                    if (data.success) {
                        articles = data.data;
                        
                        // 动态更新分类下拉框
                        const select = document.getElementById('edit-category');
                        const existingCategories = new Set(['技术学习', '随笔', '数据结构与算法']);
                        articles.forEach(article => {
                            if (article.category) {
                                existingCategories.add(article.category);
                            }
                        });
                        
                        // 清空除了第一个提示选项之外的所有选项
                        while (select.options.length > 1) {
                            select.remove(1);
                        }
                        
                        existingCategories.forEach(cat => {
                            const option = document.createElement('option');
                            option.value = cat;
                            option.text = cat;
                            select.add(option);
                        });
                        
                    } else {
                        throw new Error(data.error || '获取失败');
                    }
                } else {
                    throw new Error(`请求失败: ${response.status}`);
                }
                renderTable();
            } catch (error) {
                alert('获取文章数据失败: ' + error.message);
                // 暂时注释掉错误时的自动清除配置，避免稍有网络波动就让用户重新登录
                // clearConfig();
            } finally {
                document.getElementById('loading-msg').style.display = 'none';
                document.getElementById('articles-table').style.display = 'table';
            }
        }

        function renderTable() {
            const tbody = document.getElementById('articles-tbody');
            tbody.innerHTML = '';
            
            const sortedArticles = [...articles].sort((a, b) => new Date(b.date) - new Date(a.date));
            
            sortedArticles.forEach(article => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${article.title}</td>
                    <td>${article.category}</td>
                    <td>${article.date}</td>
                    <td>
                        <button class="action-btn edit-btn" onclick="editArticle('${article.id}')">编辑</button>
                        <button class="action-btn delete-btn" onclick="deleteArticle('${article.id}')">删除</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function showEditor() {
            document.getElementById('editor-section').style.display = 'block';
            document.getElementById('editor-title').innerText = '发布新文章';
            document.getElementById('editor-form').reset();
            document.getElementById('edit-id').value = '';
            document.getElementById('articles-container').style.display = 'none';
        }

        function hideEditor() {
            document.getElementById('editor-section').style.display = 'none';
            document.getElementById('articles-container').style.display = 'block';
        }

        function addNewCategoryPrompt() {
            const newCat = prompt('请输入新栏目名称:');
            if (newCat && newCat.trim()) {
                const select = document.getElementById('edit-category');
                const catName = newCat.trim();
                let exists = false;
                for (let i = 0; i < select.options.length; i++) {
                    if (select.options[i].value === catName) {
                        exists = true;
                        select.selectedIndex = i;
                        break;
                    }
                }
                if (!exists) {
                    const option = document.createElement('option');
                    option.value = catName;
                    option.text = catName;
                    select.add(option);
                    select.selectedIndex = select.options.length - 1;
                }
                // 触发 change 事件以确保任何绑定的监听器都能响应
                select.dispatchEvent(new Event('change'));
            }
        }

        function editArticle(id) {
            const article = articles.find(a => a.id === id);
            if (!article) return;
            
            showEditor();
            document.getElementById('editor-title').innerText = '编辑文章';
            document.getElementById('edit-id').value = article.id;
            document.getElementById('edit-title').value = article.title;
            document.getElementById('edit-category').value = article.category;
            
            let content = article.content;
            const titleMatch = content.match(/^<h2>.*?<\/h2>\n?/);
            if (titleMatch) {
                content = content.replace(titleMatch[0], '');
            }
            
            // 解码 PrismJS 转义，方便在后台编辑
            content = content.replace(/&lt;/g, '<').replace(/&gt;/g, '>');
            
            document.getElementById('edit-content').value = content;
        }

        // 保存/更新到 Vercel (MongoDB)
        async function syncToVercel(articleData) {
            const vercelToken = localStorage.getItem('vercel_token');
            const url = `https://api.aoiblog.top/api/saveArticle`;
            
            try {
                // 如果文章内容包含大量代码或 HTML 标签，可能被 WAF 拦截
                // 使用 JSON 传输时，需要确保内容被正确转义
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${vercelToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ article: articleData })
                });

                if (response.ok) {
                    const data = await response.json();
                    if (data.success) {
                        return true;
                    } else {
                        throw new Error(data.error || '保存失败');
                    }
                } else {
                    throw new Error(`请求失败: ${response.status}`);
                }
            } catch (error) {
                alert('同步到云端失败: ' + error.message);
                return false;
            }
        }

        async function deleteArticle(id) {
            if (confirm('确定要删除这篇文章吗？此操作将直接更新云端数据库。')) {
                const vercelToken = localStorage.getItem('vercel_token');
                document.body.style.cursor = 'wait';
                
                try {
                    const response = await fetch('https://api.aoiblog.top/api/deleteArticle', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${vercelToken}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ id: id })
                    });
                    
                    const data = await response.json();
                    if (data.success) {
                        alert('删除成功！');
                        fetchArticlesFromVercel();
                    } else {
                        alert('删除失败: ' + data.error);
                    }
                } catch (error) {
                    alert('网络错误，删除失败');
                } finally {
                    document.body.style.cursor = 'default';
                }
            }
        }

        // 评论/留言管理功能
        async function fetchComments() {
            document.getElementById('comments-loading-msg').style.display = 'block';
            document.getElementById('comments-table').style.display = 'none';
            try {
                const response = await fetch('https://twikoo.aoiblog.top', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ event: 'GET_RECENT_COMMENTS', accessToken: '' })
                });
                const res = await response.json();
                if (res.data) {
                    renderCommentsTable(res.data);
                }
            } catch (error) {
                alert('拉取评论失败: ' + error.message);
            } finally {
                document.getElementById('comments-loading-msg').style.display = 'none';
                document.getElementById('comments-table').style.display = 'table';
            }
        }

        function renderCommentsTable(comments) {
            const tbody = document.getElementById('comments-tbody');
            tbody.innerHTML = '';
            
            // 按时间倒序
            comments.sort((a, b) => b.created - a.created);

            comments.forEach(comment => {
                const tr = document.createElement('tr');
                const dateStr = new Date(comment.created).toLocaleString();
                
                // 判断是文章评论还是主页留言
                let articleTitle = '';
                let targetUrl = '';
                let typeBadge = '';
                
                // 如果 url 为空、'/'、'/index.html' 或者包含 '#留言'，通常被视为主页留言
                if (!comment.url || comment.url === '/' || comment.url.includes('index.html')) {
                    articleTitle = '博客主页';
                    targetUrl = 'index.html#twikoo-comments';
                    typeBadge = '<span style="background: #e1f5fe; color: #1976d2; padding: 2px 6px; border-radius: 4px; font-size: 12px; margin-right: 5px;">留言板</span>';
                } else {
                    // 查找对应文章标题
                    const article = articles.find(a => a.id === comment.url);
                    articleTitle = article ? article.title : '未知文章';
                    targetUrl = `articles.html?id=${comment.url}#twikoo-comments`;
                    typeBadge = '<span style="background: #e8f5e9; color: #388e3c; padding: 2px 6px; border-radius: 4px; font-size: 12px; margin-right: 5px;">文章评论</span>';
                }
                
                // 去除评论中的 HTML 标签
                const plainComment = comment.commentText || comment.comment.replace(/<[^>]+>/g, '');

                tr.innerHTML = `
                    <td>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <img src="${comment.avatar}" alt="avatar" style="width: 30px; height: 30px; border-radius: 50%;">
                            <span>${comment.nick}</span>
                        </div>
                    </td>
                    <td style="max-width: 250px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" title="${plainComment}">${plainComment}</td>
                    <td>${typeBadge}<a href="${targetUrl}" target="_blank" style="color: #0366d6; text-decoration: none;">${articleTitle}</a></td>
                    <td>${dateStr}</td>
                    <td>
                        <a href="${targetUrl}" target="_blank" class="action-btn edit-btn" style="text-decoration: none; display: inline-block;">前往回复/管理</a>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function showArticles() {
            document.getElementById('articles-container').style.display = 'block';
            document.getElementById('comments-container').style.display = 'none';
            document.getElementById('editor-section').style.display = 'none';
            
            document.getElementById('nav-articles-btn').className = 'btn btn-primary';
            document.getElementById('nav-comments-btn').className = 'btn btn-secondary';
        }

        function showComments() {
            document.getElementById('articles-container').style.display = 'none';
            document.getElementById('comments-container').style.display = 'block';
            document.getElementById('editor-section').style.display = 'none';
            
            document.getElementById('nav-articles-btn').className = 'btn btn-secondary';
            document.getElementById('nav-comments-btn').className = 'btn btn-primary';
            
            fetchComments();
        }

        // 图片上传与插入功能
        document.getElementById('insert-img-btn').addEventListener('click', function() {
            document.getElementById('image-upload-input').click();
        });

        // 插入代码块功能
        document.getElementById('insert-code-btn').addEventListener('click', function() {
            const textarea = document.getElementById('edit-content');
            const startPos = textarea.selectionStart;
            const endPos = textarea.selectionEnd;
            const text = textarea.value;
            
            // 如果有选中的文本，将其包裹在代码块中；否则插入一个空代码块
            let selectedText = text.substring(startPos, endPos);
            
            // 修复头文件消失的问题：将 < 和 > 转义为 HTML 实体
            if (selectedText) {
                selectedText = selectedText.replace(/</g, '&lt;').replace(/>/g, '&gt;');
            }
            
            // 使用 language-none 作为默认，利用 Prism.js 插件显示纯文本，
            // 提示用户可以手动修改 language-xxx 为自己想要的语言，比如 language-cpp
            const codeTemplate = `\n<pre><code class="language-none">\n${selectedText || '// 在这里输入代码'}\n</code></pre>\n`;
            
            textarea.value = text.substring(0, startPos) + codeTemplate + text.substring(endPos);
            
            // 将光标移动到代码块中间，方便直接输入
            const newCursorPos = startPos + codeTemplate.indexOf(selectedText || '// 在这里输入代码');
            const selectionLength = (selectedText || '// 在这里输入代码').length;

        document.getElementById('image-upload-input').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const btn = document.getElementById('insert-img-btn');
            const statusText = document.getElementById('img-upload-status');
            
            btn.disabled = true;
            statusText.style.display = 'inline';
            statusText.innerText = '正在读取图片...';
            statusText.style.color = '#666';

            try {
                const reader = new FileReader();
                reader.onload = async function(event) {
                    try {
                        const base64Content = event.target.result.split(',')[1];
                        
                        const ext = file.name.split('.').pop();
                        const filename = 'img_' + Date.now() + '.' + ext;
                        const path = 'images/' + filename;
                        
                        const owner = localStorage.getItem('github_owner');
                        const repo = localStorage.getItem('github_repo');
                        const token = localStorage.getItem('github_token');
                        
                        const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
                        
                        statusText.innerText = '正在上传到 GitHub...';
                        
                        const response = await fetch(url, {
                            method: 'PUT',
                            headers: {
                                'Authorization': `token ${token}`,
                                'Content-Type': 'application/json',
                                'Accept': 'application/vnd.github.v3+json'
                            },
                            body: JSON.stringify({
                                message: 'Upload image: ' + filename,
                                content: base64Content
                            })
                        });

                        if (response.ok) {
                            // 使用相对路径，为了兼容未来可能的域名变更
                            const imageUrl = `images/${filename}`;
                            const imgTag = `\n<img src="${imageUrl}" alt="图片" style="max-width: 100%;">\n`;
                            
                            const textarea = document.getElementById('edit-content');
                            const startPos = textarea.selectionStart;
                            const endPos = textarea.selectionEnd;
                            const text = textarea.value;
                            
                            textarea.value = text.substring(0, startPos) + imgTag + text.substring(endPos);
                            textarea.selectionStart = textarea.selectionEnd = startPos + imgTag.length;
                            textarea.focus();
                            
                            statusText.innerText = '上传成功！(图片可能需1分钟生效)';
                            statusText.style.color = 'green';
                            setTimeout(() => { statusText.style.display = 'none'; }, 3000);
                        } else {
                            const err = await response.json();
                            throw new Error(err.message || '上传失败');
                        }
                    } catch (err) {
                        statusText.innerText = '上传失败: ' + err.message;
                        statusText.style.color = 'red';
                    } finally {
                        btn.disabled = false;
                        e.target.value = '';
                    }
                };
                reader.readAsDataURL(file);
            } catch (error) {
                statusText.innerText = '发生错误: ' + error.message;
                statusText.style.color = 'red';
                btn.disabled = false;
                e.target.value = '';
            }
        });

        document.getElementById('editor-form').onsubmit = async function(e) {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const title = document.getElementById('edit-title').value;
            const category = document.getElementById('edit-category').value;
            let contentBody = document.getElementById('edit-content').value;
            
            // 核心修复：在提交前，扫描整个文章内容，找到所有的 <code>...</code> 块
            // 并将里面的 < 和 > 进行转义，这样即使是用户手敲的 #include <iostream> 也能被正确保存和显示
            contentBody = contentBody.replace(/<code([^>]*)>([\s\S]*?)<\/code>/g, function(match, attributes, codeContent) {
                // 转义 < 和 >
                const escapedContent = codeContent.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                return `<code${attributes}>${escapedContent}</code>`;
            });

            const fullContent = `<h2>${title}</h2>\n${contentBody}`;
            
            // 重要：获取原文章数据（如果是编辑的话）
            const originalArticle = id ? articles.find(a => a.id === id) : null;
            
            const today = new Date().toISOString().split('T')[0];
            
            let articleData = {
                id: id || 'article_' + Date.now(),
                title: title,
                date: originalArticle ? originalArticle.date : today, // 保留原日期
                modifyDate: today,
                category: category,
                content: fullContent
            };
            if (id) {
                const existing = articles.find(a => a.id === id);
                if (existing) {
                    articleData.date = existing.date;
                }
            }

            const btn = document.getElementById('save-btn');
            btn.disabled = true;
            btn.innerText = '正在同步到云端数据库...';

            const success = await syncToVercel(articleData);

            btn.disabled = false;
            btn.innerText = '保存文章';

            if (success) {
                alert('保存成功！');
                hideEditor();
                fetchArticlesFromVercel();
            } else {
                fetchArticlesFromVercel();
            }
        };
