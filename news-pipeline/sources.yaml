  - id: mit-tr
    name: MIT Technology Review
    type: rss
    url: https://www.technologyreview.com/feed/
    source_type: analysis
    tier: "T1.5"
    credibility: 8
    category: ai
    enabled: true

  # 逐篇 AI 新闻站（实用/产品/硬件向，每篇一事件——能被聚类去重与跨源核验，
  # 不选摘要型 newsletter：那种"每期一条"在事件管线里会变成一坨速览拆不开）
  - id: thedecoder
    name: The Decoder
    type: rss
