  # 限流/封锁）。已加 http_get 重试兜底救偶发；若 source_health 持续 3 天告警，
  # 说明是硬封锁、重试无解，手动改 enabled:false。中文财经"分析深度"暂无免费、
  # 云端可达的等价替代，留作已知缺口。
  - id: ftcn
