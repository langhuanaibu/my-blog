    name: AI HOT 精选
    type: aihot
    url: https://aihot.virxact.com/api/public/items
    source_type: fact
    tier: "T1.5"
    credibility: 8
    category: ai
    enabled: true

  - id: mit-tr
    name: MIT Technology Review
