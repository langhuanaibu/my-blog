  # ---------- 信源扩展终局结论（2026-07-10 盘问定案，避免反复重议） ----------
  # 路线：AIHOT 式逐源直连适配器（fetch_thepaper_list 等），不修 RSSHub 部署、不上 Docker。
  # 自建 Vercel RSSHub 实例只服务已通路由（sciencenet/thepaper·featured/guokr）。
  #  - 微信公众号（青塔/软科/募格/青年志等）：正式关闭，不再评估。wewe-rss 类中继需常驻
  #    服务+人肉续期；AIHOT 168 源里公众号仅 1 个（作者自己的）——连最有动机的人都不翻这堵墙。
  #  - 知乎（热榜/日报）：正式关闭。无登录态全线 401/403，Cookie 供养=同款维护负担。
  #  - 中国青年报(cyol)：判弃记档。无 RSS；zqb.cyol.com 是 JS 壳数字报（rmnew.js 动态加载），
  #    逆向数据端点超出维护预算。青年教育由 澎湃·教育家+果壳+科学网+热榜舆论侧漏 覆盖。
  #  - 界面(jiemian)：判弃记档。站点 JS 渲染、无静态频道导航，教育频道无稳定入口。
  #  - X/推特：不自建。AI 类 X 信号经 AIHOT 精选二手接入（fetch_aihot，其中 ~22% 为 X 条目）。
  #  - 虎嗅快讯/36氪热榜：可取但与已有 36氪主 feed 高度重复、快讯体裁噪音大，不接。
  #  - v2ex/juejin：可取但生活帖/水帖多，不接；「榨信号」阶段若缺程序员处境信号再议。
  #
  # ---------- 第三轮定案追加（2026-07-11 盘问，防重议） ----------
  #  - AI 板块角色翻案：日报 AI 精选每日上限 3 条（config max_per_category），
  #    定位=头条提醒器；AI 深度阅读用户直接看 AIHOT 网站本体。07-10 否决的
  #    「单类精选上限」仅对 ai 类定向翻案，其余类不设上限。
  #  - 2026-07-15 撤销上述 AI 定向上限：max_per_category 当前为空；AI 与其他类目
  #    一样按阈值和分数竞争，仅受全局 pick_max、类目保底及既有评分规则约束。
  #  - ftcn：曾改走 RSSHub 中转；2026-07-16 连续 6 天抓取失败后停用。
  #  - Anthropic：news 进主管线、engineering 进深读（RSSHub anthropic 路由）。
  #  - techcrunch/ars 维持全量 feed：AIHOT 的"窄 feed"原则只对垂直站成立，
  #    本日报 tech 域就是要全量科技新闻，AI 子集已经 aihot 二手到达，不换不加。
  #  - world 四联 wire（bbc-world/guardian/aljazeera/npr）保持：跨源重叠是
  #    evidence 分的燃料不是噪音，不砍。
  #  - 二次元：正式从盲区清单划掉，不再评估。B站热搜舆情侧漏够用；
  #    垂直资讯源均为公众号（已判死路径）。
  #  - zaobao/经济观察报：无公开 RSS（2026-07-11 探测 404），不再追。
  #    yicai 官网 RSS 同样 404；RSSHub 路由曾在第四轮接入，因上游接口长期停更于
  #    2026-07-16 验收停用。
  #
  # ---------- 第四轮定案追加（2026-07-11 晚盘问，防重议） ----------
  #  依据数据：近 6 天精选构成 world 39% 过剩 / finance 7% 最薄 / tech 11% 次薄；
  #  各源性价比（抓取量→精选贡献）见当日盘问记录。
  #  - 36氪：2026-07-16 六日复核为 108 条抓取→6 条精选（5.6%），与财联社·深度
  #    同档，且仍是唯一中文创投源；撤销缓刑并保留。旧样本的“120→≤3”不再成立。
  #  - atlantic 保留：仅存英文深度杂志层，低产（74→4）是分析体裁宿命不是质量问题，
  #    换 New Yorker 一样低产、纯折腾。
  #  - 不加清单：Google AI blog / Chrome DevRel（AI 收缩定位相悖或过于边缘）；
  #    DW德国之声中文 / RFI法广中文 / 台湾报道者 / New Yorker（feed 均实证可达，
  #    但 world/深度分析方向用户明确未选——world 已 39% 过剩）；AP News（feed 已死）。
  #
  # ---------- 第五轮定案追加（2026-07-17 盘问，参照 AIHOT 源体系，防重议） ----------
  #  依据数据：AIHOT 实测 500 条/96 去重源的类型学（X KOL ~60%、媒体 RSS、官方博客/
  #  网页适配器、GitHub Releases、个人博客、公众号 12+）；本站精选构成 07-11~16
  #  world 41% 过剩 / finance 10.7% 最薄 / tech 14.8% 次薄。
  #  - 总边界：AI 类不加源。日报 AI＝头条提醒器，AI 深度用户每天直接读 AIHOT 本体；
  #    照搬其 AI 源（X KOL/厂商博客/AI 媒体）＝自建缩水版 AIHOT，纯重复。
  #    AIHOT 的「一手信源+人肉策展」方法论只移植到非 AI 四类。
  #  - 公众号：维持判死，但事实前提更新——07-10 尾注引用的「AIHOT 168 源里公众号
  #    仅 1 个」已失效（2026-07-17 实测其主 feed 公众号源 12+，厂商官号+创作者号，
  #    卡兹克有常驻服务解决中继）。判死如今唯一支柱是基础设施不兼容：wewe-rss 类
  #    中继需常驻服务+微信读书账号人肉续期，本站是 Vercel Serverless + GitHub
  #    Actions，无常驻环境。未来若重议，论据应从这里出发，别再引旧数据。
  #    替代路线＝公众号型作者的网站镜像（晚点官网适配器等，见 roadmap #9）。
  #  - buzzing.cc 财经中转（Bloomberg/WSJ 标题中文翻译 RSS，AIHOT 用它中转 HN）：
  #    明确不接。标题-only 无正文、第三方单点依赖、T2 可信度，用户未选。
  #  - 雪球·今日话题（RSSHub 路由）：明确不接。散户观点流噪音高于已有源，用户未选。
  #  - society/world 维持现状：society 17.2% 健康且候选（人物/三联/端传媒）多在
  #    判死路径或付费墙；world 41% 过剩，任何 world 向新源默认拒。
  #  - 三项都进深读、不动主管线，且按阮一峰 → 晚点 → 英文财经单源的
  #    顺序分批晋级。英文财经只保留 Noahpinion/Marginal Revolution/Apricitas/
  #    Kyla 四个官方 feed，用 topic_filter: finance 拦截 AI/泛政治偏题文章。
  #    Money Stuff 无官方 RSS，不接第三方镜像；FT Alphaville 与 ftcn 同因排除。
  #    晚点已验证公开 /news/get-news-data JSON 端点，专用适配器固定取 programa=4。
  #    待办细节与验收口径见 docs/news_source_roadmap.md #8-#10。

  # ---------- 舆论源（默认关闭，需要再开） ----------
  - id: reddit-worldnews
    source_family: reddit-worldnews-aggregator
    provenance: aggregated
    name: Reddit r/worldnews
    type: rss
    url: https://www.reddit.com/r/worldnews/.rss
    source_type: opinion
    tier: "T2"
    credibility: 5
    category: world
    enabled: false

# ============================================================
# 舆论热榜源（仅供"舆论观察"模块与 co-occurrence 公众热度加权）
# 热榜词条永不进入主管线聚类/评分——热榜是舆论信号，不是新闻条目。
# type 对应 daily_news.py 的专用适配器（直连公开接口，无 RSSHub/无浏览器）：
#   weibo_hot    genvisitor 访客握手 + weibo.com/ajax/side/hotSearch
#   bilibili_hot api.bilibili.com/x/web-interface/search/square（公开无鉴权）
# 单平台失败只丢当天该平台信号，不影响其余。参数在 config.yaml 的 opinion 块。
# ============================================================
pulse_sources:
  - id: weibo-hot
    name: 微博热搜
    type: weibo_hot
    enabled: true
  - id: bilibili-hot
    name: B站热搜
    type: bilibili_hot
    enabled: true

