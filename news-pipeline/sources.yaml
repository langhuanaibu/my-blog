# ============================================================
# 新闻源配置
# ============================================================
# 每个源的字段：
#   id:          唯一标识
#   name:        显示名称
#   type:        rss | aihot（AI HOT 走专用 API 适配器）
#   url:         RSS 地址或 API 地址
#   source_type: fact(事实源) | analysis(分析源) | opinion(舆论源)
#   tier:        信源层级（参考 AIHOT 的 T1/T1.5/T2 分级）
#                T1   = 权威一线媒体 / 官方一手发布（权重最高）
#                T1.5 = 主流行业媒体 / 专业二手报道
#                T2   = 聚合站 / 社区 / KOL（同样的分要过更高的门槛）
#   credibility: 来源可信度 1-10（参与评分）
#   category:    类别提示 ai/tech/finance/society/world/mixed
#                （仅作提示，最终分类由 LLM 判断）
#   enabled:     true/false，临时停用某个源不用删除
#
# 增删源直接改这个文件即可，不用动代码。
# ============================================================

sources:
  # ---------- AI 官方一手源 ----------
  - id: openai
    name: OpenAI News
    type: rss
    url: https://openai.com/news/rss.xml
    source_type: fact
    tier: "T1"
    credibility: 9
    category: ai
    enabled: true

  - id: huggingface
    name: Hugging Face Blog
    type: rss
    url: https://huggingface.co/blog/feed.xml
    source_type: fact
    tier: "T1"
    credibility: 8
    category: ai
    enabled: true

  - id: deepmind
    name: Google DeepMind Blog
    type: rss
    url: https://deepmind.google/blog/rss.xml
