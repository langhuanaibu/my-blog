  # ---------- 高校 / 青年 / 教育（自建 RSSHub，T2：门槛更高、噪音靠管线压） ----------
  # 这类中文源无官方 RSS，走自建 RSSHub 实例转 RSS。url 用占位符 {rsshub}/路由，
  # 运行时由环境变量 RSSHUB_BASE + RSSHUB_KEY 拼真 URL（地址/密钥不落公开仓库）。
  # 未配置 RSSHUB_BASE 时这些源自动跳过。接入后看 source_health.json，
  # 连续为空/失败的先在浏览器直接访问该路由排查（实例挂 / 路由被目标站反爬）。
  - id: sciencenet
