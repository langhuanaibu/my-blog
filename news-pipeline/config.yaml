# ============================================================
# 每日新闻驾驶舱 - 主配置（云端 CI 版）
# ============================================================
# 注意：本仓库为公开仓库，API key 绝不写在这里。
# 云端由 GitHub Actions 通过环境变量 LLM_API_KEY 注入（存于仓库 Secrets）。
# ============================================================

llm:
  # 任何 OpenAI 兼容接口都可以。示例：
  #   DeepSeek:  base_url: https://api.deepseek.com/v1     model: deepseek-v4-flash
  #   Kimi:      base_url: https://api.moonshot.cn/v1      model: moonshot-v1-32k
  #   智谱:      base_url: https://open.bigmodel.cn/api/paas/v4   model: glm-4-plus
  #   OpenAI:    base_url: https://api.openai.com/v1       model: gpt-4o-mini
  base_url: https://api.deepseek.com/v1
  api_key: ""   # 由环境变量 LLM_API_KEY 注入，不要在这里填
  # 2026-07-11 从 deepseek-chat 别名迁到显式 deepseek-v4-flash：官方公告别名
  # 2026-07-24 停用（deepseek-chat ≙ v4-flash 非思考模式）。V4 裸模型名默认开
  # thinking，下面 extra_body 显式关掉以保持原行为（thinking 模式下 temperature
  # 会静默失效且思考 token 计费）。换其他供应商时把 extra_body 删掉即可。
  model: deepseek-v4-flash
  temperature: 0.3
  # 供应商专有请求体字段，原样透传（daily_news.py 的 LLM 类；不配置则不发）
  extra_body:
    thinking:
      type: disabled
  # 单次请求最大重试次数
  max_retries: 3

# 证据/客观性审计模型。连接三项留空时继承 llm；temperature/max_retries 未写时也继承。
# extra_body 未写时继承 llm；如需为审计模型单独覆盖，可在本块声明完整 extra_body
# （包括声明 {} 以禁用主模型的供应商专有请求体）。
audit_llm:
  base_url: ""
  api_key: ""
  model: ""
  # temperature: 0.0
  # max_retries: 3
  # extra_body:
  #   response_format:
  #     type: json_object

# 客观性发布门控。interim 只保留 prompt 措辞热修与原有事实支撑审计；
# active 才会把全文证据、独立链计数和客观性修复/降级写入公开数据。
# 当前尚未启用 active；验收期请用 CLI --objectivity-shadow。
objectivity:
  mode: interim

# 预筛模型（可选）：先用便宜模型过滤垃圾/无关条目，再交给上面的主模型评分。
# 省钱：主模型只处理幸存者。留空 api_key 则直接复用主模型配置。
prefilter:
  enabled: true
  base_url: ""
  api_key: ""
  model: ""

# ---------- 自建 RSSHub 实例 ----------
# 中文网源（科学网/澎湃/热榜等无官方 RSS）经自建 RSSHub 转 RSS。
# sources.yaml 里写占位符 {rsshub}/路由，运行时由这两个环境变量拼真 URL：
#   RSSHUB_BASE  自建实例地址，如 https://xxx.vercel.app（结尾斜杠会自动去掉）
#   RSSHUB_KEY   实例 ACCESS_KEY（拼成 ?key=...；公开仓库不写死，走 Secret / 本地 env）
# 地址与密钥都不写在本文件里——仅用环境变量注入（沿用 LLM_API_KEY 模式）。
# 未配置 RSSHUB_BASE 时，带 {rsshub} 的源自动跳过、不影响其余源。

# 抓取时间窗口（小时）：只保留最近 N 小时内发布的内容
window_hours: 26

# 普通新闻跨日 URL 去重。RSS 只刷新 pubDate 时不视为新报道；标题或摘要变化后
# 由主模型判断是否存在重大事实增量。账本按日分片，和全部动态保持同一保留周期。
news_dedup:
  seen_keep_days: 90

# 每个源最多取多少条（防止某个源刷屏）
# 下调到 18 以削减 world/舆论刷屏源（半岛/卫报/36氪/华尔街见闻等常年封顶）的
# triage 噪音与 LLM 成本；AI/官方源本就 <18 不受影响；最终精选仍由 min_per_category
# + 评分保底。AIHOT 是 AI 独木、已精选噪音低，在 fetch_aihot 内单独放宽取量、不受此值压制。
max_per_source: 18

# ---------- 精选机制：动态阈值 + 质量下限 + 类目保留席 ----------
# 动态历史不足或关闭时回退 pick_threshold；新闻淡的日子允许少于 pick_min，
# 所有补位仍须达到 effective_threshold - backfill_offset，宁缺毋滥。
pick_threshold: 68   # 静态回退门槛（0-99）
pick_min: 8          # 质量合格前提下尝试达到的最低条数，不硬凑
pick_max: 36         # 每日通读预算软顶；供给不足时少发
secondary_count: 8   # 次级条目条数（折叠在"更多资讯"里，真·漏网提醒，宁少勿杂）

# 每日先计算历史各产出日的事件分 P75，再对最近 window_days 个日值取中位数；
# 只使用当天之前、非纯舆论事件的最终分。账本不足或异常时回退 pick_threshold。
pick_dynamic:
  enabled: true
  window_days: 14
  percentile: 75
  clamp: [66, 82]
  min_history_days: 5
  backfill_offset: 8

# 「全部动态」板块默认展示阈值：管线评分回填后，score 低于此值（或被预筛砍掉
# 而无分）的条目前端默认隐藏，可一键切换显示全部。写进 all/<date>.js 的 min_score。
all_view_min_score: 40

# ---------- 评分公式（代码合成，不让模型打总分） ----------
# 硬约束：事件的所有来源都是舆论源(source_type: opinion)时，最终分封顶在
# pick_threshold-1，且不参与保底补位——舆论源只做线索，不能单独把事件送进精选。
scoring:
  # LLM 只打 5 个维度分项分（0-10），最终分由下面的权重合成：
  #   impact     影响面（波及多少人/多大市场）
  #   novelty    新颖性（是新事还是旧闻翻炒）
  #   substance  实质性（有无真实信息增量，还是口水/软文）
  #   evidence   佐证强度（官方确认/多源交叉 vs 单源爆料）
  #   durability 持续重要性（一周后还重要吗）
  dim_weights:
    impact: 0.30
    novelty: 0.20
    substance: 0.25
    evidence: 0.15
    durability: 0.10
  # 信源层级乘数：二手/社区来源同样的内容，最终分打折
  tier_multipliers:
    T1: 1.0
    T1.5: 0.93
    T2: 0.83
  # 兴趣画像对最终分的影响幅度（±span）：契合分 0-10，5 分中性=×1.0，
  # 10 分=×(1+span)，0 分=×(1-span)。调大让画像更咬动排序。范围 0-0.6。
  fit_span: 0.30

# 兴趣权重：影响排序。1.0 = 中性，调高该类会更容易进精选
# 五类均衡就都保持 1.0
interest_weights:
  ai: 1.0        # AI
  tech: 1.0      # 互联网/科技
  finance: 1.0   # 财经
  society: 1.0   # 社会
  world: 1.0     # 国际

# 每类在精选中的最低保底条数（有内容的前提下）
min_per_category: 4

# 单类精选上限（可选，只列需要封顶的类）。当前无类目封顶；保留通用配置能力，
# 以后如需启用可写成 {ai: 3}。未配置上限时，各类按质量阈值和分数公平竞争。
max_per_category: {}

# ---------- 细粒度主题标签（受控词表） ----------
# 阶段B 让 LLM 从这个词表里给每条精选选 1-2 个标签（不许自创），
# 前端按标签过滤；词表也是后续兴趣画像的稳定统计维度。改词表不用改代码。
topic_tags:
  - 模型发布
  - 产品发布
  - 开源
  - 研究论文
  - 芯片算力
  - 融资并购
  - 财报
  - 监管政策
  - 诉讼纠纷
  - 安全隐私
  - 人事变动
  - 地缘冲突
  - 外交
  - 选举政治
  - 能源
  - 宏观经济
  - 市场行情
  - 加密货币
  - 航天
  - 汽车出行
  - 医疗健康
  - 气候环境
  - 灾害事故
  - 劳动就业
  - 高校青年      # 大学生处境/高校治理/考研就业/青年文化（配合高校源与画像）
  - 教育政策      # 教育部门政策/招考改革/双减类监管（区别于商业向的"监管政策"）
  - 技巧观点      # AI 工具怎么用/工作流实践/方法论（承接 AIHOT 的 tip 分类）

# ---------- 精选长叙述（中文预览页正文） ----------
# 阶段B 给每条精选(pick)额外生成一段中文长叙述 detail，写进 daily js 的 item.detail，
# 前端预览页用它讲清"究竟发生了什么"。只对 pick 生效；more/deep 不带。历史不回填。
# 关掉后阶段B 不再请求该字段（省 token），前端自动降级为短字段。
detail:
  enabled: true
  max_chars: 600   # 目标上限字数（软约束写进 prompt；代码另有硬截断兜底）

# ---------- 英语单词本 ----------
# 每天从精选新闻的英文标题+摘要里挑高价值单词，写 data/vocab/<date>.js（前端按日懒加载）。
# 用户收藏/手动加词写回 data/vocab-book.json，管线次日读它做全量去重 + 补全手动裸词。
# 2026-07-10 用户决定停用：不再每日挑词（省 token）。历史数据与 api/vocab.js 保留，
# 想恢复时把 enabled 改回 true、前端从 git 历史找回单词本界面。
vocab:
  enabled: false
  daily_min: 6    # 每天至少挑几个（够挑的前提下）
  daily_max: 10   # 每天最多挑几个

# ---------- 深度阅读频道 ----------
# 独立于新闻管线：抓 sources.yaml 的 deep_sources，LLM 打"深读价值分"，
# 阈值制 0-3 篇/天（宁缺毋滥），推荐写入 daily js 的 deep 字段。
deep:
  enabled: true
  window_hours: 78      # newsletter 多为周更，窗口放宽到 3 天
  max_per_source: 5
  pick_threshold: 7     # 深读价值分（0-10）过线才推
  pick_max: 3
  seen_keep_days: 60    # 已推荐 URL 记录（data/deep_seen.json）保留天数

# ---------- 今日论文频道（Hugging Face Daily Papers） ----------
# 独立于新闻管线：抓 HF 每日社区精选论文（自带点赞/是否带代码），LLM 按读者
# 学习坐标（前端/全栈/AI应用/自动化）挑 3-4 篇，产出"该读什么/该补什么概念"。
# 论文不是新闻——不进精选评分、自成一块。写 daily js 的 papers 字段。
# 无需 API key（HF 公开接口）；独立故障域，失败只记日志、不阻断每日产出。
papers:
  enabled: true
  lookback_days: 2      # 合并今天+往前 N-1 天的每日精选（HF 当天页面早晨可能偏稀）
  max_candidates: 30    # 按点赞预排序后送 LLM 的候选上限（控 token）
  pick_threshold: 7     # 该读价值分（0-10）过线才推
  pick_max: 4           # 每天最多推几篇
  seen_keep_days: 45    # 已推荐记录（data/papers_seen.json）保留天数

# ---------- 舆论观察（微博/B站热榜 → 传播机制解读） ----------
# 热榜源在 sources.yaml 的 pulse_sources 块（直连公开接口，无 RSSHub）。
# 热榜词条只有两个用途，本身永不成为新闻条目：
#  1) opinion_pulse：LLM 挑 2-3 个值得说的，讲"为何热/群体情绪/平台机制"，
#     写 daily js 的 opinion 字段（前端"舆论观察"板块）
#  2) co-occurrence 暗排序：热榜词条与真新闻事件文本重合时，该事件最终分
#     乘 cooccur_bonus（温和加权，1.0=关闭）
# 独立故障域：热榜抓取/LLM 失败只丢当天舆论板块，不阻断日报。
opinion:
  enabled: true
  pick_max: 3           # 每天最多解读几条
  max_candidates: 50    # 送 LLM 的热榜词条上限（控 token）
  cooccur_bonus: 1.08   # 公众热度乘数

# ---------- RSS 输出 / 搜索索引 ----------
site_url: https://aoiblog.top   # feed 的 channel link 用
feed_days: 7                    # feed.xml 收录最近 N 天精选
search_index_days: 180          # search_index.js 保留天数

# ---------- 跨天事件登记表 ----------
# 管线在精加工后把今日精选与 data/events.json 里的活跃事件匹配，
# 只有通过连续性门和逐行历史验证的可信延续才公开天数与历史进展。
events:
  match_window_days: 14   # 活跃匹配池：last_seen 距今 <=14 天的事件才参与匹配
  archive_days: 7         # 连续 7 天无新进展 -> 归档（不再匹配，复燃按新事件）
  prune_archived_days: 60 # 归档超 60 天从文件中删除，防止无限增长

# ---------- 可信轨迹回滚开关 ----------
trajectory:
  enabled: true           # false: 保留登记表兼容更新，但跳过轨迹生成并隐藏来龙/走向/延续

# ---------- 每周综述（长期判断力沉淀） ----------
# 每周一由主管线额外合成一份"上周综述"：把本周事件连成演进主线，并回收上周综述
# 提出的关注点（兑现/未兑现）。链式——读上周综述 + 本周 daily + events.json。
# 失败只记日志、不阻断每日产出。写 data/weekly/<YYYY-Www>.js（前端周视图顶部渲染）。
weekly:
  enabled: true
  min_daily_count: 5  # 最近完整自然周至少覆盖 5/7 天才生成；缺失日期写入周报元数据
  keep_weeks: 26      # data/weekly/ 保留最近 N 周，防无限增长

# ---------- 发布到博客 ----------
# 云端 CI：数据由 DATA_DIR 环境变量直接写入仓库的 source/news/data/，
# 此处 blog_dir 留空即跳过同步逻辑；commit + push 由 workflow 负责。
publish:
  blog_dir: ""
  git_commit: false
