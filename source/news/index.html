<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日驾驶舱 · Daily Briefing</title>
<style>
:root{
  --bg:#0d1117; --bg2:#161b22; --card:#1c2129; --card-h:#222834;
  --border:#2d333d; --text:#e6e9ef; --text2:#9aa4b2; --text3:#6b7686;
  --accent:#4f8ef7; --accent2:#6ea8ff;
  --ai:#a78bfa; --tech:#38bdf8; --finance:#fbbf24; --society:#fb7185; --world:#34d399;
  --ok:#3fb950; --dev:#4f8ef7; --dispute:#f0883e; --rumor:#f85149;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,"Segoe UI","Microsoft YaHei",sans-serif;font-size:14px;line-height:1.6}
a{color:var(--accent2);text-decoration:none}
a:hover{text-decoration:underline}

.wrap{max-width:1180px;margin:0 auto;padding:0 20px 60px}

/* ---------- header ---------- */
header{border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:10}
.hbar{max-width:1180px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.logo{font-size:19px;font-weight:700;letter-spacing:.5px}
.logo span{color:var(--accent)}
.datenav{display:flex;align-items:center;gap:6px;margin-left:auto}
.datenav button{background:var(--card);border:1px solid var(--border);color:var(--text);padding:5px 11px;border-radius:6px;cursor:pointer;font-size:13px}
.datenav button:hover:not(:disabled){background:var(--card-h);border-color:var(--accent)}
.datenav button:disabled{opacity:.35;cursor:default}
.datenav select{background:var(--card);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:6px;font-size:13px;cursor:pointer}

/* ---------- brief ---------- */
.brief{margin:22px 0 6px;padding:16px 18px;background:linear-gradient(135deg,#1a2233,#161b22);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:8px}
.brief .bt{font-size:12px;color:var(--accent2);font-weight:600;letter-spacing:1px;margin-bottom:6px}
.brief p{color:var(--text);font-size:14.5px}
.meta-line{color:var(--text3);font-size:12.5px;margin:10px 2px 0}
.meta-line b{color:var(--text2);font-weight:600}

/* ---------- filter tabs ---------- */
.tabs{display:flex;gap:8px;margin:20px 0 4px;flex-wrap:wrap}
.tab{padding:6px 15px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;font-size:13px;transition:.15s}
.tab:hover{border-color:var(--accent)}
.tab.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.tab .n{opacity:.7;font-size:11.5px;margin-left:3px}

/* ---------- section ---------- */
.sec-title{margin:26px 0 14px;font-size:16px;font-weight:700;display:flex;align-items:center;gap:10px}
.sec-title::after{content:"";flex:1;height:1px;background:var(--border)}

/* ---------- pick cards ---------- */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:860px){.grid{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 18px 14px;display:flex;flex-direction:column;gap:9px;transition:.15s}
.card:hover{background:var(--card-h);border-color:#3a4250}
.card-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.score{font-weight:800;font-size:15px;min-width:40px;text-align:center;padding:2px 8px;border-radius:6px;background:#0d1117}
.score.hi{color:#ffd166;box-shadow:inset 0 0 0 1px #6b5618}
.score.mid{color:#7ee787;box-shadow:inset 0 0 0 1px #2b5a35}
.score.lo{color:var(--text2);box-shadow:inset 0 0 0 1px var(--border)}
.tag{font-size:11.5px;padding:2px 9px;border-radius:10px;font-weight:600}
.tag.cat-ai{background:#2b2440;color:var(--ai)}
.tag.cat-tech{background:#12303f;color:var(--tech)}
.tag.cat-finance{background:#3a2e10;color:var(--finance)}
.tag.cat-society{background:#3d1d26;color:var(--society)}
.tag.cat-world{background:#123529;color:var(--world)}
.tag.st-已确认{background:#12351c;color:var(--ok)}
.tag.st-发展中{background:#14283f;color:var(--dev)}
.tag.st-有争议{background:#3a2510;color:var(--dispute)}
.tag.st-仅传言{background:#3d1417;color:var(--rumor)}
.tag.stype{background:transparent;border:1px solid var(--border);color:var(--text3);font-weight:400}
.card h3{font-size:15.5px;line-height:1.45;font-weight:700}
.card .sum{color:var(--text);font-size:13.5px}
.kv{font-size:13px;color:var(--text2);padding-left:10px;border-left:2px solid var(--border)}
.kv b{color:var(--text2);font-weight:600}
.kv.why{border-left-color:#6b5618}
.kv.watch{border-left-color:#2d4a6b}
.srcs{display:flex;flex-wrap:wrap;gap:6px 12px;margin-top:auto;padding-top:8px;border-top:1px dashed var(--border);font-size:12px}
.srcs a{color:var(--text2)}
.srcs a:hover{color:var(--accent2)}
.srcs .stp{color:var(--text3);font-size:11px}
.time{color:var(--text3);font-size:11.5px;margin-left:auto}

/* ---------- more list ---------- */
.more-list{display:flex;flex-direction:column;gap:6px}
.row{display:flex;align-items:baseline;gap:10px;padding:9px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;flex-wrap:wrap}
.row:hover{background:var(--card-h)}
.row .score{font-size:12.5px;min-width:34px;padding:1px 6px}
.row .rt{font-weight:600;font-size:13.5px;flex:1;min-width:200px}
.row .rt a{color:var(--text)}
.row .rs{color:var(--text3);font-size:12px}
.toggle-more{margin:14px auto 0;display:block;background:var(--card);border:1px solid var(--border);color:var(--text2);padding:8px 26px;border-radius:20px;cursor:pointer;font-size:13px}
.toggle-more:hover{border-color:var(--accent);color:var(--text)}

.empty{color:var(--text3);text-align:center;padding:60px 0;font-size:14px}
footer{color:var(--text3);font-size:12px;text-align:center;margin-top:50px;line-height:2}
.legend{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
</style>
</head>
<body>
<header>
  <div class="hbar">
    <div class="logo">每日<span>驾驶舱</span> <span style="font-size:12px;color:var(--text3);font-weight:400">Daily Briefing</span></div>
    <div class="datenav">
      <button id="prevBtn">◀ 前一天</button>
      <select id="dateSel"></select>
      <button id="nextBtn">后一天 ▶</button>
    </div>
  </div>
</header>

<div class="wrap">
  <div id="app"><div class="empty">加载中…</div></div>
  <footer>
    <div class="legend">
      <span style="color:var(--ok)">● 已确认</span>
      <span style="color:var(--dev)">● 发展中</span>
      <span style="color:var(--dispute)">● 有争议</span>
      <span style="color:var(--rumor)">● 仅传言</span>
      <span style="color:var(--text3)">｜ 分数 = 重要性 × 来源可信度 × 兴趣权重</span>
    </div>
    <div>个人信息筛选驾驶舱 · 数据由 daily_news.py 每日生成 · 所有条目保留原文链接</div>
  </footer>
</div>

<script src="data/manifest.js"></script>
<script>
const CAT = {ai:"AI", tech:"互联网/科技", finance:"财经", society:"社会", world:"国际"};
const state = {date:null, cat:"all", moreOpen:false};

function esc(s){const d=document.createElement("div");d.textContent=s||"";return d.innerHTML;}
function scoreCls(s){return s>=80?"hi":s>=60?"mid":"lo";}
function fmtTime(iso){
  if(!iso) return "";
  const d=new Date(iso); if(isNaN(d)) return "";
  const now=new Date(), diff=(now-d)/36e5;
  const hm=d.toTimeString().slice(0,5);
  if(diff<1) return Math.max(1,Math.round(diff*60))+" 分钟前";
  if(diff<24) return Math.round(diff)+" 小时前";
  return (d.getMonth()+1)+"/"+d.getDate()+" "+hm;
}

function loadDate(date){
  state.date=date; state.moreOpen=false;
  if(window.NEWS_DATA && window.NEWS_DATA[date]) return render();
  const s=document.createElement("script");
  s.src="data/daily/"+date+".js";
  s.onload=render;
  s.onerror=()=>{document.getElementById("app").innerHTML='<div class="empty">这一天没有数据（data/daily/'+esc(date)+'.js 不存在）</div>';};
  document.head.appendChild(s);
}

function srcLinks(it){
  return it.sources.map(s=>
    `<span><a href="${esc(s.url)}" target="_blank" title="${esc(s.name)}">↗ ${esc(s.name)}</a> <span class="stp">${esc(s.type||"")}</span></span>`
  ).join("");
}

function card(it){
  return `<div class="card">
    <div class="card-top">
      <span class="score ${scoreCls(it.score)}">${it.score}</span>
      <span class="tag cat-${it.category}">${CAT[it.category]||it.category}</span>
      ${it.status?`<span class="tag st-${esc(it.status)}">${esc(it.status)}</span>`:""}
      <span class="tag stype">${esc(it.source_type||"")}</span>
      <span class="time">${fmtTime(it.time)}</span>
    </div>
    <h3>${esc(it.title)}</h3>
    <div class="sum">${esc(it.summary)}</div>
    ${it.why?`<div class="kv why"><b>为什么重要</b> · ${esc(it.why)}</div>`:""}
    ${it.watch?`<div class="kv watch"><b>后续关注</b> · ${esc(it.watch)}</div>`:""}
    <div class="srcs">${srcLinks(it)}</div>
  </div>`;
}

function row(it){
  const main=it.sources[0]||{};
  return `<div class="row">
    <span class="score ${scoreCls(it.score)}">${it.score}</span>
    <span class="tag cat-${it.category}">${CAT[it.category]||it.category}</span>
    ${it.status?`<span class="tag st-${esc(it.status)}">${esc(it.status)}</span>`:""}
    <span class="rt"><a href="${esc(main.url||"#")}" target="_blank">${esc(it.title)}</a></span>
    <span class="rs">${esc(main.name||"")} · ${fmtTime(it.time)}</span>
  </div>`;
}

function render(){
  const d=window.NEWS_DATA[state.date];
  const app=document.getElementById("app");
  if(!d){app.innerHTML='<div class="empty">数据为空</div>';return;}
  const items=d.items||[];
  const flt=it=>state.cat==="all"||it.category===state.cat;
  const picks=items.filter(i=>i.tier==="pick"&&flt(i));
  const mores=items.filter(i=>i.tier==="more"&&flt(i));
  const counts={all:items.length};
  for(const c of Object.keys(CAT)) counts[c]=items.filter(i=>i.category===c).length;

  let h="";
  if(d.brief) h+=`<div class="brief"><div class="bt">今日导语 · ${esc(d.date)}</div><p>${esc(d.brief)}</p></div>`;
  const st=d.stats||{};
  h+=`<div class="meta-line">扫描 <b>${st.sources_count||"?"}</b> 个来源 / <b>${st.raw_count||"?"}</b> 条原始资讯 → 精选 <b>${st.pick_count||picks.length}</b> 条 · 预计阅读 <b>15 分钟</b> · 生成于 ${d.generated_at?fmtTime(d.generated_at):""}</div>`;

  h+='<div class="tabs">'+["all",...Object.keys(CAT)].map(c=>
    `<span class="tab ${state.cat===c?"on":""}" onclick="setCat('${c}')">${c==="all"?"全部":CAT[c]}<span class="n">${counts[c]||0}</span></span>`
  ).join("")+"</div>";

  h+=`<div class="sec-title">🎯 每日精选</div>`;
  h+=picks.length?`<div class="grid">${picks.map(card).join("")}</div>`:'<div class="empty">该分类下今天没有精选</div>';

  if(mores.length){
    h+=`<div class="sec-title">📚 更多资讯 <span style="font-size:12px;color:var(--text3);font-weight:400">(${mores.length} 条)</span></div>`;
    if(state.moreOpen){
      h+=`<div class="more-list">${mores.map(row).join("")}</div>`;
      h+=`<button class="toggle-more" onclick="toggleMore()">收起 ▲</button>`;
    }else{
      h+=`<div class="more-list">${mores.slice(0,5).map(row).join("")}</div>`;
      if(mores.length>5) h+=`<button class="toggle-more" onclick="toggleMore()">展开全部 ${mores.length} 条 ▼</button>`;
    }
  }
  app.innerHTML=h;
  updateNav();
}

function setCat(c){state.cat=c;render();}
function toggleMore(){state.moreOpen=!state.moreOpen;render();}

function updateNav(){
  const M=window.NEWS_MANIFEST||[];
  const i=M.indexOf(state.date);
  document.getElementById("prevBtn").disabled=(i>=M.length-1);
  document.getElementById("nextBtn").disabled=(i<=0);
}

(function init(){
  const M=window.NEWS_MANIFEST||[];
  const sel=document.getElementById("dateSel");
  if(!M.length){document.getElementById("app").innerHTML='<div class="empty">还没有任何日报数据。<br><br>先运行 <code style="color:var(--accent2)">python daily_news.py</code> 生成今天的数据。</div>';return;}
  sel.innerHTML=M.map(d=>`<option value="${d}">${d}</option>`).join("");
  sel.onchange=()=>loadDate(sel.value);
  document.getElementById("prevBtn").onclick=()=>{const i=M.indexOf(state.date);if(i<M.length-1){sel.value=M[i+1];loadDate(M[i+1]);}};
  document.getElementById("nextBtn").onclick=()=>{const i=M.indexOf(state.date);if(i>0){sel.value=M[i-1];loadDate(M[i-1]);}};
  loadDate(M[0]);
})();
</script>
</body>
</html>
