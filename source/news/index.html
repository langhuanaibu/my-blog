/* ---------- 周视图（纯前端聚合近 7 天 + 本周事件线） ---------- */
function loadDates(dates){
  return Promise.all(dates.map(dt=>new Promise(res=>{
    if(window.NEWS_DATA&&window.NEWS_DATA[dt]) return res();
    const s=document.createElement("script");
    s.src="data/daily/"+dt+".js";
    s.onload=res; s.onerror=res;
    document.head.appendChild(s);
  })));
}
function loadWkScript(src){
  return new Promise(res=>{
    const s=document.createElement("script");
    s.src=src; s.onload=()=>res(true); s.onerror=()=>res(false);
    document.head.appendChild(s);
  });
}
async function loadWeekly(){
  // 取最新一周综述（即"上周综述"）；无 manifest / 无数据一律静默返回 null
  if(!window.WEEKLY_MANIFEST) await loadWkScript("data/weekly/manifest.js");
  const wk=(window.WEEKLY_MANIFEST||[])[0];
  if(!wk) return null;
  if(!(window.WEEKLY_DATA&&window.WEEKLY_DATA[wk])) await loadWkScript("data/weekly/"+wk+".js");
  return (window.WEEKLY_DATA||{})[wk]||null;
}
function renderWeekly(syn){
  if(!syn) return "";
  let h=`<div class="sec-title">上周综述 <span style="font-size:12px;color:var(--text3);font-weight:400">${esc(syn.week||"")}${syn.range?` · ${esc(syn.range.start)} ~ ${esc(syn.range.end)}`:""}</span></div><div class="wk-syn">`;
  for(const t of (syn.threads||[])){
    h+=`<div class="wk-thread"><div><span class="tag dir-${esc(t.direction||"推进")}">${esc(t.direction||"")}</span> <b>${esc(t.title||"")}</b></div>${t.one_liner?`<div class="tl">${esc(t.one_liner)}</div>`:""}${t.detail?`<div class="dt">${esc(t.detail)}</div>`:""}</div>`;
  }
  if((syn.watch_recap||[]).length){
    h+=`<div class="wk-sub">🎯 待验证回收</div>`;
    for(const r of syn.watch_recap){
      h+=`<div class="wk-recap"><span class="tag rc-${esc(r.status||"未兑现")}">${esc(r.status||"")}</span><span>${esc(r.prior||"")}</span>${r.note?`<span class="note">— ${esc(r.note)}</span>`:""}</div>`;
    }
  }
  if((syn.outlook||[]).length){
    h+=`<div class="wk-sub">🔭 下周关注</div><div class="wk-outlook">${syn.outlook.map(o=>esc(o)).join("<br>")}</div>`;
  }
  return h+`</div>`;
}
function toggleView(){
  state.view=state.view==="week"?"day":"week";
  document.getElementById("viewBtn").textContent=state.view==="week"?"📅 日视图":"🗓 周视图";
  updateTabs();
  if(state.view==="week") renderWeek(); else render();
}
async function renderWeek(){
  const app=document.getElementById("app");
  const dates=(window.NEWS_MANIFEST||[]).slice(0,7);
  if(!dates.length){app.innerHTML='<div class="empty">还没有数据</div>';return;}
  app.innerHTML='<div class="empty">加载本周数据…</div>';
  await loadDates(dates);
  // 顶部：上周综述（趋势连线 + 待验证回收）；无数据时静默降级为原周视图
  let synHtml="";
  try{ synHtml=renderWeekly(await loadWeekly()); }catch(e){}
  let h=synHtml+`<div class="sec-title">本周概览 <span style="font-size:12px;color:var(--text3);font-weight:400">${esc(dates[dates.length-1])} ~ ${esc(dates[0])} · 每日 Top3</span></div>`;
  for(const dt of dates){
    const d=window.NEWS_DATA[dt];
    if(!d) continue;
    const top=(d.items||[]).filter(i=>i.tier==="pick").sort((a,b)=>(b.score||0)-(a.score||0)).slice(0,3);
    h+=`<div class="wk-day"><div class="wk-date" onclick="gotoDay(${jsArg(dt)})">${esc(dt)} ▸</div><div class="more-list">${top.map(row).join("")}</div></div>`;
  }
  // 本周事件线：events.json 拉不到时静默隐藏
  try{
    const resp=await fetch("data/events.json");
    if(resp.ok){
      const reg=await resp.json();
      const win=new Set(dates);
      const evs=(reg.events||[]).filter(e=>{
        const ds=new Set((e.history||[]).map(x=>x.date));
        return ds.size>=2&&[...ds].some(x=>win.has(x));
      });
      if(evs.length){
        h+=`<div class="sec-title">本周事件线 <span style="font-size:12px;color:var(--text3);font-weight:400">(${evs.length} 条跨天事件)</span></div>`;
        h+=evs.map(e=>{
          const days=new Set((e.history||[]).map(x=>x.date)).size;
          const hist=(e.history||[]).slice(-7).reverse();
          return `<div class="trk open">
            <div class="trk-top" onclick="toggleTrk(this)">
              <span class="tag day">📅 第${days}天</span>
              <span class="tag cat-${esc(e.category)}">${CAT[e.category]||esc(e.category)}</span>
              <b>${esc(e.title)}</b>
              ${e.pinned?'<span class="tag stype">📌 已钉选</span>':""}
              <span class="trk-upd">${e.status==="active"?"进行中":"已归档"}</span>
            </div>
            <div class="trk-hist">${hist.map(x=>`<div><span class="eh-d">${esc(x.date)}</span>${esc(x.summary)}</div>`).join("")}</div>
          </div>`;
        }).join("");
      }
    }
  }catch(e){}
  if(state.view!=="week") return;   // 加载期间用户已切回日视图
  app.innerHTML=h;
  updateNav();
}
function gotoDay(dt){
  state.view="day";
  document.getElementById("viewBtn").textContent="🗓 周视图";
  updateTabs();
  // 从主题/收藏视图跳出时清掉 ?view=，避免刷新/分享回到该视图而非所看的那天
  if(["topics","favs"].includes(new URLSearchParams(location.search).get("view")))
    history.replaceState({},"","?date="+encodeURIComponent(dt));
  const sel=document.getElementById("dateSel");
  if([...sel.options].some(o=>o.value===dt)) sel.value=dt;
  loadDate(dt);
}

/* ---------- 精选跨天流：时间轴 + 每日折叠 + 当前热点 + 页内检索 ---------- */
const feed={days:5,q:"",open:{}};

function tlTime(iso){
  const d=new Date(iso);
  return isNaN(d)?"":d.toTimeString().slice(0,5);
}
function feedDayOpen(dt){
  if(dt in feed.open) return feed.open[dt];
  return dt===(feed.latestDate||(window.NEWS_MANIFEST||[])[0]);   // 默认只展开时间轴最新一天
}
function feedToggleDay(dt){feed.open[dt]=!feedDayOpen(dt);renderPicksFeed();}
function feedMore(){feed.days+=5;renderPicksFeed();}
function ensureIndexP(){return new Promise(res=>ensureIndex(res));}
function applyHighlight(){
  if(!state.pendingHighlight) return;
  const el=document.querySelector(`[data-id="${CSS.escape(state.pendingHighlight)}"]`);
  state.pendingHighlight=null;
  if(el){
    el.scrollIntoView({block:"center"});
    el.classList.add("hl");
    setTimeout(()=>el.classList.remove("hl"),2600);
  }
}

// 当前热点：近 3 天精选按「独立信源数 × 时间衰减」排序（AIHOT 口径），
// 多源事件自然浮上，单源硬新闻靠高分兜底；不足 2 条整个榜自动隐藏。
function hotListHtml(rows){
  const now=Date.now(), cands=[];
  const recent=[...new Set(rows.map(r=>r.reportDate))].sort().reverse().slice(0,3);
  for(const g of NewsTimeline.groupHotEvents(rows.filter(r=>recent.includes(r.reportDate)))){
    const {item:it,reportDate:dt}=g.latest, srcN=g.sourceCount;
    if(srcN<2&&(+it.score||0)<90) continue;
    const ageH=Math.max(0,(now-new Date(it.time).getTime())/36e5);
    const pd=NewsTimeline.publishedDate(it,dt).date;
    cands.push({it,dt,pd,srcN,hot:Math.max(srcN,1)*Math.pow(.5,ageH/36)});
  }
  cands.sort((a,b)=>b.hot-a.hot);
  const top=cands.slice(0,6);
  if(top.length<2) return "";
  return `<div class="hotbox"><div class="hot-h">🔥 当前热点<span class="n">多信源热度 · 随时间消退</span></div>`
    +top.map((c,i)=>`<div class="hot-row" onclick="hotJump(${jsArg(c.pd)},${jsArg(refOf(c.it))})">
      <span class="hot-no n${Math.min(i+1,4)}">${i+1}</span>
      <span class="hot-t">${esc(c.it.title)}</span>
      <span class="hot-m">${c.srcN} 个信源 · ${fmtTime(c.it.time)}</span>
    </div>`).join("")+`</div>`;
}
function hotJump(dt,ref){
  feed.open[dt]=true;
  state.pendingHighlight=ref;
  renderPicksFeed();
}

// 主题页小类入口：以 tag: 语法进入精选检索流
function openTagFeed(tag){
  feed.q="tag:"+tag;
  if(state.view!=="picks"){
    state.view="picks";
    if(location.search) history.pushState({},"",location.pathname);
  }
  renderPicksFeed();
}

async function renderPicksFeed(){
  const app=document.getElementById("app");
  const M=window.NEWS_MANIFEST||[];
  if(!M.length){app.innerHTML='<div class="empty">还没有数据</div>';updateNav();return;}
  const q=feed.q.trim().toLowerCase();
  const HID=LS.get("news_hidden");
  const catFlt=r=>state.cat==="all"||r===state.cat;
  let h=`<div class="sec-title">精选 <span style="font-size:12px;color:var(--text3);font-weight:400">(跨天时间轴 · 最新在上 · 点日期展开/收起)</span></div>`;
  h+=`<div class="feed-bar"><input id="feedSearch" placeholder="🔍 检索精选历史（近 180 天标题/标签，支持 tag:标签名）" value="${esc(feed.q)}" autocomplete="off">${feed.q?`<span class="feed-clear" onclick="feed.q='';renderPicksFeed()">✕ 清空</span>`:""}</div>`;
  h+='<div class="tabs">'+["all",...Object.keys(CAT)].map(c=>
    `<span class="tab ${state.cat===c?"on":""}" onclick="setCat('${c}')">${c==="all"?"全部":CAT[c]}</span>`
  ).join("")+"</div>";

  if(q){
    // ---- 检索模式：搜索索引全历史匹配，命中日懒加载后成流 ----
    app.innerHTML='<div class="empty">检索中…</div>';
    await ensureIndexP();
    if(state.view!=="picks"||feed.q.trim().toLowerCase()!==q) return;
    let rows=(window.NEWS_INDEX||[]).filter(r=>r[2]==="pick"&&catFlt(r[3]));
    if(q.startsWith("tag:")){
      const tg=q.slice(4).trim();
      rows=rows.filter(r=>(r[5]||"").toLowerCase().split("|").includes(tg));
    }else{
      const terms=q.split(/\s+/);
      rows=rows.filter(r=>terms.every(t=>((r[4]||"")+" "+(r[5]||"")).toLowerCase().includes(t)));
    }
    const byReport={};
    for(const r of rows)(byReport[r[0]]=byReport[r[0]]||[]).push(r[1]);
    const hitDates=Object.keys(byReport).sort().reverse();
    const shownDates=hitDates.slice(0,30);   // 上限 30 个日报文件防一次性加载过多
    await loadDates(shownDates);
    if(state.view!=="picks"||feed.q.trim().toLowerCase()!==q) return;
    state.itemsById={};
    const raw=[];
    for(const dt of shownDates){
      const d=window.NEWS_DATA[dt];
      if(!d) continue;
      const ids=new Set(byReport[dt]);
      for(const it of (d.items||[])) if(ids.has(it.id)&&!HID[dt+":"+it.id]) raw.push({reportDate:dt,item:it});
    }
    const hits=NewsTimeline.timelineRows(raw), byDate={};
    for(const row of hits){
      row.item._date=row.reportDate;
      state.itemsById[refOf(row.item)]=row.item;
      (byDate[row.publishedDate]=byDate[row.publishedDate]||[]).push(row);
    }
    let n=0;
    for(const dt of Object.keys(byDate).sort().reverse()){
      const dayRows=byDate[dt]; n+=dayRows.length;
      h+=`<div class="feed-day">${esc(dt)}<span class="n">${dayRows.length} 条命中</span></div>`;
      h+=`<div class="tl">${dayRows.map(r=>`<div class="tl-item"><span class="tl-time">${tlTime(r.item.time)}${r.timeUncertain?' ?':''}</span>${r.isContinuation?'<span class="tl-badge">持续事件</span>':''}${card(r.item)}</div>`).join("")}</div>`;
    }
    h+=n?"":'<div class="empty">没有命中的精选条目</div>';
    if(hitDates.length>shownDates.length)
      h+=`<div class="empty" style="padding:20px 0">另有 ${hitDates.length-shownDates.length} 天更早的命中未展示，请细化关键词</div>`;
  }else{
    // ---- 时间轴模式：按天分组，今天展开、历史折叠 ----
    const dates=M.slice(0,feed.days);
    app.innerHTML='<div class="empty">加载精选流…</div>';
    await loadDates(dates);
    if(state.view!=="picks"||feed.q) return;
    state.itemsById={};
    const raw=[], rawAll=[];
    for(const dt of dates){
      const d=window.NEWS_DATA[dt];
      if(!d) continue;
      for(const it of (d.items||[])){
        if(it.tier!=="pick") continue;
        if(HID[dt+":"+it.id]) continue;
        it._date=dt;
        state.itemsById[refOf(it)]=it;
        rawAll.push({reportDate:dt,item:it});
        if(state.cat==="all"||it.category===state.cat) raw.push({reportDate:dt,item:it});
      }
    }
    h+=hotListHtml(rawAll);
    const timeline=NewsTimeline.timelineRows(raw), byDate={};
    for(const row of timeline){
      row.item._date=row.reportDate;
      state.itemsById[refOf(row.item)]=row.item;
      (byDate[row.publishedDate]=byDate[row.publishedDate]||[]).push(row);
    }
    feed.latestDate=Object.keys(byDate).sort().reverse()[0]||null;
    for(const dt of Object.keys(byDate).sort().reverse()){
      const dayRows=byDate[dt];
      const open=feedDayOpen(dt);
      h+=`<div class="feed-day clk" onclick="feedToggleDay(${jsArg(dt)})">${open?"▾":"▸"} ${esc(dt)}<span class="n">${dayRows.length} 条精选</span></div>`;
      if(open) h+=`<div class="tl">${dayRows.map(r=>`<div class="tl-item"><span class="tl-time">${tlTime(r.item.time)}${r.timeUncertain?' ?':''}</span>${r.isContinuation?'<span class="tl-badge">持续事件</span>':''}${card(r.item)}</div>`).join("")}</div>`;
    }
    if(feed.days<M.length)
      h+=`<button class="toggle-more" onclick="feedMore()">加载更早 5 天 ▼</button>`;
  }
  app.innerHTML=h;
  const fs=document.getElementById("feedSearch");
  if(fs){
    fs.oninput=()=>{feed.q=fs.value;feed._focus=true;clearTimeout(feed._t);feed._t=setTimeout(renderPicksFeed,300);};
    if(feed._focus){fs.focus();fs.setSelectionRange(fs.value.length,fs.value.length);feed._focus=false;}
  }
  updateNav();
  applyHighlight();
}

/* ---------- 全部动态：全量轻档 + 评分过滤 + 分类 ---------- */
const allFeed={days:7,cat:"all",showAll:false};
function setAllCat(c){allFeed.cat=c;renderAllFeed();}
function allToggleShow(){allFeed.showAll=!allFeed.showAll;renderAllFeed();}
function allMore(){allFeed.days+=7;renderAllFeed();}
function allRow(r){
  const sc=(typeof r.score==="number")?`<span class="score ${scoreCls(r.score)}">${r.score}</span>`:"";
  return `<div class="row">${sc}
    <span class="tag cat-${esc(r.c)}">${CAT[r.c]||esc(r.c||"?")}</span>
    <span class="rt"><a href="${esc(safeUrl(r.u))}" target="_blank" rel="noopener">${esc(r.t)}</a></span>
    <span class="rs">${esc(r.s||"")} · ${fmtTime(r.time)}</span>
  </div>`;
}
async function renderAllFeed(){
  const app=document.getElementById("app");
  app.innerHTML='<div class="empty">加载全量档…</div>';
  if(!window.ALL_MANIFEST) await loadWkScript("data/all/manifest.js");
  if(state.view!=="all") return;
  const M=window.ALL_MANIFEST||[];
  if(!M.length){
    app.innerHTML='<div class="empty">全量留档还没有数据——管线下次运行起，窗口内的全部抓取条目（未经筛选）会记录在这里</div>';
    updateNav();return;
  }
  const dates=M.slice(0,allFeed.days);
  await Promise.all(dates.map(dt=>
    (window.NEWS_ALL&&window.NEWS_ALL[dt])?Promise.resolve():loadWkScript("data/all/"+dt+".js")));
  if(state.view!=="all") return;
  let h=`<div class="sec-title">全部动态 <span style="font-size:12px;color:var(--text3);font-weight:400">(窗口内全部抓取条目 · 评分过线才默认展示 · 保留 90 天)</span></div>`;
  h+='<div class="tabs">'+["all",...Object.keys(CAT)].map(c=>
    `<span class="tab ${allFeed.cat===c?"on":""}" onclick="setAllCat('${c}')">${c==="all"?"全部":CAT[c]}</span>`
  ).join("")
  +`<span class="tab ${allFeed.showAll?"on":""}" style="margin-left:auto" onclick="allToggleShow()" title="低于阈值或未参与评分（被预筛砍掉）的条目默认隐藏">${allFeed.showAll?"✓ 含低分/未评分":"显示全部（含低分/未评分）"}</span></div>`;
  for(const dt of dates){
    const d=(window.NEWS_ALL||{})[dt];
    if(!d) continue;
    const all=(d.items||[]).filter(r=>allFeed.cat==="all"||r.c===allFeed.cat);
    const minScore=+d.min_score||40;
    const scored=(d.items||[]).some(r=>typeof r.score==="number");
    let rows=all, hidden=0;
    if(scored&&!allFeed.showAll){
      rows=all.filter(r=>typeof r.score==="number"&&r.score>=minScore);
      hidden=all.length-rows.length;
    }
    h+=`<div class="feed-day">${esc(dt)}<span class="n">${rows.length} 条${scored?"":" · 未回填评分，全部显示"}</span></div>`;
    if(rows.length) h+=`<div class="more-list">${rows.map(allRow).join("")}</div>`;
    if(hidden>0) h+=`<div class="hidden-bar">已隐藏 ${hidden} 条低分/未评分 · <a onclick="allToggleShow()">显示</a></div>`;
    if(!rows.length&&!hidden) h+='<div class="empty" style="padding:14px 0">该分类下这天没有条目</div>';
  }
  if(allFeed.days<M.length)
    h+=`<button class="toggle-more" onclick="allMore()">加载更早 ▼</button>`;
  app.innerHTML=h;
  updateNav();
}

/* ---------- 主 Tab 导航（精选 / 全部动态 / 日报 / 主题） ---------- */
function updateTabs(){
  const map={picks:"picks",all:"all",topics:"topics",favs:"favs"};
  const active=map[state.view]||"day";   // day/week/detail 都归日报 Tab
  document.querySelectorAll(".mtab").forEach(t=>t.classList.toggle("on",t.dataset.v===active));
  const dc=document.getElementById("dayCtrls");
  if(dc) dc.style.display=active==="day"?"flex":"none";
}
function switchTab(v){
  if(v==="topics"){if(state.view!=="topics")enterTopics(true);return;}
  if(v==="favs"){if(state.view!=="favs")enterFavs(true);return;}
  if(v==="picks"){
    if(state.view==="picks")return;
    state.view="picks";
    if(location.search)history.pushState({},"",location.pathname);
    renderPicksFeed();return;
  }
  if(v==="all"){
    if(state.view==="all")return;
    state.view="all";
    if(location.search)history.pushState({},"",location.pathname);
    renderAllFeed();return;
  }
  // 日报：已在日报族（日/周/详情/单词本）则不动
  if(!["day","week","detail"].includes(state.view))
    gotoDay(state.date||(window.NEWS_MANIFEST||[])[0]);
}

/* ---------- 主题视图（events.json 跨天事件登记册的一等入口） ---------- */
function enterTopics(push){
  state.view="topics";
  if(push) history.pushState({v:"topics"},"","?view=topics");
  document.getElementById("viewBtn").textContent="🗓 周视图";
  updateTabs();
  renderTopics();
}
async function renderTopics(){
  const app=document.getElementById("app");
  app.innerHTML='<div class="empty">加载主题数据…</div>';
  let reg=state.topicsReg;
  if(!reg){
    try{
      const r=await fetch("data/events.json");
      if(r.ok) reg=state.topicsReg=await r.json();
    }catch(e){}
  }
  if(state.view!=="topics") return;   // 加载期间用户已切走
  const evs=(reg&&reg.events)||[];
  const days=e=>new Set((e.history||[]).map(x=>x.date)).size;
  // 分组：📌追踪中(钉选且活跃) / 🔥进行中(活跃且≥2天) / 🗄已归档(≥2天)。
  // 单日未钉选事件不展示——那只是某天的精选，还没长成"主题"。
  const pinned=evs.filter(e=>e.pinned&&e.status==="active");
  const running=evs.filter(e=>!e.pinned&&e.status==="active"&&days(e)>=2);
  const archived=evs.filter(e=>e.status==="archived"&&days(e)>=2);
  const byRecent=(a,b)=>(b.last_seen||"").localeCompare(a.last_seen||"")||days(b)-days(a);
  pinned.sort(byRecent);running.sort(byRecent);archived.sort(byRecent);
  const card=(e,open)=>{
    const n=days(e);
    const hist=(e.history||[]).slice(-14).reverse();
    return `<div class="trk ${open?"open":""}">
      <div class="trk-top" onclick="toggleTrk(this)">
        <span class="tag day">📅 ${n}天</span>
        <span class="tag cat-${esc(e.category)}">${CAT[e.category]||esc(e.category)}</span>
        <b>${esc(e.title)}</b>
        ${e.pinned?'<span class="tag stype">📌 追踪中</span>':""}
        <span class="trk-upd">${esc(e.first_seen||"")} ~ ${esc(e.last_seen||"")}${e.status==="archived"?" · 已归档":""}</span>
        ${TOKEN?`<span class="act" onclick="event.stopPropagation();topicTrack(${jsArg(e.event_id)})">${e.pinned?"取消追踪":"📌 追踪"}</span>`:""}
      </div>
      <div class="trk-hist">${hist.map(x=>`<div><span class="eh-d" style="cursor:pointer" onclick="gotoDay(${jsArg(x.date)})" title="跳到这一天">${esc(x.date)}</span>${esc(x.summary)}</div>`).join("")}</div>
    </div>`;
  };
  let h=`<div class="sec-title">主题 <span style="font-size:12px;color:var(--text3);font-weight:400">(跨天事件线 · 点卡片展开进展 · 点日期跳到当天)</span></div>`;
  if(pinned.length) h+=`<div class="sec-title" style="font-size:14px">📌 追踪中 (${pinned.length})</div>`+pinned.map(e=>card(e,true)).join("");
  if(running.length) h+=`<div class="sec-title" style="font-size:14px">🔥 进行中 (${running.length})</div>`+running.map(e=>card(e,false)).join("");
  if(archived.length) h+=`<div class="sec-title" style="font-size:14px">🗄 已归档 (${archived.length})</div>`+archived.map(e=>card(e,false)).join("");
  if(!pinned.length&&!running.length&&!archived.length)
    h+='<div class="empty">还没有跨天主题——事件连续出现 2 天以上才会形成主题线</div>';
  h+=await topicMapHtml();
  if(state.view!=="topics") return;   // 索引加载期间用户已切走
  app.innerHTML=h;
  updateNav();
}

// 题材地图：大类（手工分组）→ 小类（管线受控 topic_tags），条数统计自
// 180 天搜索索引；点小类进入精选页的 tag: 检索流。未分组的新标签兜底进「其他」。
const TOPIC_GROUPS=[
  ["模型与产品","模型发布,产品发布,开源,芯片算力"],
  ["研究与前沿","研究论文,技巧观点,航天,医疗健康"],
  ["资本与市场","融资并购,财报,市场行情,加密货币,宏观经济,能源"],
  ["政策与治理","监管政策,诉讼纠纷,安全隐私,人事变动,教育政策"],
  ["国际与地缘","地缘冲突,外交,选举政治"],
  ["社会与生活","灾害事故,劳动就业,高校青年,气候环境,汽车出行"]
].map(([g,tags])=>[g,tags.split(",")]);

async function topicMapHtml(){
  await ensureIndexP();
  const counts={};
  for(const r of (window.NEWS_INDEX||[])){
    if(r[2]!=="pick") continue;
    for(const t of (r[5]||"").split("|")) if(t) counts[t]=(counts[t]||0)+1;
  }
  if(!Object.keys(counts).length) return "";
  const grouped=new Set(TOPIC_GROUPS.flatMap(([,tags])=>tags));
  const others=Object.keys(counts).filter(t=>!grouped.has(t)).sort((a,b)=>counts[b]-counts[a]);
  const groups=others.length?[...TOPIC_GROUPS,["其他",others]]:TOPIC_GROUPS;
  let h=`<div class="sec-title">题材地图 <span style="font-size:12px;color:var(--text3);font-weight:400">(近 180 天精选按受控标签聚合 · 点进查看该题材的历史精选流)</span></div>`;
  for(const [g,tags] of groups){
    const cards=tags.filter(t=>counts[t]).map(t=>
      `<div class="topic-card" onclick="openTagFeed(${jsArg(t)})">
        <b>${esc(t)}</b>
        <span class="tc-go">查看 ${counts[t]} 条精选 →</span>
      </div>`).join("");
    if(!cards) continue;
    h+=`<div class="topic-group">${esc(g)}</div><div class="topic-grid">${cards}</div>`;
  }
  return h;
}
function topicTrack(eventId){
  // 与 trkUntrack 同一 API 形状；标题从登记册按 event_id 查，不经 onclick 传自由文本
  const evs=(state.topicsReg&&state.topicsReg.events)||[];
  const e=evs.find(x=>x.event_id===eventId);
  if(!e) return;
  const next=!e.pinned;
  e.pinned=next;   // 本地乐观，失败回滚
  const lt=LS.get("news_tracked");lt[eventId]=next;LS.set("news_tracked",lt);
  renderTopics();
  postState("feedback",{date:state.date||"",item_id:eventId,title:e.title||"",
    category:e.category||"",action:next?"track":"untrack",event_id:eventId})
    .then(()=>toast(next?"已钉选：即使不进精选也会持续追踪":"已取消追踪，明日生效"))
    .catch(err=>{e.pinned=!next;renderTopics();toast("同步失败："+err.message,true);});
}

(function init(){
  pruneLocal();
  if(TOKEN){
    const drawer=document.createElement("div");
    drawer.id="rlDrawer";drawer.className="drawer";
    document.body.appendChild(drawer);
    const btn=document.createElement("button");
    btn.textContent="📥 稍后读";
    btn.onclick=openRl;
    const nav=document.querySelector(".datenav");
    nav.insertBefore(btn,nav.firstChild);
    // ⭐ 收藏 tab：与操作按钮同规则，仅本人可见
    const favTab=document.createElement("span");
    favTab.className="mtab";favTab.dataset.v="favs";
    favTab.textContent="⭐ 收藏";
    favTab.onclick=()=>switchTab("favs");
    document.querySelector(".tabs-main").appendChild(favTab);
  }
  const si=document.getElementById("searchInput");
  si.addEventListener("focus",()=>ensureIndex(doSearch));
  si.addEventListener("input",()=>ensureIndex(doSearch));
  document.addEventListener("click",e=>{
    if(!e.target.closest(".searchbox")) document.getElementById("searchRes").classList.remove("open");
  });
  document.getElementById("viewBtn").onclick=toggleView;
  const M=window.NEWS_MANIFEST||[];
  const sel=document.getElementById("dateSel");
  if(!M.length){document.getElementById("app").innerHTML='<div class="empty">还没有任何日报数据。<br><br>先运行 <code style="color:var(--accent2)">python daily_news.py</code> 生成今天的数据。</div>';return;}
  sel.innerHTML=M.map(d=>`<option value="${d}">${d}</option>`).join("");
  refreshDateSel();
  sel.onchange=()=>loadDate(sel.value);
  // 返回顶部：滚过一屏后右下角浮现
  const bt=document.createElement("button");
  bt.id="backTop";bt.textContent="↑ 顶部";bt.title="返回顶部";
  bt.onclick=()=>window.scrollTo({top:0,behavior:"smooth"});
  document.body.appendChild(bt);
  window.addEventListener("scroll",()=>bt.classList.toggle("show",window.scrollY>600),{passive:true});
  document.getElementById("prevBtn").onclick=()=>{const i=M.indexOf(state.date);if(i<M.length-1){sel.value=M[i+1];loadDate(M[i+1]);}};
  document.getElementById("nextBtn").onclick=()=>{const i=M.indexOf(state.date);if(i>0){sel.value=M[i-1];loadDate(M[i-1]);}};
  window.addEventListener("popstate",routeFromUrl);
  // 初始路由：?view=topics 直达主题；?date=&item= 直达详情/当日；否则默认最新一天
  const qp=new URLSearchParams(location.search);
  const detailRoute=NewsDetail.readRoute(location.search);
  const qd=detailRoute.date, qi=detailRoute.item;
  if(qp.get("view")==="topics"){
    state.date=M[0];sel.value=M[0];
    enterTopics(false);
  }else if(qp.get("view")==="favs"&&TOKEN){
    state.date=M[0];sel.value=M[0];
    enterFavs(false);
  }else if(qd&&M.indexOf(qd)>=0){
    sel.value=qd;
    if(qi) showDetail(qd,detailRoute.type,qi); else loadDate(qd);
  }else{
    loadDate(M[0]);
  }
})();
</script>
