<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日驾驶舱 · Daily Briefing</title>
  <link rel="alternate" type="application/rss+xml" title="每日驾驶舱" href="data/feed.xml">
  <link rel="stylesheet" href="news.css">
  <script src="js/theme.js"></script>
</head>
<body>
  <a class="skip-link" href="#app">跳转正文</a>
  <header class="site-header">
    <div class="hbar">
      <a class="logo" href="?view=timeline" data-route><span>每日驾驶舱</span> <small>Daily Briefing</small></a>
      <div class="searchbox" role="search">
        <label class="sr-only" for="searchInput">搜索历史条目</label>
        <input id="searchInput" type="search" placeholder="🔍 搜索历史条目" autocomplete="off" aria-controls="searchRes">
        <div id="searchRes" class="search-res" aria-live="polite"></div>
      </div>
      <div class="datenav">
        <button id="readLaterBtn" type="button" aria-controls="rlDrawer" aria-expanded="false" hidden>📥 稍后读</button>
        <span id="dayCtrls">
          <button id="prevBtn" type="button" aria-label="前一天">◀ 前一天</button>
          <button id="nextBtn" type="button" aria-label="后一天">后一天 ▶</button>
        </span>
      </div>
    </div>
    <nav class="tabs-main" aria-label="主导航">
      <a class="mtab" data-v="picks" data-view="timeline" data-route href="?view=timeline">时间线</a>
      <a class="mtab" data-v="all" data-view="all" data-route href="?view=all">全部动态</a>
      <a class="mtab" data-v="day" data-view="reports" data-route href="?view=reports&amp;period=day">报告</a>
      <a class="mtab" data-v="topics" data-view="topics" data-route href="?view=topics">主题</a>
      <a id="favoritesNav" class="mtab" data-v="favs" data-view="favs" data-route href="?view=favs" hidden>收藏</a>
    </nav>
    <div id="reportControls" class="report-controls" hidden>
      <nav class="period-tabs" aria-label="报告周期">
        <a data-period="day" href="?view=reports&amp;period=day">日报</a>
        <a data-period="week" href="?view=reports&amp;period=week">周报</a>
      </nav>
      <div id="dayArchive" class="archive-controls">
        <label for="dateSel">日报归档</label>
        <select id="dateSel"></select>
      </div>
      <div id="weekArchive" class="archive-controls" hidden>
        <label for="weekSel">周报归档</label>
        <select id="weekSel"></select>
      </div>
    </div>
  </header>

  <div class="wrap">
    <main id="app" tabindex="-1"><div class="empty" role="status">加载中…</div></main>
    <div id="liveStatus" class="sr-only" aria-live="polite" aria-atomic="true"></div>
    <footer>
      <div class="legend">
        <span class="legend-ok">● 已确认</span>
        <span class="legend-dev">● 发展中</span>
        <span class="legend-dispute">● 有争议</span>
        <span class="legend-rumor">● 仅传言</span>
        <span class="legend-note">～ 分数 = 重要性 × 来源可信度 × 兴趣权重</span>
      </div>
      <div>个人信息筛选驾驶舱 · 数据由 daily_news.py 每日生成 · 所有条目保留原文链接 · <a href="data/feed.xml">RSS 订阅</a></div>
    </footer>
  </div>
  <aside id="rlDrawer" class="drawer" aria-label="稍后读"></aside>

  <script src="data/manifest.js"></script>
  <script src="news-timeline.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
