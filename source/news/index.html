<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日驾驶舱 · Daily Briefing</title>
<link rel="alternate" type="application/rss+xml" title="每日驾驶舱" href="data/feed.xml">
<script>
/* 亮暗跟随博客：读 Fluid 的 localStorage 键，未设置则跟随系统 */
(function(){
  var KEY="Fluid_Color_Scheme";
  function apply(){
    var v=null;
    try{v=localStorage.getItem(KEY);}catch(e){}
    if(v!=="light"&&v!=="dark")
      v=(window.matchMedia&&matchMedia("(prefers-color-scheme: dark)").matches)?"dark":"light";
    document.documentElement.dataset.theme=v;
  }
  apply();
  window.addEventListener("storage",function(e){if(e.key===KEY)apply();});
  if(window.matchMedia){
    var mq=matchMedia("(prefers-color-scheme: dark)");
    if(mq.addEventListener) mq.addEventListener("change",apply);
  }
})();
</script>
<style>
:root{
  --bg:#ead8c2; --bg-soft:#f5ebdc; --bg2:rgba(255,249,239,.92);
  --card:rgba(255,249,239,.94); --card-h:#fff8ec;
  --border:rgba(76,48,28,.14); --border2:rgba(76,48,28,.26);
  --text:#342418; --text2:#735d49; --text3:#9c8368; --heading:#21150e;
  --accent:#9b6237; --accent2:#6f3d20; --accent-soft:rgba(155,98,55,.12);
  --shadow:0 14px 32px rgba(60,38,22,.08);
  --shadow2:0 24px 58px rgba(60,38,22,.16);
  --ok:#2e6b34; --ok-bg:rgba(46,107,52,.12);
  --dev:#2f5f8f; --dev-bg:rgba(47,95,143,.12);
  --dispute:#a85417; --dispute-bg:rgba(168,84,23,.12);
  --rumor:#ab3226; --rumor-bg:rgba(171,50,38,.12);
  --glow1:rgba(149,91,48,.18); --glow2:rgba(255,238,211,.34);
  --texture:rgba(111,61,32,.7); --texture2:rgba(111,61,32,.55); --texture-op:.14;
}
[data-theme="dark"]{
  --bg:#1d1712; --bg-soft:#2a2119; --bg2:rgba(25,19,15,.92);
  --card:rgba(35,28,22,.94); --card-h:#2d231b;
  --border:rgba(244,207,167,.12); --border2:rgba(244,207,167,.24);
  --text:#f0dfcb; --text2:#d0b99f; --text3:#a38d75; --heading:#fff7ec;
  --accent:#e0ad78; --accent2:#f3c796; --accent-soft:rgba(224,173,120,.14);
  --shadow:0 14px 32px rgba(0,0,0,.35);
  --shadow2:0 24px 58px rgba(0,0,0,.48);
  --ok:#86c98e; --ok-bg:rgba(134,201,142,.14);
  --dev:#8fb7e8; --dev-bg:rgba(143,183,232,.14);
  --dispute:#e8a860; --dispute-bg:rgba(232,168,96,.14);
  --rumor:#e78b82; --rumor-bg:rgba(231,139,130,.14);
  --glow1:rgba(155,98,55,.2); --glow2:rgba(224,173,120,.12);
  --texture:rgba(224,173,120,.55); --texture2:rgba(224,173,120,.42); --texture-op:.31;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:
    radial-gradient(circle at 0% 0%,var(--glow1),transparent 32%),
    radial-gradient(circle at 100% 0%,var(--glow2),transparent 24%),
    linear-gradient(180deg,var(--bg-soft),var(--bg)) var(--bg);
  background-attachment:fixed;
  color:var(--text);font-family:-apple-system,"Segoe UI","Microsoft YaHei",sans-serif;font-size:14px;line-height:1.6}
/* 博客同款格纹纸纹理 */
body::before{
  content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:var(--texture-op);
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 23px,var(--texture) 23px,var(--texture) 24px),
    repeating-linear-gradient(90deg,transparent,transparent 23px,var(--texture2) 23px,var(--texture2) 24px);
  -webkit-mask-image:linear-gradient(90deg,black,transparent 45%,transparent 55%,black);
  mask-image:linear-gradient(90deg,black,transparent 45%,transparent 55%,black);
}
a{color:var(--accent2);text-decoration:none}
a:hover{text-decoration:underline}

.wrap{max-width:1180px;margin:0 auto;padding:0 20px 60px;position:relative;z-index:1}

/* ---------- header ---------- */
header{border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:10;
  backdrop-filter:saturate(160%) blur(18px);-webkit-backdrop-filter:saturate(160%) blur(18px)}
.hbar{max-width:1180px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.logo{font-size:19px;font-weight:700;letter-spacing:.5px;color:var(--heading)}
.logo span{color:var(--accent)}
.datenav{display:flex;align-items:center;gap:6px;margin-left:auto}
.datenav button{background:var(--card-h);border:1px solid var(--border2);color:var(--text);padding:5px 11px;border-radius:6px;cursor:pointer;font-size:13px}
.datenav button:hover:not(:disabled){border-color:var(--accent);color:var(--accent2)}
.datenav button:disabled{opacity:.35;cursor:default}
.datenav select{background:var(--card-h);border:1px solid var(--border2);color:var(--text);padding:5px 8px;border-radius:6px;font-size:13px;cursor:pointer}
#dayCtrls{display:flex;align-items:center;gap:6px}
.tabs-main{max-width:1180px;margin:0 auto;padding:0 20px 10px;display:flex;gap:6px;flex-wrap:wrap}
.mtab{padding:6px 16px;border-radius:20px;border:1px solid var(--border2);background:var(--card);color:var(--text2);cursor:pointer;font-size:13.5px;user-select:none;transition:.15s}
.mtab:hover{border-color:var(--accent);color:var(--accent2)}
.mtab.on{background:var(--accent);border-color:var(--accent);color:var(--card-h);font-weight:600}
.feed-day{background:var(--bg);font-weight:700;font-size:15px;color:var(--heading);padding:14px 0 8px;border-bottom:1px solid var(--border);margin:14px 0 12px}
.feed-day .n{font-size:12px;color:var(--text3);font-weight:400;margin-left:8px}
.feed-day.clk{cursor:pointer;user-select:none}
.feed-day.clk:hover{color:var(--accent2)}
.feed-bar{display:flex;align-items:center;gap:10px;margin:14px 0 4px}
.feed-bar input{flex:1;max-width:460px;background:var(--card);border:1px solid var(--border);color:var(--text);padding:8px 13px;border-radius:8px;font-size:13.5px}
.feed-bar input:focus{outline:none;border-color:var(--accent)}
.feed-clear{font-size:12.5px;color:var(--text3);cursor:pointer}
.feed-clear:hover{color:var(--accent2)}
.hotbox{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin:16px 0 4px;box-shadow:var(--shadow)}
.hot-h{font-weight:700;color:var(--heading);margin-bottom:8px}
.hot-h .n{font-size:12px;color:var(--text3);font-weight:400;margin-left:10px}
.hot-row{display:flex;align-items:baseline;gap:10px;padding:6px 0;cursor:pointer;border-bottom:1px dashed var(--border)}
.hot-row:last-child{border-bottom:0}
.hot-row:hover .hot-t{color:var(--accent2)}
.hot-no{font-weight:800;font-size:14px;min-width:16px;text-align:center;color:var(--text3)}
.hot-no.n1{color:#e05d44}.hot-no.n2{color:#e08a3c}.hot-no.n3{color:#d9b03f}
.hot-t{flex:1;font-weight:600;color:var(--text)}
.hot-m{font-size:12px;color:var(--text3);white-space:nowrap}
.tl{position:relative;margin:4px 0 8px 6px;padding-left:24px;border-left:2px solid var(--border2);display:flex;flex-direction:column;gap:14px}
.tl-item{position:relative}
.tl-item::before{content:"";position:absolute;left:-29px;top:16px;width:8px;height:8px;border-radius:50%;background:var(--accent);border:2px solid var(--bg)}
.tl-time{display:inline-block;font-size:12px;color:var(--text3);margin-bottom:4px;font-variant-numeric:tabular-nums}
.tl-badge{display:inline-block;margin:0 0 4px 8px;padding:1px 7px;border-radius:999px;background:var(--accent-soft);color:var(--accent);font-size:11px}
.topic-group{font-weight:700;font-size:14px;color:var(--heading);margin:20px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}
.topic-card{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:12px 14px;cursor:pointer;transition:.15s;display:flex;flex-direction:column;gap:6px}
.topic-card:hover{border-color:var(--accent);background:var(--card-h)}
.topic-card b{color:var(--heading);font-size:14px}
.tc-go{font-size:12px;color:var(--text3)}
.topic-card:hover .tc-go{color:var(--accent2)}
.brief-delta{margin-top:8px;font-size:12.5px;color:var(--text3)}
.brief-delta b{color:var(--accent2);font-weight:700}
#backTop{position:fixed;right:22px;bottom:22px;z-index:30;display:none;background:var(--card);border:1px solid var(--border2);color:var(--text);padding:9px 15px;border-radius:999px;cursor:pointer;font-size:13px;box-shadow:var(--shadow)}
#backTop.show{display:block}
#backTop:hover{border-color:var(--accent);color:var(--accent2)}

/* ---------- brief ---------- */
.brief{margin:22px 0 6px;padding:16px 18px;background:var(--card-h);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:8px;box-shadow:var(--shadow)}
.brief .bt{font-size:12px;color:var(--accent2);font-weight:600;letter-spacing:1px;margin-bottom:6px}
.brief p{color:var(--text);font-size:14.5px}

/* ---------- 今日主线 ---------- */
.mainlines{margin:14px 0 6px;padding:14px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow)}
.ml-h{font-size:12px;color:var(--accent2);font-weight:700;letter-spacing:1px;margin-bottom:10px}
.ml-item{padding:8px 0;border-top:1px dashed var(--border)}
.ml-item:first-of-type{border-top:none;padding-top:0}
.ml-t{font-size:14px;font-weight:700;color:var(--heading)}
.ml-o{font-size:13px;color:var(--text2);margin:3px 0 6px}
.ml-chips{display:flex;flex-wrap:wrap;gap:6px}
.ml-chip{font-size:12px;padding:2px 10px;border-radius:12px;border:1px solid var(--border2);color:var(--text2);cursor:pointer;background:var(--card);max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ml-chip:hover{border-color:var(--accent);color:var(--accent2)}

/* ---------- filter tabs ---------- */
.tabs{display:flex;gap:8px;margin:20px 0 4px;flex-wrap:wrap}
.tab{padding:6px 15px;border-radius:20px;border:1px solid var(--border2);background:var(--card);color:var(--text2);cursor:pointer;font-size:13px;transition:.15s}
.tab:hover{border-color:var(--accent)}
.tab.on{background:var(--accent);border-color:var(--accent);color:var(--card-h);font-weight:600}
.tab .n{opacity:.7;font-size:11.5px;margin-left:3px}
.tabs.sub{margin:10px 0 0}
.tab.sub{padding:3px 11px;font-size:12px;border-radius:14px}

/* ---------- section ---------- */
.sec-title{margin:26px 0 14px;font-size:15.5px;font-weight:700;letter-spacing:1px;color:var(--heading);display:flex;align-items:center;gap:10px}
.sec-title::before{content:"";width:16px;height:3px;border-radius:2px;background:var(--accent)}
.sec-title::after{content:"";flex:1;height:1px;background:var(--border2)}

/* ---------- pick cards ---------- */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:860px){.grid{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px 18px 14px;display:flex;flex-direction:column;gap:9px;transition:.15s;box-shadow:var(--shadow)}
.card:hover{background:var(--card-h);border-color:var(--border2)}
.card-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.score{font-weight:800;font-size:15px;min-width:40px;text-align:center;padding:2px 8px;border-radius:6px;background:transparent}
.score.hi{background:var(--accent);color:var(--card-h)}
.score.mid{color:var(--accent2);box-shadow:inset 0 0 0 1px var(--accent)}
.score.lo{color:var(--text3);box-shadow:inset 0 0 0 1px var(--border2)}
.tag{font-size:11.5px;padding:2px 9px;border-radius:10px;font-weight:600}
.tag.cat-ai,.tag.cat-tech,.tag.cat-finance,.tag.cat-society,.tag.cat-world{
  background:transparent;border:1px solid var(--border2);color:var(--text2);font-weight:500}
.tag.st-已确认{background:var(--ok-bg);color:var(--ok)}
.tag.st-发展中{background:var(--dev-bg);color:var(--dev)}
.tag.st-有争议{background:var(--dispute-bg);color:var(--dispute)}
.tag.st-仅传言{background:var(--rumor-bg);color:var(--rumor)}
.tag.stype{background:transparent;border:1px solid var(--border);color:var(--text3);font-weight:400}
.tag.topic{background:transparent;border:1px dashed var(--border2);color:var(--text2);font-weight:400}
.tag.day{background:var(--accent-soft);color:var(--accent2);cursor:pointer;user-select:none}
.tag.day:hover{color:var(--accent)}
.ev-history{display:none;font-size:12.5px;color:var(--text2);border-left:2px solid var(--accent);padding-left:10px}
.ev-history.open{display:block}
.ev-history .eh-d{color:var(--text3);margin-right:6px}
.card h3{font-size:15.5px;line-height:1.45;font-weight:700;color:var(--heading)}
.card .sum{color:var(--text);font-size:13.5px}
.kv{font-size:13px;color:var(--text2);padding-left:10px;border-left:2px solid var(--border2)}
.kv b{color:var(--text2);font-weight:600}
.kv.why{border-left-color:var(--accent)}
.kv.ctx{border-left-color:var(--dev)}
.kv.sig{border-left-color:var(--accent);background:var(--accent-soft);border-radius:0 6px 6px 0;padding:4px 10px}
.kv.watch{border-left-color:var(--border2)}
.toc{display:flex;align-items:center;flex-wrap:wrap;gap:6px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin:12px 0;font-size:13px;box-shadow:var(--shadow)}
.toc-t{font-weight:700;color:var(--heading)}
.toc a{color:var(--text2);cursor:pointer}
.toc a:hover{color:var(--accent2)}
.toc a b{color:var(--accent2)}
.toc-meta{margin-left:auto;color:var(--text3);font-size:12px}
.srcs{display:flex;flex-wrap:wrap;gap:6px 12px;margin-top:auto;padding-top:8px;border-top:1px dashed var(--border2);font-size:12px}
.srcs a{color:var(--text2)}
.srcs a:hover{color:var(--accent2)}
.srcs .stp{color:var(--text3);font-size:11px}
/* 中文预览页（pick 详情，页内路由） */
.readmore{display:inline-block;margin-top:2px;font-size:12.5px;color:var(--accent2);cursor:pointer;font-weight:600}
.readmore:hover{text-decoration:underline}
.card h3.clk{cursor:pointer}
.card h3.clk:hover{color:var(--accent2)}
.detail-wrap{max-width:760px;margin:0 auto}
.dback{display:inline-flex;align-items:center;min-height:44px;margin-bottom:12px;font-size:13px;color:var(--text2);cursor:pointer}
.dback:hover{color:var(--accent2)}
.dback:focus-visible,.detail-link:focus-visible,.detail-source-toggle:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:4px}
.detail-title{font-size:clamp(25px,4vw,34px);line-height:1.32;font-weight:800;color:var(--heading);margin:10px 0 14px;overflow-wrap:anywhere}
.detail-lede{font-size:16px;color:var(--text);line-height:1.75;padding:14px 16px;background:var(--accent-soft);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;margin-bottom:22px}
.detail-body{font-size:16px;line-height:1.85;color:var(--text)}
.detail-body p{margin:0 0 15px}
.detail-fallback-note{font-size:12.5px;color:var(--text3);margin:6px 0 12px}
.detail-kv{display:flex;flex-direction:column;gap:10px;margin:22px 0}
.detail-sec-t{margin:28px 0 12px;font-size:15px;font-weight:700;color:var(--heading);letter-spacing:.5px}
.detail-takeaway{margin:0 0 22px;padding:16px 18px;background:var(--card);border:1px solid var(--border2);border-radius:10px;box-shadow:var(--shadow)}
.detail-takeaway .label{display:block;color:var(--accent2);font-size:12px;font-weight:700;letter-spacing:.08em;margin-bottom:7px}
.detail-takeaway p{margin:0;font-size:17px;line-height:1.7;font-weight:650;color:var(--heading)}
.detail-list{margin:0;padding-left:22px}.detail-list li{margin:8px 0;line-height:1.75}
.detail-claims{display:flex;flex-direction:column;gap:9px}
.detail-claim{padding:11px 13px;border:1px solid var(--border);border-radius:8px;background:var(--card)}
.detail-claim .claim-kind{display:inline-block;min-width:52px;margin-right:8px;font-size:11px;font-weight:700;color:var(--text3)}
.detail-claim.kind-fact{border-left:3px solid var(--ok)}.detail-claim.kind-analysis{border-left:3px solid var(--accent)}.detail-claim.kind-uncertain{border-left:3px solid var(--rumor)}
.claim-sources{margin-top:6px;font-size:11.5px;color:var(--text3)}
.detail-link{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:0 15px;border:1px solid var(--border2);border-radius:8px;color:var(--accent2);font-weight:650;cursor:pointer;background:var(--card)}
.detail-link:hover{background:var(--card-h);border-color:var(--accent)}
.detail-source-toggle{display:none}
.detail-actions-card{margin-top:24px;padding:12px;background:transparent;box-shadow:none}
.detail-actions-card .acts{border-top:0;padding-top:0}
.detail-kind{font-size:12px;color:var(--text3);font-weight:700;letter-spacing:.08em}
.detail-topbar{display:flex;justify-content:space-between;align-items:center;gap:10px}
.detail-export{align-self:center;white-space:nowrap}
.time{color:var(--text3);font-size:11.5px;margin-left:auto}

@media(max-width:600px){
  .detail-wrap{max-width:none}.detail-title{font-size:26px}.detail-lede{font-size:16px;padding:13px 14px}
  .detail-body{font-size:16px;line-height:1.8}.detail-actions-card{padding:10px 0}
  .detail-source-toggle{display:inline-flex;background:none;border:0;padding:0;min-height:44px;align-items:center;color:var(--accent2);font:inherit;cursor:pointer}
  .detail-sources.collapsed span:nth-child(n+3){display:none}
}
@media(prefers-reduced-motion:reduce){html{scroll-behavior:auto!important}*{transition:none!important}}

/* ---------- more list ---------- */
.more-list{display:flex;flex-direction:column;gap:6px}
.row{display:flex;align-items:baseline;gap:10px;padding:9px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;flex-wrap:wrap}
.row:hover{background:var(--card-h)}
.row .score{font-size:12.5px;min-width:34px;padding:1px 6px}
.row .rt{font-weight:600;font-size:13.5px;flex:1;min-width:200px}
.row .rt a{color:var(--text)}
.row .rs{color:var(--text3);font-size:12px}
.toggle-more{margin:14px auto 0;display:block;background:var(--card);border:1px solid var(--border);color:var(--text2);padding:8px 26px;border-radius:20px;cursor:pointer;font-size:13px}
.toggle-more:hover{border-color:var(--accent);color:var(--text)}

/* ---------- 反馈操作（仅持 token 可见） ---------- */
.acts{display:flex;gap:8px;flex-wrap:wrap;padding-top:6px;border-top:1px dashed var(--border)}
.act{font-size:12px;color:var(--text3);cursor:pointer;border:1px solid var(--border);border-radius:12px;padding:2px 10px;user-select:none}
.act:hover{color:var(--text);border-color:var(--accent)}
.act.done{color:var(--ok);border-color:var(--ok)}
.fb-panel:empty{display:none}
.fb-panel{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.fb-tip{font-size:12px;color:var(--text2);margin-bottom:6px}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{font-size:12px;padding:3px 10px;border-radius:12px;border:1px solid var(--border);cursor:pointer;color:var(--text2);user-select:none}
.chip.on,.chip:hover{border-color:var(--accent);color:var(--accent2)}
.fb-note{width:100%;margin-top:8px;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:6px 8px;font-size:12.5px;min-height:44px;resize:vertical;font-family:inherit}
.fb-btns{margin-top:8px;display:flex;gap:8px}
.fb-go{background:var(--accent);border:none;color:var(--card-h);padding:5px 14px;border-radius:6px;cursor:pointer;font-size:12.5px}
.fb-cancel{background:var(--card);border:1px solid var(--border);color:var(--text2);padding:5px 14px;border-radius:6px;cursor:pointer;font-size:12.5px}
.hidden-bar{margin-top:10px;font-size:12.5px;color:var(--text3)}
.hidden-bar a{cursor:pointer}
.hidden-row{display:flex;gap:10px;padding:6px 12px;background:var(--card);border:1px solid var(--border);border-radius:6px;margin-top:6px;font-size:12.5px;color:var(--text3);align-items:baseline}
.hidden-row .rt{flex:1}
.hidden-row a{cursor:pointer}
/* ---------- 追踪中 ---------- */
.trk{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:8px;padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow)}
.trk-top{display:flex;gap:8px;align-items:center;flex-wrap:wrap;cursor:pointer}
.trk-top b{font-size:13.5px}
.trk-upd{font-size:12px;color:var(--text3);margin-left:auto}
.trk-hist{display:none;margin-top:8px;font-size:12.5px;color:var(--text2);border-left:2px solid var(--accent);padding-left:10px}
.trk.open .trk-hist{display:block}
/* ---------- 搜索 ---------- */
.searchbox{position:relative}
.searchbox input{background:var(--card);border:1px solid var(--border);color:var(--text);padding:5px 11px;border-radius:6px;font-size:13px;width:190px}
.searchbox input:focus{outline:none;border-color:var(--accent)}
.search-res{display:none;position:absolute;top:115%;left:0;width:min(440px,90vw);max-height:60vh;overflow-y:auto;background:var(--card-h);border:1px solid var(--border2);border-radius:8px;z-index:40;box-shadow:var(--shadow2)}
.search-res.open{display:block}
.sr{padding:8px 12px;font-size:12.5px;cursor:pointer;border-bottom:1px solid var(--border);color:var(--text)}
.sr:last-child{border-bottom:none}
.sr:hover{background:var(--card-h)}
.sr-d{color:var(--text3);margin-right:8px;font-size:11.5px}
.sr-c{color:var(--accent2);margin-right:8px;font-size:11.5px}
.sr.none{color:var(--text3);cursor:default}
.card.hl,.row.hl,.deep.hl{outline:2px solid var(--accent)}
/* ---------- 深度阅读 ---------- */
.deep{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:8px;padding:12px 14px;margin-bottom:8px;display:flex;flex-direction:column;gap:8px;box-shadow:var(--shadow)}
.deep-top{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.deep-t{font-weight:700;font-size:14.5px;color:var(--text)}
.tag.mins{background:var(--accent-soft);color:var(--accent2)}
/* 今日论文：复用 .deep 卡片，换左边框色与代码标签以示区分 */
.deep.paper{border-left-color:#8b5cf6}
.tag.code{background:rgba(139,92,246,.14);color:#8b5cf6}
/* 舆论观察：复用 .deep 卡片，暖色左边框区分 */
.deep.pulse{border-left-color:#f59e0b}
/* ---------- 周视图 ---------- */
.wk-day{margin-bottom:16px}
.wk-date{font-weight:700;font-size:14px;margin-bottom:6px;color:var(--accent2);cursor:pointer}
.wk-date:hover{text-decoration:underline}
/* 周综述 */
.wk-syn{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:8px;padding:12px 15px;margin-bottom:10px;box-shadow:var(--shadow)}
.wk-thread{padding:8px 0;border-bottom:1px solid var(--border)}
.wk-thread:last-child{border-bottom:none}
.wk-thread b{font-size:14px;color:var(--text)}
.wk-thread .tl{font-size:13px;color:var(--text);margin:2px 0}
.wk-thread .dt{font-size:12.5px;color:var(--text2)}
.wk-sub{font-weight:700;font-size:13px;color:var(--heading);margin:12px 0 6px}
.wk-recap{font-size:13px;color:var(--text);padding:5px 0;display:flex;gap:8px;align-items:baseline;flex-wrap:wrap}
.wk-recap .note{color:var(--text2);font-size:12.5px}
.wk-outlook{font-size:12.5px;color:var(--text2);line-height:1.7;padding-left:9px;border-left:2px solid var(--accent)}
.tag.dir-新增{background:var(--accent-soft);color:var(--accent2)}
.tag.dir-推进{background:var(--dev-bg);color:var(--dev)}
.tag.dir-反转{background:var(--rumor-bg);color:var(--rumor)}
.tag.dir-停滞{background:var(--card-h);color:var(--text3)}
.tag.rc-兑现{background:var(--accent-soft);color:var(--accent2)}
.tag.rc-部分兑现{background:var(--dispute-bg);color:var(--dispute)}
.tag.rc-未兑现{background:var(--card-h);color:var(--text3)}
.tag.rc-反转{background:var(--rumor-bg);color:var(--rumor)}
/* ---------- 稍后读抽屉 ---------- */
.drawer{position:fixed;top:0;right:-400px;width:min(380px,92vw);height:100%;background:var(--card-h);border-left:1px solid var(--border2);z-index:50;transition:right .2s;padding:16px 18px;overflow-y:auto;box-shadow:var(--shadow2)}
.drawer.open{right:0}
.rl-head{font-weight:700;margin-bottom:12px;display:flex;justify-content:space-between;font-size:15px}
.rl-close{cursor:pointer;color:var(--text3)}
.rl-item{padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.rl-item.done .rl-t a{text-decoration:line-through;color:var(--text3)}
.rl-meta{font-size:11.5px;color:var(--text3);margin-top:2px}
.rl-ops{margin-top:4px;display:flex;gap:12px;font-size:12px}
.rl-ops span{cursor:pointer;color:var(--text3)}
.rl-ops span:hover{color:var(--accent2)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--card-h);border:1px solid var(--accent);color:var(--text);padding:8px 18px;border-radius:8px;z-index:60;font-size:13px;box-shadow:var(--shadow)}
.toast.err{border-color:var(--rumor)}

/* ---------- 英语单词本 ---------- */
.vgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:860px){.vgrid{grid-template-columns:1fr}}
.vdate-h{margin:22px 0 10px;font-size:14px;font-weight:700;color:var(--heading);display:flex;align-items:center;gap:8px}
.vdate-h .vdate-n{font-size:12px;font-weight:400;color:var(--text3)}
.vcard{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:13px 15px;display:flex;flex-direction:column;gap:7px;box-shadow:var(--shadow)}
.vcard:hover{background:var(--card-h)}
.vcard.mastered{opacity:.6}
.vhead{display:flex;align-items:baseline;gap:9px;flex-wrap:wrap}
.vword{font-size:18px;font-weight:800;color:var(--heading);letter-spacing:.3px}
.vph{font-size:13px;color:var(--accent2);font-family:"Segoe UI",sans-serif}
.vpos{font-size:12px;color:var(--text3);font-style:italic}
.vsense{font-size:14px;color:var(--text)}
.vex{font-size:12.5px;color:var(--text2);line-height:1.5;padding-left:9px;border-left:2px solid var(--accent);font-style:italic}
.vmeta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:11.5px;color:var(--text3);margin-top:1px}
.vsrc{border:1px solid var(--border2);border-radius:9px;padding:1px 7px}
.vsrc.manual{color:var(--dev);border-color:var(--dev)}
.vacts{display:flex;gap:8px;flex-wrap:wrap;padding-top:6px;border-top:1px dashed var(--border);margin-top:2px}
/* 单词本视图控件 */
.vbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:14px 0 4px}
.vadd{display:flex;gap:8px;flex:1;min-width:220px}
.vadd input{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);padding:6px 11px;border-radius:6px;font-size:13px}
.vadd input:focus{outline:none;border-color:var(--accent)}
.vadd button{background:var(--accent);border:none;color:var(--card-h);padding:6px 16px;border-radius:6px;cursor:pointer;font-size:13px}
.vsearch{background:var(--card);border:1px solid var(--border);color:var(--text);padding:6px 11px;border-radius:6px;font-size:13px;width:180px}
.vsearch:focus{outline:none;border-color:var(--accent)}
.vpending{background:var(--card);border:1px dashed var(--border2);border-radius:8px;padding:9px 13px;font-size:12.5px;color:var(--text2);display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
.vpending b{color:var(--dev)}
.empty{color:var(--text3);text-align:center;padding:60px 0;font-size:14px}
footer{color:var(--text3);font-size:12px;text-align:center;margin-top:50px;line-height:2}
.legend{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
</style>
</head>
<body>
<header>
  <div class="hbar">
    <div class="logo">每日<span>驾驶舱</span> <span style="font-size:12px;color:var(--text3);font-weight:400">Daily Briefing</span></div>
    <div class="searchbox">
      <input id="searchInput" placeholder="🔍 搜索历史条目" autocomplete="off">
      <div id="searchRes" class="search-res"></div>
    </div>
    <div class="datenav">
      <span id="dayCtrls">
        <button id="viewBtn">🗓 周视图</button>
        <button id="prevBtn">◀ 前一天</button>
        <select id="dateSel"></select>
        <button id="nextBtn">后一天 ▶</button>
      </span>
    </div>
  </div>
  <nav class="tabs-main" aria-label="主导航">
    <span class="mtab" data-v="picks" onclick="switchTab('picks')">⚡ 精选</span>
    <span class="mtab" data-v="all" onclick="switchTab('all')">☰ 全部动态</span>
    <span class="mtab on" data-v="day" onclick="switchTab('day')">📰 日报</span>
    <span class="mtab" data-v="topics" onclick="switchTab('topics')">🧵 主题</span>
  </nav>
</header>

<div class="wrap">
  <div id="app"><div class="empty">加载中…</div></div>
  <footer>
    <div class="legend">
      <span style="color:var(--ok)">● 已确认</span>
      <span style="color:var(--dev)">● 发展中</span>
      <span style="color:var(--dispute)">● 有争议</span>
      <span style="color:var(--rumor)">● 仅传言</span>
      <span style="color:var(--text3)">｜ 分数 = 重要性 × 来源可信度 × 兴趣权重</span>
    </div>
    <div>个人信息筛选驾驶舱 · 数据由 daily_news.py 每日生成 · 所有条目保留原文链接 · <a href="data/feed.xml">RSS 订阅</a></div>
  </footer>
</div>

<script src="data/manifest.js"></script>
<script src="news-timeline.js"></script>
<script>
const CAT = {ai:"AI", tech:"互联网/科技", finance:"财经", society:"社会", world:"国际"};
const state = {date:null, cat:"all", tag:null, moreOpen:false, showHidden:false,
               itemsById:{}, view:"day", pendingHighlight:null, detailId:null, detailType:"news"};

/* ---------- 用户状态：与在线后台共用 token，仅本人可见操作按钮 ---------- */
const TOKEN = localStorage.getItem("aoiblog_admin_token") || "";
const NI_REASONS = ["不关心这个领域","这个事看腻了","太水没实质","只是今天不想看"];
const LS = {
  get(k){try{return JSON.parse(localStorage.getItem(k)||"{}");}catch(e){return {};}},
  set(k,v){localStorage.setItem(k,JSON.stringify(v));}
};
// 条目引用键：日内 id（如 pick-9）跨天会重复，跨天流中用 "日期:id" 复合键
// 引用条目，避免 itemsById 里不同天的同名 id 互相覆盖；当天条目保持纯 id。
function refOf(it){
  return (it._date&&it._date!==state.date)?it._date+":"+it.id:it.id;
}
// 本地状态键（news_rl/news_hidden 等）：统一为 "YYYY-MM-DD:id"。
// 传入已是复合引用则原样返回；纯 id 按条目自身日期（回退当前日）拼接。
function itemKey(id){
  if(/^\d{4}-\d{2}-\d{2}:/.test(id)) return id;
  const it=state.itemsById[id];
  return ((it&&it._date)||state.date)+":"+id;
}

// 过期清理：hidden/rl 键形如 "YYYY-MM-DD:id"，tracked 键形如 "evt-YYYYMMDD-xxx"，
// 分别保留 30/60 天，防 localStorage 无限累积；news_fav 是永久收藏语义且量小，不清理
function pruneLocal(){
  const cut=k=>{const d=new Date();d.setDate(d.getDate()-k);return d.toISOString().slice(0,10);};
  const c30=cut(30), c60=cut(60).replace(/-/g,"");
  for(const key of ["news_hidden","news_rl","news_like"]){
    const m=LS.get(key);
    let dirty=false;
    for(const k of Object.keys(m)){
      if((k.slice(0,10)||"")<c30){delete m[k];dirty=true;}
    }
    if(dirty) LS.set(key,m);
  }
  const t=LS.get("news_tracked");
  let dirty=false;
  for(const k of Object.keys(t)){
    const d=(k.match(/^evt-(\d{8})-/)||[])[1];
    if(d&&d<c60){delete t[k];dirty=true;}
  }
  if(dirty) LS.set("news_tracked",t);
  // 已读日期标记保留 90 天
  const c90=cut(90), seen=LS.get("news_seen_days");
  let sd=false;
  for(const k of Object.keys(seen)) if(k<c90){delete seen[k];sd=true;}
  if(sd) LS.set("news_seen_days",seen);
}

// 已读日期：打开过哪天的日报就打 ✓，下拉里一眼看出漏了哪天
function markSeen(date){
  const seen=LS.get("news_seen_days");
  if(seen[date]) return;
  seen[date]=1;LS.set("news_seen_days",seen);
  refreshDateSel();
}
function refreshDateSel(){
  const seen=LS.get("news_seen_days");
  const sel=document.getElementById("dateSel");
  if(!sel) return;
  for(const o of sel.options) o.textContent=(seen[o.value]?"✓ ":"")+o.value;
}

async function postState(type,payload){
  const r=await fetch("/api/newsState",{method:"POST",
    headers:{"Content-Type":"application/json",Authorization:"Bearer "+TOKEN},
    body:JSON.stringify({type,payload})});
  const j=await r.json().catch(()=>({}));
  if(!r.ok||!j.success) throw new Error(j.error||("HTTP "+r.status));
  return j.data;
}
async function getState(type){
  const r=await fetch("/api/newsState?type="+type,{headers:{Authorization:"Bearer "+TOKEN}});
  const j=await r.json().catch(()=>({}));
  if(!r.ok||!j.success) throw new Error(j.error||("HTTP "+r.status));
  return j.data;
}
let toastTimer=null;
function toast(msg,err){
  document.querySelectorAll(".toast").forEach(t=>t.remove());
  const t=document.createElement("div");
  t.className="toast"+(err?" err":"");
  t.textContent=msg;
  document.body.appendChild(t);
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.remove(),2600);
}

function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));}
function jsArg(s){return esc(JSON.stringify(String(s??"")));}
function safeUrl(u){u=String(u||"");return /^https?:\/\//i.test(u)?u:"#";}
function scoreCls(s){return s>=80?"hi":s>=60?"mid":"lo";}
function fmtAbs(iso){
  const d=new Date(iso); if(!iso||isNaN(d)) return "";
  const p=n=>String(n).padStart(2,"0");
  return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate())+" "+p(d.getHours())+":"+p(d.getMinutes());
}
function fmtTime(iso){
  if(!iso) return "";
  const d=new Date(iso); if(isNaN(d)) return "";
  const now=new Date(), diff=(now-d)/36e5;
  const hm=d.toTimeString().slice(0,5);
  if(diff<1) return Math.max(1,Math.round(diff*60))+" 分钟前";
  if(diff<24) return Math.round(diff)+" 小时前";
  return (d.getMonth()+1)+"/"+d.getDate()+" "+hm;
}

function loadDate(date,after){
  state.date=date; state.moreOpen=false; state.tag=null;
  const cb=after||render;
  const done=()=>{markSeen(date);cb();};
  if(window.NEWS_DATA && window.NEWS_DATA[date]) return done();
  const s=document.createElement("script");
  s.src="data/daily/"+date+".js";
  s.onload=done;
  s.onerror=()=>{document.getElementById("app").innerHTML='<div class="empty">这一天没有数据（data/daily/'+esc(date)+'.js 不存在）</div>';};
  document.head.appendChild(s);
}

function srcLinks(it){
  return (it.sources||[]).map(s=>
    `<span><a href="${esc(safeUrl(s.url))}" target="_blank" rel="noopener" title="${esc(s.name)}">↗ ${esc(s.name)}</a> <span class="stp">${esc(s.type||"")}</span></span>`
  ).join("");
}

function card(it){
  const dayN=+it.day_count||0;
  const ref=refOf(it);
  const hist=(it.history||[]).map(h=>
    `<div><span class="eh-d">${esc(h.date)}</span>${esc(h.summary)}</div>`).join("");
  return `<div class="card" data-id="${esc(ref)}">
    <div class="card-top">
      <span class="score ${scoreCls(it.score)}">${it.score}</span>
      <span class="tag cat-${it.category}">${CAT[it.category]||it.category}</span>
      ${it.status?`<span class="tag st-${esc(it.status)}">${esc(it.status)}</span>`:""}
      ${dayN>=2?`<span class="tag day" onclick="toggleHist(this)" title="跨天追踪事件，点击查看此前进展">📌 第${dayN}天</span>`:""}
      ${(it.tags||[]).map(t=>`<span class="tag topic">${esc(t)}</span>`).join("")}
      <span class="tag stype">${esc(it.source_type||"")}</span>
      <span class="time">${fmtTime(it.time)}</span>
    </div>
    <h3 class="clk" onclick="openDetail(${jsArg(ref)},'news')" title="查看分析详情">${esc(it.title)}</h3>
    <div class="sum">${esc(it.summary)}</div>
    <a class="readmore" onclick="openDetail(${jsArg(ref)},'news')">查看详情 →</a>
    ${dayN>=2&&hist?`<div class="ev-history"><b>此前进展</b>${hist}</div>`:""}
    ${it.why?`<div class="kv why"><b>为什么重要</b> · ${esc(it.why)}</div>`:""}
    ${it.context?`<div class="kv ctx"><b>背景与机制</b> · ${esc(it.context)}</div>`:""}
    ${it.significance?`<div class="kv sig"><b>对我的意义</b> · ${esc(it.significance)}</div>`:""}
    ${it.watch?`<div class="kv watch"><b>后续关注</b> · ${esc(it.watch)}</div>`:""}
    <div class="srcs">${srcLinks(it)}</div>
    ${actionRow(it)}
  </div>`;
}

function toggleHist(el){
  const card=el.closest(".card");
  const h=card&&card.querySelector(".ev-history");
  if(h) h.classList.toggle("open");
}

/* ---------- 深读/论文卡片模板（日报页与收藏页共用） ---------- */
// 有料才进详情：详情字段是新管线才产出的，历史条目点标题仍直达原文，避免空详情页
function deepHasDetail(dp){return !!(dp.takeaway||(dp.key_points||[]).length||dp.audience);}
function paperHasDetail(pp){return !!(pp.takeaway||pp.contribution||pp.evidence||pp.limitations);}
function detailTitleLink(it,type,hasDetail){
  const t=esc(it.title_zh||it.title||"");
  if(!hasDetail) return `<a class="deep-t" href="${esc(safeUrl(it.url))}" target="_blank" rel="noopener">${t}</a>`;
  const ref=refOf(it);
  return `<a class="deep-t" href="${esc(NewsDetail.buildUrl(it._date||state.date,type,it.id))}" onclick="openDetail(${jsArg(ref)},'${type}');return false">${t}</a>`;
}
function deepCard(dp){
  const ref=refOf(dp);
  const rl=LS.get("news_rl")[itemKey(ref)];
  return `<div class="deep" data-id="${esc(ref)}">
  <div class="deep-top">
    <span class="tag mins">📖 约 ${+dp.read_minutes||"?"} 分钟</span>
    <span class="tag stype">${esc(dp.source||"")}</span>
    ${dp.lang==="en"?'<span class="tag stype">EN</span>':""}
    ${detailTitleLink(dp,"deep",deepHasDetail(dp))}
  </div>
  ${dp.brief?`<div class="sum">${esc(dp.brief)}</div>`:""}
  ${dp.why?`<div class="kv why"><b>为什么值得读</b> · ${esc(dp.why)}</div>`:""}
  ${dp.lang==="en"&&dp.title!==dp.title_zh?`<div class="kv"><b>原题</b> · ${esc(dp.title||"")}</div>`:""}
  ${TOKEN?`<div class="acts"><span class="act ${rl?"done":""}" title="${rl?"再点一次移出稍后读":"加入稍后读"}" onclick="rlToggle(this,${jsArg(ref)})">${rl?"✓ 已收":"⏳ 稍后读"}</span>${favBtn(dp)}</div>`:""}
</div>`;
}
function paperCard(pp){
  const ref=refOf(pp);
  const rl=LS.get("news_rl")[itemKey(ref)];
  return `<div class="deep paper" data-id="${esc(ref)}">
  <div class="deep-top">
    <span class="tag mins">👍 ${+pp.upvotes||0}</span>
    ${pp.has_code?'<span class="tag code">&lt;/&gt; 代码</span>':""}
    <span class="tag stype">arXiv</span>
    ${detailTitleLink(pp,"paper",paperHasDetail(pp))}
  </div>
  ${pp.brief?`<div class="sum">${esc(pp.brief)}</div>`:""}
  ${pp.why?`<div class="kv why"><b>为什么值得读</b> · ${esc(pp.why)}</div>`:""}
  ${pp.title&&pp.title!==pp.title_zh?`<div class="kv"><b>原题</b> · ${esc(pp.title||"")}</div>`:""}
  ${TOKEN?`<div class="acts"><span class="act ${rl?"done":""}" title="${rl?"再点一次移出稍后读":"加入稍后读"}" onclick="rlToggle(this,${jsArg(ref)})">${rl?"✓ 已收":"⏳ 稍后读"}</span>${favBtn(pp)}</div>`:""}
</div>`;
}


/* ---------- 今日看点：真实阅读时长（按默认可见字段字数，约 400 字/分钟） ---------- */
function estReadMinutes(d,picks,mores,deep,papers,opinion,trk){
  let n=0;
  const add=s=>{if(s)n+=String(s).length;};
  add(d.brief);
  for(const t of (Array.isArray(d.themes)?d.themes:[])){add(t.title);add(t.one_liner);}
  for(const it of picks){add(it.title);add(it.summary);add(it.why);add(it.context);add(it.significance);add(it.watch);}
  for(const it of mores.slice(0,5)){add(it.title);}
  for(const dp of deep){add(dp.title_zh||dp.title);add(dp.brief);add(dp.why);}
  for(const pp of papers){add(pp.title_zh||pp.title);add(pp.brief);add(pp.why);}
  for(const op of opinion){add(op.title||op.word);add(op.why_hot);add(op.emotion);add(op.mechanism);}
  for(const t of trk){add(t.title);}
  return Math.max(1,Math.ceil(n/400));
}

function scrollToSec(id){
  const el=document.getElementById(id);
  if(el) el.scrollIntoView({behavior:"smooth",block:"start"});
}

/* ---------- 反馈操作行（仅持 token 的精选卡片） ---------- */
function actionRow(it){
  if(!TOKEN||it.tier!=="pick") return "";
  const ref=refOf(it);
  const rl=LS.get("news_rl")[itemKey(ref)];
  const liked=LS.get("news_like")[itemKey(ref)];
  const tracked=LS.get("news_tracked")[it.event_id]===true;
  return `<div class="acts">
    <span class="act ${rl?"done":""}" title="${rl?"再点一次移出稍后读":"加入稍后读"}" onclick="rlToggle(this,${jsArg(ref)})">${rl?"✓ 已收":"⏳ 稍后读"}</span>
    ${favBtn(it)}
    <span class="act ${liked?"done":""}" title="${liked?"再点一次撤销这条反馈":"让明天的排序更偏向类似内容"}" onclick="fbLike(this,${jsArg(ref)})">${liked?"👍 已记录":"👍 更多类似"}</span>
    ${it.event_id?`<span class="act ${tracked?"done":""}" onclick="fbTrack(${jsArg(ref)})">${tracked?"📌 追踪中":"📌 追踪"}</span>`:""}
    <span class="act" onclick="fbPanel(this,${jsArg(ref)},'src')">🚫 来源</span>
    <span class="act" onclick="fbPanel(this,${jsArg(ref)},'ni')">✕ 不感兴趣</span>
  </div>
  <div class="fb-panel"></div>`;
}

function fbPanel(el,id,kind){
  const panel=el.closest(".card").querySelector(".fb-panel");
  if(panel.dataset.kind===kind&&panel.innerHTML){panel.innerHTML="";panel.dataset.kind="";return;}
  panel.dataset.kind=kind;
  const it=state.itemsById[id]||{};
  if(kind==="src"){
    panel.innerHTML='<div class="fb-tip">哪个来源质量低？点击即提交</div><div class="chips">'+
      (it.sources||[]).map((s,i)=>`<span class="chip" onclick="fbSrc(this,${jsArg(id)},${i})">${esc(s.name)}</span>`).join("")+"</div>";
  }else{
    panel.innerHTML='<div class="fb-tip">为什么不感兴趣？（可多选，可不选）</div><div class="chips">'+
      NI_REASONS.map(r=>`<span class="chip" onclick="this.classList.toggle('on')">${r}</span>`).join("")+
      `</div><textarea class="fb-note" placeholder="补充说明（可选，会进兴趣画像）"></textarea>
      <div class="fb-btns"><button class="fb-go" onclick="fbNiSubmit(this,${jsArg(id)})">隐藏并提交</button>
      <button class="fb-cancel" onclick="fbPanel(this,${jsArg(id)},'ni')">取消</button></div>`;
  }
}

function fbBase(it){
  const p={date:it._date||state.date,item_id:it.id,title:it.title||"",category:it.category||""};
  if(it.event_id) p.event_id=it.event_id;
  return p;
}

function fbNiSubmit(el,id){
  const it=state.itemsById[id]||{};
  const panel=el.closest(".fb-panel");
  const reasons=[...panel.querySelectorAll(".chip.on")].map(c=>c.textContent);
  const note=(panel.querySelector(".fb-note")||{}).value||"";
  const hid=LS.get("news_hidden");
  hid[itemKey(id)]=it.title||id;
  LS.set("news_hidden",hid);
  render();
  toast("已隐藏，明天的排序会参考这条反馈");
  postState("feedback",{...fbBase(it),action:"not_interested",reasons,note})
    .catch(e=>toast("同步失败（本地已隐藏）："+e.message,true));
}

function fbLike(el,id){
  const it=state.itemsById[id]||{};
  const key=itemKey(id);
  const lk=LS.get("news_like");
  if(lk[key]){
    // 再点一次 = 删除式撤销：从 feedback.json 删掉那条记录
    delete lk[key];LS.set("news_like",lk);
    el.classList.remove("done");el.textContent="👍 更多类似";
    el.title="让明天的排序更偏向类似内容";
    postState("feedback",{...fbBase(it),action:"more_like_this",op:"remove"})
      .then(()=>toast("已撤销：更多类似"))
      .catch(e=>toast("撤销同步失败（本地已撤销）："+e.message,true));
    return;
  }
  lk[key]=1;LS.set("news_like",lk);
  el.classList.add("done");el.textContent="👍 已记录";
  el.title="再点一次撤销这条反馈";
  postState("feedback",{...fbBase(it),action:"more_like_this"})
    .then(()=>toast("已记录：更多类似内容"))
    .catch(e=>toast("同步失败："+e.message,true));
}

function fbSrc(el,id,srcIdx){
  const it=state.itemsById[id]||{};
  const src=(it.sources||[])[srcIdx];
  if(!src) return;
  el.classList.add("on");
  postState("feedback",{...fbBase(it),action:"low_quality_source",source:src.name})
    .then(()=>toast(`已记录：${src.name} 质量低`))
    .catch(e=>toast("同步失败："+e.message,true));
  setTimeout(()=>fbPanel(el,id,"src"),400);
}

function fbTrack(id){
  const it=state.itemsById[id]||{};
  if(!it.event_id) return;
  const lt=LS.get("news_tracked");
  const next=lt[it.event_id]!==true;
  lt[it.event_id]=next;
  LS.set("news_tracked",lt);
  render();
  postState("feedback",{...fbBase(it),action:next?"track":"untrack"})
    .then(()=>toast(next?"已钉选：即使不进精选也会出现在「追踪中」":"已取消追踪"))
    .catch(e=>toast("同步失败："+e.message,true));
}

function trkUntrack(eventId){
  // 标题从当日数据按 event_id 查，不经 onclick 属性传自由文本（防注入/断引号）
  const d=window.NEWS_DATA[state.date]||{};
  const t=(d.tracking||[]).find(x=>x.event_id===eventId)||{};
  const lt=LS.get("news_tracked");
  lt[eventId]=false;
  LS.set("news_tracked",lt);
  render();
  postState("feedback",{date:state.date,item_id:eventId,title:t.title||"",
    category:t.category||"",action:"untrack",event_id:eventId})
    .then(()=>toast("已取消追踪，明日生效"))
    .catch(e=>toast("同步失败："+e.message,true));
}

function rlToggle(el,id){
  const it=state.itemsById[id]||{};
  const key=itemKey(id);
  const rl=LS.get("news_rl");
  if(rl[key]){
    // 再点一次 = 移出稍后读，与抽屉里的「移除」同一条路
    delete rl[key];LS.set("news_rl",rl);
    el.classList.remove("done");el.textContent="⏳ 稍后读";
    el.title="加入稍后读";
    postState("read_later",{date:it._date||state.date,item_id:it.id||id,op:"remove"})
      .then(()=>toast("已移出稍后读"))
      .catch(e=>toast("同步失败（本地已移除）："+e.message,true));
    return;
  }
  // 深读条目 url 直接在条目上；新闻条目取首来源链接
  const url=it.url||((it.sources||[])[0]||{}).url||"";
  if(!/^https?:\/\//i.test(url)){toast("该条目没有可收藏的链接",true);return;}
  rl[key]=1;LS.set("news_rl",rl);
  el.classList.add("done");el.textContent="✓ 已收";
  el.title="再点一次移出稍后读";
  postState("read_later",{date:it._date||state.date,item_id:it.id||id,title:it.title_zh||it.title||"",
    category:it.category||"deep",url})
    .then(()=>toast("已加入稍后读"))
    .catch(e=>toast("同步失败："+e.message,true));
}

// ⭐ 收藏：独立于稍后读的永久精华库。只写 date+item_id 引用（收藏页凭它从
// daily/*.js 重渲染完整卡片），url 仅作兜底展示，没有外链也不阻断收藏。
function favBtn(it){
  const ref=refOf(it);
  const fav=LS.get("news_fav")[itemKey(ref)];
  return `<span class="act ${fav?"done":""}" title="${fav?"再点一次取消收藏":"收藏进精华库"}" onclick="favToggle(this,${jsArg(ref)})">${fav?"★ 已藏":"⭐ 收藏"}</span>`;
}
function favToggle(el,id){
  const it=state.itemsById[id]||{};
  const key=itemKey(id);
  const date=it._date||state.date, itemId=it.id||id;
  const fav=LS.get("news_fav");
  if(fav[key]){
    delete fav[key];LS.set("news_fav",fav);
    el.classList.remove("done");el.textContent="⭐ 收藏";el.title="收藏进精华库";
    postState("favorites",{date,item_id:itemId,op:"remove"})
      .then(()=>{toast("已取消收藏");if(state.view==="favs")renderFavs();})
      .catch(e=>toast("同步失败（本地已取消）："+e.message,true));
    return;
  }
  fav[key]=1;LS.set("news_fav",fav);
  el.classList.add("done");el.textContent="★ 已藏";el.title="再点一次取消收藏";
  const url=it.url||((it.sources||[])[0]||{}).url||"";
  const cat=it.category||(String(itemId).indexOf("paper-")===0?"paper":"deep");
  postState("favorites",{date,item_id:itemId,title:it.title_zh||it.title||"",category:cat,url})
    .then(()=>toast("已收藏"))
    .catch(e=>toast("同步失败："+e.message,true));
}

function restoreHidden(key){
  const hid=LS.get("news_hidden");
  if(key){delete hid[key];}else{
    for(const k of Object.keys(hid)) if(k.startsWith(state.date+":")) delete hid[k];
  }
  LS.set("news_hidden",hid);
  render();
}
function toggleShowHidden(){state.showHidden=!state.showHidden;render();}
function toggleTrk(el){el.closest(".trk").classList.toggle("open");}

function row(it){
  const main=it.sources[0]||{};
  return `<div class="row" data-id="${esc(it.id)}">
    <span class="score ${scoreCls(it.score)}">${it.score}</span>
    <span class="tag cat-${it.category}">${CAT[it.category]||it.category}</span>
    ${it.status?`<span class="tag st-${esc(it.status)}">${esc(it.status)}</span>`:""}
    <span class="rt"><a href="${esc(safeUrl(main.url))}" target="_blank" rel="noopener">${esc(it.title)}</a></span>
    <span class="rs">${esc(main.name||"")} · ${fmtTime(it.time)}</span>
  </div>`;
}

function render(){
  const d=window.NEWS_DATA[state.date];
  const app=document.getElementById("app");
  if(!d){app.innerHTML='<div class="empty">数据为空</div>';return;}
  const items=d.items||[];
  state.itemsById={};
  for(const it of items){it._date=state.date;state.itemsById[it.id]=it;}
  for(const dp of (d.deep||[])){dp._date=state.date;state.itemsById[dp.id]=dp;}
  for(const pp of (d.papers||[])){pp._date=state.date;state.itemsById[pp.id]=pp;}
  const HID=LS.get("news_hidden");
  const flt=it=>state.cat==="all"||it.category===state.cat;
  const pickPool=items.filter(i=>i.tier==="pick"&&flt(i)&&!HID[itemKey(i.id)]);
  const hiddenPicks=items.filter(i=>i.tier==="pick"&&flt(i)&&HID[itemKey(i.id)]);
  // 标签计数取自"当前类目下全部精选"（先于标签过滤），保证标签条始终完整
  const tagCounts={};
  for(const it of pickPool) for(const t of (it.tags||[])) tagCounts[t]=(tagCounts[t]||0)+1;
  if(state.tag&&!tagCounts[state.tag]) state.tag=null;
  const picks=state.tag?pickPool.filter(i=>(i.tags||[]).includes(state.tag)):pickPool;
  const mores=items.filter(i=>i.tier==="more"&&flt(i));
  const counts={all:items.length};
  for(const c of Object.keys(CAT)) counts[c]=items.filter(i=>i.category===c).length;

  let h="";
  if(d.brief){
    // 较昨日增量：延续=带跨天计数的精选，其余视为今日新事件
    const allPicks=items.filter(i=>i.tier==="pick");
    const contN=allPicks.filter(i=>(+i.day_count||0)>=2).length;
    const newN=allPicks.length-contN;
    const delta=[newN?`今日新事件 <b>${newN}</b>`:"",contN?`延续事件 <b>${contN}</b>`:""].filter(Boolean).join(" · ");
    h+=`<div class="brief"><div class="bt">今日导语 · ${esc(d.date)}</div><p>${esc(d.brief)}</p>${delta?`<div class="brief-delta">${delta}</div>`:""}</div>`;
  }
  // 今日主线：管线把相关条目拼成 2-3 条主线，点成员跳到对应卡（旧数据无 themes 自动跳过）
  const themes=Array.isArray(d.themes)?d.themes:[];
  if(themes.length){
    h+=`<div class="mainlines"><div class="ml-h">🧭 今日主线</div>`+themes.map(t=>{
      const chips=(t.member_ids||[]).map(id=>{
        const it=state.itemsById[id];
        if(!it) return "";
        return `<span class="ml-chip" onclick="jumpToItem(${jsArg(id)})" title="跳到这条">${esc(it.title)}</span>`;
      }).join("");
      return `<div class="ml-item"><div class="ml-t">${esc(t.title)}</div>`
        +(t.one_liner?`<div class="ml-o">${esc(t.one_liner)}</div>`:"")
        +(chips?`<div class="ml-chips">${chips}</div>`:"")+`</div>`;
    }).join("")+`</div>`;
  }
  const st=d.stats||{};
  const deep=d.deep||[],papers=d.papers||[],opinion=d.opinion||[];
  const trk=(d.tracking||[]).filter(t=>state.cat==="all"||t.category===state.cat);
  // 今日看点目录卡：版块条数 + 锚点 + 按默认可见字数估算的真实阅读时长
  const mins=estReadMinutes(d,pickPool,mores,deep,papers,opinion,trk);
  const secs=[["sec-picks","精选",pickPool.length],["sec-track","追踪",trk.length],
    ["sec-deep","深读",deep.length],["sec-papers","论文",papers.length],
    ["sec-opinion","舆论",opinion.length],["sec-more","更多",mores.length]].filter(s=>s[2]>0);
  h+=`<div class="toc"><span class="toc-t">今日看点</span>`+
    secs.map(([id,name,n])=>`<a onclick="scrollToSec('${id}')">${name} <b>${n}</b></a>`).join("")+
    `<span class="toc-meta">约 ${mins} 分钟 · 扫描 ${st.sources_count||"?"} 源 / ${st.raw_count||"?"} 条 · 生成于 ${d.generated_at?fmtTime(d.generated_at):""}</span></div>`;

  h+='<div class="tabs">'+["all",...Object.keys(CAT)].map(c=>
    `<span class="tab ${state.cat===c?"on":""}" onclick="setCat('${c}')">${c==="all"?"全部":CAT[c]}<span class="n">${counts[c]||0}</span></span>`
  ).join("")+"</div>";

  // 细粒度标签条：旧日期数据无 tags 字段时自动隐藏
  const tagList=Object.keys(tagCounts).sort((a,b)=>tagCounts[b]-tagCounts[a]);
  if(tagList.length){
    h+='<div class="tabs sub">'+tagList.map(t=>
      `<span class="tab sub ${state.tag===t?"on":""}" onclick="setTag(${jsArg(t)})">${esc(t)}<span class="n">${tagCounts[t]}</span></span>`
    ).join("")+"</div>";
  }

  h+=`<div class="sec-title" id="sec-picks">每日精选</div>`;
  h+=picks.length?`<div class="grid">${picks.map(card).join("")}</div>`:'<div class="empty">该分类下今天没有精选</div>';

  if(hiddenPicks.length){
    h+=`<div class="hidden-bar">已隐藏 ${hiddenPicks.length} 条 · <a onclick="toggleShowHidden()">${state.showHidden?"收起":"查看"}</a> · <a onclick="restoreHidden()">全部恢复</a></div>`;
    if(state.showHidden){
      h+=hiddenPicks.map(i=>`<div class="hidden-row"><span class="rt">${esc(i.title)}</span><a onclick="restoreHidden(${jsArg(itemKey(i.id))})">恢复</a></div>`).join("");
    }
  }

  // 追踪中：钉选事件是主动关注的，紧跟精选、先于深读（2026-07-10 上移）
  if(trk.length){
    h+=`<div class="sec-title" id="sec-track">追踪中 <span style="font-size:12px;color:var(--text3);font-weight:400">(${trk.length} 个钉选事件，点击展开进展)</span></div>`;
    h+=trk.map(t=>`<div class="trk">
      <div class="trk-top" onclick="toggleTrk(this)">
        <span class="tag day">📌 第${+t.day_count||1}天</span>
        <span class="tag cat-${esc(t.category)}">${CAT[t.category]||esc(t.category)}</span>
        <b>${esc(t.title)}</b>
        <span class="trk-upd">${t.updated_today?"今日有新进展":"今日无新进展 · 最后 "+esc(t.last_seen)}</span>
        ${TOKEN?`<span class="act" onclick="event.stopPropagation();trkUntrack(${jsArg(t.event_id)})">取消追踪</span>`:""}
      </div>
      <div class="trk-hist">${(t.history||[]).map(hh=>`<div><span class="eh-d">${esc(hh.date)}</span>${esc(hh.summary)}</div>`).join("")}</div>
    </div>`).join("");
  }

  // 深度阅读：管线深读频道推荐（0-3 篇，阈值制）
  if(deep.length){
    h+=`<div class="sec-title" id="sec-deep">深度阅读 <span style="font-size:12px;color:var(--text3);font-weight:400">(今日 ${deep.length} 篇长文推荐)</span></div>`;
    h+=deep.map(dp=>deepCard(dp)).join("");
  }

  // 今日论文：HF Daily Papers 社区精选（0-4 篇，阈值制，按学习坐标筛）
  if(papers.length){
    h+=`<div class="sec-title" id="sec-papers">今日论文 <span style="font-size:12px;color:var(--text3);font-weight:400">(今日 ${papers.length} 篇值得读的 arXiv 热门)</span></div>`;
    h+=papers.map(pp=>paperCard(pp)).join("");
  }

  // 舆论观察：热榜传播机制解读（0-3 条，热榜词条本身不进精选）
  if(opinion.length){
    h+=`<div class="sec-title" id="sec-opinion">舆论观察 <span style="font-size:12px;color:var(--text3);font-weight:400">(今日 ${opinion.length} 个传播现象)</span></div>`;
    h+=opinion.map(op=>`<div class="deep pulse" data-id="${esc(op.id)}">
      <div class="deep-top">
        <span class="tag stype">${esc(op.platform||"")}</span>
        <a class="deep-t" href="${esc(safeUrl(op.url))}" target="_blank" rel="noopener">${esc(op.title||op.word||"")}</a>
      </div>
      ${op.why_hot?`<div class="kv why"><b>为何热</b> · ${esc(op.why_hot)}</div>`:""}
      ${op.emotion?`<div class="kv"><b>群体情绪</b> · ${esc(op.emotion)}</div>`:""}
      ${op.mechanism?`<div class="kv"><b>平台机制</b> · ${esc(op.mechanism)}</div>`:""}
    </div>`).join("");
  }

  if(mores.length){
    h+=`<div class="sec-title" id="sec-more">更多资讯 <span style="font-size:12px;color:var(--text3);font-weight:400">(${mores.length} 条)</span></div>`;
    if(state.moreOpen){
      h+=`<div class="more-list">${mores.map(row).join("")}</div>`;
      h+=`<button class="toggle-more" onclick="toggleMore()">收起 ▲</button>`;
    }else{
      h+=`<div class="more-list">${mores.slice(0,5).map(row).join("")}</div>`;
      if(mores.length>5) h+=`<button class="toggle-more" onclick="toggleMore()">展开全部 ${mores.length} 条 ▼</button>`;
    }
  }
  app.innerHTML=h;
  updateNav();
  if(state.pendingHighlight){
    const el=document.querySelector(`[data-id="${CSS.escape(state.pendingHighlight)}"]`);
    state.pendingHighlight=null;
    if(el){
      el.scrollIntoView({block:"center"});
      el.classList.add("hl");
      setTimeout(()=>el.classList.remove("hl"),2600);
    }
  }
}

function setCat(c){state.cat=c;state.tag=null;state.view==="picks"?renderPicksFeed():render();}
function setTag(t){state.tag=(state.tag===t?null:t);render();}
// 从「今日主线」跳到成员卡：清掉筛选保证目标可见，more 成员先展开长尾，复用高亮机制
function jumpToItem(id){
  const it=state.itemsById[id];
  if(!it) return;
  state.cat="all"; state.tag=null;
  if(it.tier==="more") state.moreOpen=true;
  state.pendingHighlight=id;
  render();
}
function toggleMore(){state.moreOpen=!state.moreOpen;render();}

/* ---------- 统一详情页（新闻 / 深读 / 论文，页内路由） ---------- */
// 路由辅助：type ↔ 数据数组的映射与 URL 读写（内联保持单文件架构）
const NewsDetail=(()=>{
  const TYPES={news:"items",deep:"deep",paper:"papers"};
  const normalizeType=t=>Object.prototype.hasOwnProperty.call(TYPES,t)?t:"news";
  return {
    normalizeType,
    findItem:(d,type,id)=>((d&&d[TYPES[normalizeType(type)]])||[]).find(x=>x.id===id)||null,
    buildUrl:(date,type,item)=>"?date="+encodeURIComponent(date)+"&type="+encodeURIComponent(normalizeType(type))+"&item="+encodeURIComponent(item),
    readRoute:s=>{const p=new URLSearchParams(s||"");return {date:p.get("date"),type:normalizeType(p.get("type")),item:p.get("item")};}
  };
})();

function detailMeta(it,type){
  const kind={news:"新闻事件",deep:"深读文章",paper:"研究论文"}[type];
  let tags=`<span class="detail-kind">${kind}</span>`;
  if(typeof it.score==="number") tags+=`<span class="score ${scoreCls(it.score)}">${it.score}</span>`;
  if(type==="news"){
    tags+=`<span class="tag cat-${esc(it.category)}">${CAT[it.category]||esc(it.category||"")}</span>`;
    if(it.status) tags+=`<span class="tag st-${esc(it.status)}">${esc(it.status)}</span>`;
    if(+it.day_count>=2) tags+=`<span class="tag day">第${+it.day_count}天</span>`;
    tags+=(it.tags||[]).map(t=>`<span class="tag topic">${esc(t)}</span>`).join("");
    if(it.source_type) tags+=`<span class="tag stype">${esc(it.source_type)}</span>`;
    if(it.time){
      const rel=fmtTime(it.time);   // 24h 内是"X 前"，之外 fmtTime 已是短绝对格式，拼上就重复了
      tags+=`<span class="time">${fmtAbs(it.time)}${rel.includes("前")?" · "+rel:""}</span>`;
    }
  }else if(type==="deep"){
    tags+=`<span class="tag mins">约 ${+it.read_minutes||"?"} 分钟</span>`;
    if(it.source) tags+=`<span class="tag stype">${esc(it.source)}</span>`;
    if(it.lang==="en") tags+='<span class="tag stype">EN</span>';
  }else{
    tags+=`<span class="tag mins">${+it.upvotes||0} 赞</span>`;
    if(it.has_code) tags+='<span class="tag code">含代码</span>';
    tags+='<span class="tag stype">arXiv</span>';
  }
  return `<div class="card-top">${tags}</div>`;
}

function claimHtml(it){
  const labels={fact:"事实",analysis:"判断",uncertain:"待核实"};
  const claims=(it.claims||[]).filter(c=>c&&c.text);
  if(!claims.length) return "";
  return `<div class="detail-sec-t">结论与证据</div><div class="detail-claims">`+claims.map(c=>{
    const kind=labels[c.kind]?c.kind:"uncertain";
    const names=(c.sources||[]).filter(Boolean);
    return `<div class="detail-claim kind-${kind}"><span class="claim-kind">${labels[kind]}</span>${esc(c.text)}${names.length?`<div class="claim-sources">依据：${names.map(esc).join("、")}</div>`:""}</div>`;
  }).join("")+`</div>`;
}

/* ---------- 导出 Markdown：把当前详情条目复制为 MD（剪贴板失败时降级下载） ---------- */
function detailMarkdown(it,type,date){
  const L=[];
  const lab={fact:"事实",analysis:"判断",uncertain:"待核实"};
  L.push("# "+(type==="news"?it.title:(it.title_zh||it.title||"")),"");
  L.push("- 日期："+date+(it.time?"（"+fmtAbs(it.time)+"）":""));
  if(type==="news"){
    L.push("- 分类："+(CAT[it.category]||it.category||"")+(it.status?" · "+it.status:"")+(typeof it.score==="number"?" · "+it.score+"分":""));
    if(it.significance) L.push("","**对我的意义** · "+it.significance);
    if(it.why) L.push("","**为什么重要** · "+it.why);
    if(it.summary) L.push("","> "+it.summary);
    if(it.detail) L.push("","## 发生了什么","",it.detail);
    const cl=(it.claims||[]).filter(c=>c&&c.text);
    if(cl.length){
      L.push("","## 结论与证据","");
      for(const c of cl) L.push("- 【"+(lab[c.kind]||"待核实")+"】"+c.text+((c.sources||[]).length?"（依据："+c.sources.join("、")+"）":""));
    }
    if(it.context) L.push("","**背景与机制** · "+it.context);
    if(it.watch) L.push("","**后续关注** · "+it.watch);
    if((it.sources||[]).length){
      L.push("","## 来源","");
      for(const s of it.sources) L.push("- ["+s.name+"]("+s.url+")");
    }
  }else if(type==="deep"){
    if(it.takeaway) L.push("","**读完带走** · "+it.takeaway);
    if(it.brief) L.push("","> "+it.brief);
    if((it.key_points||[]).length){L.push("","## 核心观点","");for(const k of it.key_points) L.push("- "+k);}
    if(it.why) L.push("","**为什么值得读** · "+it.why);
    if(it.audience) L.push("","**适合谁读** · "+it.audience);
    L.push("","原文："+(it.url||""));
  }else{
    if(it.takeaway) L.push("","**学习价值** · "+it.takeaway);
    if(it.brief) L.push("","> "+it.brief);
    if(it.contribution) L.push("","**核心贡献** · "+it.contribution);
    if(it.evidence) L.push("","**证据与实验** · "+it.evidence);
    if(it.limitations) L.push("","**适用边界** · "+it.limitations);
    if(it.why) L.push("","**为什么值得读** · "+it.why);
    L.push("","原文："+(it.url||""));
  }
  return L.join("\n")+"\n";
}
function exportDetailMd(){
  const it=state.itemsById[state.detailId];
  if(!it){toast("条目未加载",true);return;}
  const md=detailMarkdown(it,state.detailType,it._date||state.date);
  const fallback=()=>{
    const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([md],{type:"text/markdown"}));
    a.download=(it._date||state.date)+"-"+(it.id||"item")+".md";
    a.click();URL.revokeObjectURL(a.href);
    toast("剪贴板不可用，已下载 .md");
  };
  if(navigator.clipboard&&navigator.clipboard.writeText)
    navigator.clipboard.writeText(md).then(()=>toast("已复制 Markdown")).catch(fallback);
  else fallback();
}

function renderNewsDetail(it){
  const takeaway=it.significance||it.why;
  const takeawayLabel=it.significance?"对我的意义":"为什么值得关注";
  const body=it.detail
    ? esc(it.detail).split(/\n+/).filter(p=>p.trim()).map(p=>`<p>${p}</p>`).join("")
    : `<p>${esc(it.summary||"")}</p><div class="detail-fallback-note">较早日报暂无完整叙述，以下按已有要点展示。</div>`;
  const hist=(it.history||[]).map(x=>`<div><span class="eh-d">${esc(x.date)}</span>${esc(x.summary)}</div>`).join("");
  let h=takeaway?`<div class="detail-takeaway"><span class="label">${takeawayLabel}</span><p>${esc(takeaway)}</p></div>`:"";
  if(it.summary) h+=`<div class="detail-lede">${esc(it.summary)}</div>`;
  h+=`<div class="detail-sec-t">发生了什么</div><div class="detail-body">${body}</div>`;
  h+=claimHtml(it);
  const kv=[];
  // takeaway 卡只占用了 significance||why 中的一个；另一个仍是独立维度，回到字段区展示
  if(it.significance&&it.why) kv.push(`<div class="kv why"><b>为什么重要</b> · ${esc(it.why)}</div>`);
  if(it.context) kv.push(`<div class="kv ctx"><b>背景与机制</b> · ${esc(it.context)}</div>`);
  if(it.watch) kv.push(`<div class="kv watch"><b>后续关注</b> · ${esc(it.watch)}</div>`);
  if(kv.length) h+=`<div class="detail-kv">${kv.join("")}</div>`;
  if(+it.day_count>=2&&hist) h+=`<div class="detail-sec-t">事件进展</div><div class="ev-history open">${hist}</div>`;
  return h;
}

function renderDeepDetail(it){
  let h=it.takeaway?`<div class="detail-takeaway"><span class="label">读完带走</span><p>${esc(it.takeaway)}</p></div>`:"";
  if(it.brief) h+=`<div class="detail-lede">${esc(it.brief)}</div>`;
  if((it.key_points||[]).length) h+=`<div class="detail-sec-t">核心观点</div><ul class="detail-list">${it.key_points.map(x=>`<li>${esc(x)}</li>`).join("")}</ul>`;
  const kv=[];
  if(it.why) kv.push(`<div class="kv why"><b>为什么值得读</b> · ${esc(it.why)}</div>`);
  if(it.audience) kv.push(`<div class="kv ctx"><b>适合谁读</b> · ${esc(it.audience)}</div>`);
  if(kv.length) h+=`<div class="detail-kv">${kv.join("")}</div>`;
  if(it.lang==="en"&&it.title!==it.title_zh) h+=`<div class="detail-fallback-note">原题：${esc(it.title||"")}</div>`;

}

function renderPaperDetail(it){
  let h=it.takeaway?`<div class="detail-takeaway"><span class="label">对我的学习价值</span><p>${esc(it.takeaway)}</p></div>`:"";
  if(it.brief) h+=`<div class="detail-lede">${esc(it.brief)}</div>`;
  const kv=[];
  if(it.contribution) kv.push(`<div class="kv why"><b>核心贡献</b> · ${esc(it.contribution)}</div>`);
  if(it.evidence) kv.push(`<div class="kv ctx"><b>证据与实验</b> · ${esc(it.evidence)}</div>`);
  if(it.limitations) kv.push(`<div class="kv watch"><b>适用边界</b> · ${esc(it.limitations)}</div>`);

  if(it.title&&it.title!==it.title_zh) h+=`<div class="detail-fallback-note">原题：${esc(it.title)}</div>`;

function renderDetail(date,type,id){
  type=NewsDetail.normalizeType(type);

  document.getElementById("viewBtn").textContent="🗓 周视图";
  const app=document.getElementById("app");

  if(!it){
    app.innerHTML='<div class="empty">找不到这条内容（可能数据未加载）<br><br><a class="dback" onclick="backToDay()">← 返回 '+esc(date)+' 当日</a></div>';

  }
  it._date=date;
  state.itemsById[id]=it;   // 并入而非整表替换，避免清掉跨天流/收藏页的注册

  h+=detailMeta(it,type)+`<h1 class="detail-title">${esc(title||"")}</h1>`;
  h+=type==="news"?renderNewsDetail(it):type==="deep"?renderDeepDetail(it):renderPaperDetail(it);
  h+=`<div class="detail-sec-t">${type==="news"?"来源":"继续阅读"}</div>`;
  if(type==="news") h+=detailSources(it);
  else h+=`<a class="detail-link" href="${esc(safeUrl(it.url))}" target="_blank" rel="noopener">打开原文 ↗</a>`;

  h+="</div>";

}
// 读当前 URL 决定渲染当日还是详情（供 popstate / 初始化调用）
function routeFromUrl(){
  const p=new URLSearchParams(location.search);
  if(p.get("view")==="topics"){enterTopics(false);return;}
  if(p.get("view")==="favs"&&TOKEN){enterFavs(false);return;}
  const route=NewsDetail.readRoute(location.search);
  const qd=route.date, qi=route.item;
  const M=window.NEWS_MANIFEST||[];
  const dt=(qd&&M.indexOf(qd)>=0)?qd:(state.date||M[0]);
  if(!dt) return;
  const sel=document.getElementById("dateSel");
  if(sel&&[...sel.options].some(o=>o.value===dt)) sel.value=dt;
  if(qi) showDetail(dt,route.type,qi);
  else gotoDay(dt);
}

/* ---------- 稍后读抽屉 ---------- */
function openRl(){

async function loadRl(){
  const dr=document.getElementById("rlDrawer");
  dr.innerHTML='<div class="rl-head">📥 稍后读 <span class="rl-close" onclick="openRl()">✕</span></div><div class="empty">加载中…</div>';
  try{
    const data=await getState("read_later");
    const all=(data.items||[]).slice().reverse();
    const todo=all.filter(i=>!i.done), done=all.filter(i=>i.done).slice(0,20);
    const row=i=>`<div class="rl-item ${i.done?"done":""}">
      <div class="rl-t"><a href="${esc(safeUrl(i.url))}" target="_blank" rel="noopener">${esc(i.title||i.item_id)}</a></div>
      <div class="rl-meta">${esc(i.date||"")} · ${CAT[i.category]||esc(i.category||"")}</div>
      <div class="rl-ops">${i.done?"":`<span onclick="rlOp(${jsArg(i.item_id)},${jsArg(i.date)},'done')">✓ 读完了</span>`}
      <span onclick="rlOp(${jsArg(i.item_id)},${jsArg(i.date)},'remove')">✕ 移除</span></div>
    </div>`;
    dr.innerHTML='<div class="rl-head">📥 稍后读 <span class="rl-close" onclick="openRl()">✕</span></div>'
      +(todo.length?todo.map(row).join(""):'<div class="empty" style="padding:20px 0">队列是空的</div>')
      +(done.length?'<div class="rl-head" style="margin-top:18px;font-size:13px;color:var(--text3)">最近读完</div>'+done.map(row).join(""):"");
  }catch(e){
    dr.innerHTML='<div class="rl-head">📥 稍后读 <span class="rl-close" onclick="openRl()">✕</span></div><div class="empty">加载失败：'+esc(e.message)+"</div>";
  }
}
function rlOp(id,date,op){
  postState("read_later",{date,item_id:id,op})
    .then(()=>{if(op==="remove"){const rl=LS.get("news_rl");delete rl[date+":"+id];LS.set("news_rl",rl);}loadRl();})
    .catch(e=>toast("操作失败："+e.message,true));

async function renderFavs(){
  const app=document.getElementById("app");
  app.innerHTML='<div class="empty">加载收藏…</div>';
  let favs;
  try{
    favs=(await getState("favorites")).items||[];
  }catch(e){
    if(state.view!=="favs") return;
    app.innerHTML='<div class="empty">加载失败：'+esc(e.message)+'</div>';
    updateNav();return;
  }
  if(state.view!=="favs") return;
  if(!favs.length){
    app.innerHTML='<div class="empty">还没有收藏。在精选、深度阅读或今日论文的卡片上点 ⭐ 收藏，它们会沉淀到这里。</div>';
    updateNav();return;
  }
  // 服务端是收藏的真源：把引用键并入本地缓存，换设备后卡片上的 ★ 高亮才一致
  const lf=LS.get("news_fav");
  for(const f of favs) lf[f.date+":"+f.item_id]=1;
  LS.set("news_fav",lf);
  const dates=[...new Set(favs.map(f=>f.date))].sort().reverse();
  await loadDates(dates);
  if(state.view!=="favs") return;
  state.itemsById={};
  let h=`<div class="sec-title">⭐ 收藏 <span style="font-size:12px;color:var(--text3);font-weight:400">(${favs.length} 条 · 按日报日期分组 · 再点一次 ★ 取消收藏)</span></div>`;
  for(const dt of dates){
    const d=(window.NEWS_DATA||{})[dt];
    const wanted=new Set(favs.filter(f=>f.date===dt).map(f=>f.item_id));
    const total=wanted.size;
    // 组内保持日报原序：精选 → 深读 → 论文
    const cards=[];
    if(d){
      for(const it of (d.items||[])) if(wanted.has(it.id)){it._date=dt;state.itemsById[refOf(it)]=it;cards.push(card(it));wanted.delete(it.id);}
      for(const dp of (d.deep||[])) if(wanted.has(dp.id)){dp._date=dt;state.itemsById[refOf(dp)]=dp;cards.push(deepCard(dp));wanted.delete(dp.id);}
      for(const pp of (d.papers||[])) if(wanted.has(pp.id)){pp._date=dt;state.itemsById[refOf(pp)]=pp;cards.push(paperCard(pp));wanted.delete(pp.id);}
    }
    // 数据文件缺失或条目找不回（理论不发生）：降级为收藏记录自身的链接行
    for(const f of favs) if(f.date===dt&&wanted.has(f.item_id))
      cards.push(`<div class="row"><span class="rt"><a href="${esc(safeUrl(f.url))}" target="_blank" rel="noopener">${esc(f.title||f.item_id)}</a></span><span class="rs">${CAT[f.category]||esc(f.category||"")}</span></div>`);
    h+=`<div class="feed-day">${esc(dt)}<span class="n">${total} 条</span></div>`;
    h+=cards.join("");
  }
  app.innerHTML=h;
  updateNav();
}

let idxLoading=false;
function ensureIndex(cb){
  if(window.NEWS_INDEX){cb&&cb();return;}
  if(idxLoading) return;
  idxLoading=true;
  const s=document.createElement("script");
  s.src="data/search_index.js";
  s.onload=()=>{cb&&cb();};
  s.onerror=()=>{window.NEWS_INDEX=[];cb&&cb();};
  document.head.appendChild(s);
}
function doSearch(){
  const box=document.getElementById("searchRes");
  const q=document.getElementById("searchInput").value.trim().toLowerCase();
  if(!q){box.innerHTML="";box.classList.remove("open");return;}
  const terms=q.split(/\s+/);
  const hits=(window.NEWS_INDEX||[]).filter(r=>{
    const hay=((r[4]||"")+" "+(r[5]||"")).toLowerCase();
    return terms.every(t=>hay.includes(t));
  }).slice(0,30);
  box.classList.add("open");
  box.innerHTML=hits.length?hits.map(r=>
    `<div class="sr" onclick="gotoItem(${jsArg(r[0])},${jsArg(r[1])})"><span class="sr-d">${esc(r[0])}</span><span class="sr-c">${r[2]==="deep"?"深读":(CAT[r[3]]||esc(r[3]))}</span>${esc(r[4])}</div>`
  ).join(""):'<div class="sr none">没有匹配条目</div>';

function gotoItem(date,id){
