<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日驾驶舱 · Daily Briefing</title>
<link rel="alternate" type="application/rss+xml" title="每日驾驶舱" href="data/feed.xml">
<script>
/* 亮暗跟随博客：读 Fluid 的 localStorage 键，未设置则跟随系统 */
(function(){
  var KEY="Fluid_Color_Scheme";
  function apply(){
    var v=null;
    try{v=localStorage.getItem(KEY);}catch(e){}
    if(v!=="light"&&v!=="dark")
      v=(window.matchMedia&&matchMedia("(prefers-color-scheme: dark)").matches)?"dark":"light";
    document.documentElement.dataset.theme=v;
  }
  apply();
  window.addEventListener("storage",function(e){if(e.key===KEY)apply();});
  if(window.matchMedia){
    var mq=matchMedia("(prefers-color-scheme: dark)");
    if(mq.addEventListener) mq.addEventListener("change",apply);
  }
})();
</script>
<style>
:root{
  --bg:#ead8c2; --bg-soft:#f5ebdc; --bg2:rgba(255,249,239,.92);
  --card:rgba(255,249,239,.94); --card-h:#fff8ec;
  --border:rgba(76,48,28,.14); --border2:rgba(76,48,28,.26);
  --text:#342418; --text2:#735d49; --text3:#9c8368; --heading:#21150e;
  --accent:#9b6237; --accent2:#6f3d20; --accent-soft:rgba(155,98,55,.12);
  --shadow:0 14px 32px rgba(60,38,22,.08);
  --shadow2:0 24px 58px rgba(60,38,22,.16);
  --ok:#2e6b34; --ok-bg:rgba(46,107,52,.12);
  --dev:#2f5f8f; --dev-bg:rgba(47,95,143,.12);
  --dispute:#a85417; --dispute-bg:rgba(168,84,23,.12);
  --rumor:#ab3226; --rumor-bg:rgba(171,50,38,.12);
  --glow1:rgba(149,91,48,.18); --glow2:rgba(255,238,211,.34);
  --texture:rgba(111,61,32,.7); --texture2:rgba(111,61,32,.55); --texture-op:.14;
}
[data-theme="dark"]{
  --bg:#1d1712; --bg-soft:#2a2119; --bg2:rgba(25,19,15,.92);
  --card:rgba(35,28,22,.94); --card-h:#2d231b;
  --border:rgba(244,207,167,.12); --border2:rgba(244,207,167,.24);
  --text:#f0dfcb; --text2:#d0b99f; --text3:#a38d75; --heading:#fff7ec;
  --accent:#e0ad78; --accent2:#f3c796; --accent-soft:rgba(224,173,120,.14);
  --shadow:0 14px 32px rgba(0,0,0,.35);
  --shadow2:0 24px 58px rgba(0,0,0,.48);
  --ok:#86c98e; --ok-bg:rgba(134,201,142,.14);
  --dev:#8fb7e8; --dev-bg:rgba(143,183,232,.14);
  --dispute:#e8a860; --dispute-bg:rgba(232,168,96,.14);
  --rumor:#e78b82; --rumor-bg:rgba(231,139,130,.14);
  --glow1:rgba(155,98,55,.2); --glow2:rgba(224,173,120,.12);
  --texture:rgba(224,173,120,.55); --texture2:rgba(224,173,120,.42); --texture-op:.31;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:
    radial-gradient(circle at 0% 0%,var(--glow1),transparent 32%),
    radial-gradient(circle at 100% 0%,var(--glow2),transparent 24%),
    linear-gradient(180deg,var(--bg-soft),var(--bg)) var(--bg);
  background-attachment:fixed;
  color:var(--text);font-family:-apple-system,"Segoe UI","Microsoft YaHei",sans-serif;font-size:14px;line-height:1.6}
/* 博客同款格纹纸纹理 */
body::before{
  content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:var(--texture-op);
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 23px,var(--texture) 23px,var(--texture) 24px),
    repeating-linear-gradient(90deg,transparent,transparent 23px,var(--texture2) 23px,var(--texture2) 24px);
  -webkit-mask-image:linear-gradient(90deg,black,transparent 45%,transparent 55%,black);
  mask-image:linear-gradient(90deg,black,transparent 45%,transparent 55%,black);
}
a{color:var(--accent2);text-decoration:none}
a:hover{text-decoration:underline}

.wrap{max-width:1180px;margin:0 auto;padding:0 20px 60px;position:relative;z-index:1}

/* ---------- header ---------- */
header{border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:10;
  backdrop-filter:saturate(160%) blur(18px);-webkit-backdrop-filter:saturate(160%) blur(18px)}
.hbar{max-width:1180px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.logo{font-size:19px;font-weight:700;letter-spacing:.5px;color:var(--heading)}
.logo span{color:var(--accent)}
.datenav{display:flex;align-items:center;gap:6px;margin-left:auto}
.datenav button{background:var(--card-h);border:1px solid var(--border2);color:var(--text);padding:5px 11px;border-radius:6px;cursor:pointer;font-size:13px}
.datenav button:hover:not(:disabled){border-color:var(--accent);color:var(--accent2)}
.datenav button:disabled{opacity:.35;cursor:default}
.datenav select{background:var(--card-h);border:1px solid var(--border2);color:var(--text);padding:5px 8px;border-radius:6px;font-size:13px;cursor:pointer}

/* ---------- brief ---------- */
.brief{margin:22px 0 6px;padding:16px 18px;background:var(--card-h);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:8px;box-shadow:var(--shadow)}
.brief .bt{font-size:12px;color:var(--accent2);font-weight:600;letter-spacing:1px;margin-bottom:6px}
.brief p{color:var(--text);font-size:14.5px}
.meta-line{color:var(--text3);font-size:12.5px;margin:10px 2px 0}
.meta-line b{color:var(--text2);font-weight:600}

/* ---------- filter tabs ---------- */
.tabs{display:flex;gap:8px;margin:20px 0 4px;flex-wrap:wrap}
.tab{padding:6px 15px;border-radius:20px;border:1px solid var(--border2);background:var(--card);color:var(--text2);cursor:pointer;font-size:13px;transition:.15s}
.tab:hover{border-color:var(--accent)}
.tab.on{background:var(--accent);border-color:var(--accent);color:var(--card-h);font-weight:600}
.tab .n{opacity:.7;font-size:11.5px;margin-left:3px}
.tabs.sub{margin:10px 0 0}
.tab.sub{padding:3px 11px;font-size:12px;border-radius:14px}

/* ---------- section ---------- */
.sec-title{margin:26px 0 14px;font-size:15.5px;font-weight:700;letter-spacing:1px;color:var(--heading);display:flex;align-items:center;gap:10px}
.sec-title::before{content:"";width:16px;height:3px;border-radius:2px;background:var(--accent)}
.sec-title::after{content:"";flex:1;height:1px;background:var(--border2)}

/* ---------- pick cards ---------- */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:860px){.grid{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px 18px 14px;display:flex;flex-direction:column;gap:9px;transition:.15s;box-shadow:var(--shadow)}
.card:hover{background:var(--card-h);border-color:var(--border2)}
.card-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.score{font-weight:800;font-size:15px;min-width:40px;text-align:center;padding:2px 8px;border-radius:6px;background:transparent}
.score.hi{background:var(--accent);color:var(--card-h)}
.score.mid{color:var(--accent2);box-shadow:inset 0 0 0 1px var(--accent)}
.score.lo{color:var(--text3);box-shadow:inset 0 0 0 1px var(--border2)}
.tag{font-size:11.5px;padding:2px 9px;border-radius:10px;font-weight:600}
.tag.cat-ai,.tag.cat-tech,.tag.cat-finance,.tag.cat-society,.tag.cat-world{
  background:transparent;border:1px solid var(--border2);color:var(--text2);font-weight:500}
.tag.st-已确认{background:var(--ok-bg);color:var(--ok)}
.tag.st-发展中{background:var(--dev-bg);color:var(--dev)}
.tag.st-有争议{background:var(--dispute-bg);color:var(--dispute)}
.tag.st-仅传言{background:var(--rumor-bg);color:var(--rumor)}
.tag.stype{background:transparent;border:1px solid var(--border);color:var(--text3);font-weight:400}
.tag.topic{background:transparent;border:1px dashed var(--border2);color:var(--text2);font-weight:400}
.tag.day{background:var(--accent-soft);color:var(--accent2);cursor:pointer;user-select:none}
.tag.day:hover{color:var(--accent)}
.ev-history{display:none;font-size:12.5px;color:var(--text2);border-left:2px solid var(--accent);padding-left:10px}
.ev-history.open{display:block}
.ev-history .eh-d{color:var(--text3);margin-right:6px}
.card h3{font-size:15.5px;line-height:1.45;font-weight:700;color:var(--heading)}
.card .sum{color:var(--text);font-size:13.5px}
.kv{font-size:13px;color:var(--text2);padding-left:10px;border-left:2px solid var(--border2)}
.kv b{color:var(--text2);font-weight:600}
.kv.why{border-left-color:var(--accent)}
.kv.watch{border-left-color:var(--border2)}
.srcs{display:flex;flex-wrap:wrap;gap:6px 12px;margin-top:auto;padding-top:8px;border-top:1px dashed var(--border2);font-size:12px}
.srcs a{color:var(--text2)}
.srcs a:hover{color:var(--accent2)}
.srcs .stp{color:var(--text3);font-size:11px}
.time{color:var(--text3);font-size:11.5px;margin-left:auto}

/* ---------- more list ---------- */
.more-list{display:flex;flex-direction:column;gap:6px}
.row{display:flex;align-items:baseline;gap:10px;padding:9px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;flex-wrap:wrap}
.row:hover{background:var(--card-h)}
.row .score{font-size:12.5px;min-width:34px;padding:1px 6px}
.row .rt{font-weight:600;font-size:13.5px;flex:1;min-width:200px}
.row .rt a{color:var(--text)}
.row .rs{color:var(--text3);font-size:12px}
.toggle-more{margin:14px auto 0;display:block;background:var(--card);border:1px solid var(--border);color:var(--text2);padding:8px 26px;border-radius:20px;cursor:pointer;font-size:13px}
.toggle-more:hover{border-color:var(--accent);color:var(--text)}

/* ---------- 反馈操作（仅持 token 可见） ---------- */
.acts{display:flex;gap:8px;flex-wrap:wrap;padding-top:6px;border-top:1px dashed var(--border)}
.act{font-size:12px;color:var(--text3);cursor:pointer;border:1px solid var(--border);border-radius:12px;padding:2px 10px;user-select:none}
.act:hover{color:var(--text);border-color:var(--accent)}
.act.done{color:var(--ok);border-color:var(--ok)}
.fb-panel:empty{display:none}
.fb-panel{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.fb-tip{font-size:12px;color:var(--text2);margin-bottom:6px}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{font-size:12px;padding:3px 10px;border-radius:12px;border:1px solid var(--border);cursor:pointer;color:var(--text2);user-select:none}
.chip.on,.chip:hover{border-color:var(--accent);color:var(--accent2)}
.fb-note{width:100%;margin-top:8px;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:6px 8px;font-size:12.5px;min-height:44px;resize:vertical;font-family:inherit}
.fb-btns{margin-top:8px;display:flex;gap:8px}
.fb-go{background:var(--accent);border:none;color:var(--card-h);padding:5px 14px;border-radius:6px;cursor:pointer;font-size:12.5px}
.fb-cancel{background:var(--card);border:1px solid var(--border);color:var(--text2);padding:5px 14px;border-radius:6px;cursor:pointer;font-size:12.5px}
.hidden-bar{margin-top:10px;font-size:12.5px;color:var(--text3)}
.hidden-bar a{cursor:pointer}
.hidden-row{display:flex;gap:10px;padding:6px 12px;background:var(--card);border:1px solid var(--border);border-radius:6px;margin-top:6px;font-size:12.5px;color:var(--text3);align-items:baseline}
.hidden-row .rt{flex:1}
.hidden-row a{cursor:pointer}
/* ---------- 追踪中 ---------- */
.trk{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:8px;padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow)}
.trk-top{display:flex;gap:8px;align-items:center;flex-wrap:wrap;cursor:pointer}
.trk-top b{font-size:13.5px}
.trk-upd{font-size:12px;color:var(--text3);margin-left:auto}
.trk-hist{display:none;margin-top:8px;font-size:12.5px;color:var(--text2);border-left:2px solid var(--accent);padding-left:10px}
.trk.open .trk-hist{display:block}
/* ---------- 搜索 ---------- */
.searchbox{position:relative}
.searchbox input{background:var(--card);border:1px solid var(--border);color:var(--text);padding:5px 11px;border-radius:6px;font-size:13px;width:190px}
.searchbox input:focus{outline:none;border-color:var(--accent)}
.search-res{display:none;position:absolute;top:115%;left:0;width:min(440px,90vw);max-height:60vh;overflow-y:auto;background:var(--card-h);border:1px solid var(--border2);border-radius:8px;z-index:40;box-shadow:var(--shadow2)}
.search-res.open{display:block}
.sr{padding:8px 12px;font-size:12.5px;cursor:pointer;border-bottom:1px solid var(--border);color:var(--text)}
.sr:last-child{border-bottom:none}
.sr:hover{background:var(--card-h)}
.sr-d{color:var(--text3);margin-right:8px;font-size:11.5px}
.sr-c{color:var(--accent2);margin-right:8px;font-size:11.5px}
.sr.none{color:var(--text3);cursor:default}
.card.hl,.row.hl,.deep.hl{outline:2px solid var(--accent)}
/* ---------- 深度阅读 ---------- */
.deep{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:8px;padding:12px 14px;margin-bottom:8px;display:flex;flex-direction:column;gap:8px;box-shadow:var(--shadow)}
.deep-top{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.deep-t{font-weight:700;font-size:14.5px;color:var(--text)}
.tag.mins{background:var(--accent-soft);color:var(--accent2)}
/* ---------- 周视图 ---------- */
.wk-day{margin-bottom:16px}
.wk-date{font-weight:700;font-size:14px;margin-bottom:6px;color:var(--accent2);cursor:pointer}
.wk-date:hover{text-decoration:underline}
/* ---------- 稍后读抽屉 ---------- */
.drawer{position:fixed;top:0;right:-400px;width:min(380px,92vw);height:100%;background:var(--card-h);border-left:1px solid var(--border2);z-index:50;transition:right .2s;padding:16px 18px;overflow-y:auto;box-shadow:var(--shadow2)}
.drawer.open{right:0}
.rl-head{font-weight:700;margin-bottom:12px;display:flex;justify-content:space-between;font-size:15px}
.rl-close{cursor:pointer;color:var(--text3)}
.rl-item{padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.rl-item.done .rl-t a{text-decoration:line-through;color:var(--text3)}
.rl-meta{font-size:11.5px;color:var(--text3);margin-top:2px}
.rl-ops{margin-top:4px;display:flex;gap:12px;font-size:12px}
.rl-ops span{cursor:pointer;color:var(--text3)}
.rl-ops span:hover{color:var(--accent2)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--card-h);border:1px solid var(--accent);color:var(--text);padding:8px 18px;border-radius:8px;z-index:60;font-size:13px;box-shadow:var(--shadow)}
.toast.err{border-color:var(--rumor)}

/* ---------- 英语单词本 ---------- */
.vocab-sec{margin-top:8px}
.vocab-fold{cursor:pointer;user-select:none}
.vocab-fold .vf-i{color:var(--text3);font-weight:400;font-size:12px;transition:.15s}
.vgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:860px){.vgrid{grid-template-columns:1fr}}
.vcard{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:13px 15px;display:flex;flex-direction:column;gap:7px;box-shadow:var(--shadow)}
.vcard:hover{background:var(--card-h)}
.vcard.mastered{opacity:.6}
.vhead{display:flex;align-items:baseline;gap:9px;flex-wrap:wrap}
.vword{font-size:18px;font-weight:800;color:var(--heading);letter-spacing:.3px}
.vph{font-size:13px;color:var(--accent2);font-family:"Segoe UI",sans-serif}
.vpos{font-size:12px;color:var(--text3);font-style:italic}
.vsense{font-size:14px;color:var(--text)}
.vex{font-size:12.5px;color:var(--text2);line-height:1.5;padding-left:9px;border-left:2px solid var(--accent);font-style:italic}
.vmeta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:11.5px;color:var(--text3);margin-top:1px}
.vsrc{border:1px solid var(--border2);border-radius:9px;padding:1px 7px}
.vsrc.manual{color:var(--dev);border-color:var(--dev)}
.vacts{display:flex;gap:8px;flex-wrap:wrap;padding-top:6px;border-top:1px dashed var(--border);margin-top:2px}
/* 单词本视图控件 */
.vbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:14px 0 4px}
.vadd{display:flex;gap:8px;flex:1;min-width:220px}
.vadd input{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);padding:6px 11px;border-radius:6px;font-size:13px}
.vadd input:focus{outline:none;border-color:var(--accent)}
.vadd button{background:var(--accent);border:none;color:var(--card-h);padding:6px 16px;border-radius:6px;cursor:pointer;font-size:13px}
.vsearch{background:var(--card);border:1px solid var(--border);color:var(--text);padding:6px 11px;border-radius:6px;font-size:13px;width:180px}
.vsearch:focus{outline:none;border-color:var(--accent)}
.vpending{background:var(--card);border:1px dashed var(--border2);border-radius:8px;padding:9px 13px;font-size:12.5px;color:var(--text2);display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
.vpending b{color:var(--dev)}
.empty{color:var(--text3);text-align:center;padding:60px 0;font-size:14px}
footer{color:var(--text3);font-size:12px;text-align:center;margin-top:50px;line-height:2}
.legend{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
</style>
</head>
<body>
<header>
  <div class="hbar">
    <div class="logo">每日<span>驾驶舱</span> <span style="font-size:12px;color:var(--text3);font-weight:400">Daily Briefing</span></div>
    <div class="searchbox">
      <input id="searchInput" placeholder="🔍 搜索历史条目" autocomplete="off">
      <div id="searchRes" class="search-res"></div>
    </div>
    <div class="datenav">
      <button id="viewBtn">🗓 周视图</button>
      <button id="prevBtn">◀ 前一天</button>
      <select id="dateSel"></select>
      <button id="nextBtn">后一天 ▶</button>
    </div>
  </div>
</header>

<div class="wrap">
  <div id="app"><div class="empty">加载中…</div></div>
  <footer>
    <div class="legend">
      <span style="color:var(--ok)">● 已确认</span>
      <span style="color:var(--dev)">● 发展中</span>
      <span style="color:var(--dispute)">● 有争议</span>
      <span style="color:var(--rumor)">● 仅传言</span>
      <span style="color:var(--text3)">｜ 分数 = 重要性 × 来源可信度 × 兴趣权重</span>
    </div>
    <div>个人信息筛选驾驶舱 · 数据由 daily_news.py 每日生成 · 所有条目保留原文链接 · <a href="data/feed.xml">RSS 订阅</a></div>
  </footer>
</div>

<script src="data/manifest.js"></script>
<script>
const CAT = {ai:"AI", tech:"互联网/科技", finance:"财经", society:"社会", world:"国际"};
const state = {date:null, cat:"all", tag:null, moreOpen:false, showHidden:false,
               itemsById:{}, view:"day", pendingHighlight:null, vocabOpen:true};
// 单词本视图的本地状态（book 缓存 + 筛选），仅本人可见
const vocab = {book:null, q:"", filter:"all", src:"all"};

/* ---------- 用户状态：与在线后台共用 token，仅本人可见操作按钮 ---------- */
const TOKEN = localStorage.getItem("aoiblog_admin_token") || "";
const NI_REASONS = ["不关心这个领域","这个事看腻了","太水没实质","只是今天不想看"];
const LS = {
  get(k){try{return JSON.parse(localStorage.getItem(k)||"{}");}catch(e){return {};}},
  set(k,v){localStorage.setItem(k,JSON.stringify(v));}
};
function itemKey(id){return state.date+":"+id;}

// 过期清理：hidden/rl 键形如 "YYYY-MM-DD:id"，tracked 键形如 "evt-YYYYMMDD-xxx"，
// 分别保留 30/60 天，防 localStorage 无限累积
function pruneLocal(){
  const cut=k=>{const d=new Date();d.setDate(d.getDate()-k);return d.toISOString().slice(0,10);};
  const c30=cut(30), c60=cut(60).replace(/-/g,"");
  for(const key of ["news_hidden","news_rl","news_like"]){
    const m=LS.get(key);
    let dirty=false;
    for(const k of Object.keys(m)){
      if((k.slice(0,10)||"")<c30){delete m[k];dirty=true;}
    }
    if(dirty) LS.set(key,m);
  }
  const t=LS.get("news_tracked");
  let dirty=false;
  for(const k of Object.keys(t)){
    const d=(k.match(/^evt-(\d{8})-/)||[])[1];
    if(d&&d<c60){delete t[k];dirty=true;}
  }
  if(dirty) LS.set("news_tracked",t);
}

async function postState(type,payload){
  const r=await fetch("/api/newsState",{method:"POST",
    headers:{"Content-Type":"application/json",Authorization:"Bearer "+TOKEN},
    body:JSON.stringify({type,payload})});
  const j=await r.json().catch(()=>({}));
  if(!r.ok||!j.success) throw new Error(j.error||("HTTP "+r.status));
  return j.data;
}
async function getState(type){
  const r=await fetch("/api/newsState?type="+type,{headers:{Authorization:"Bearer "+TOKEN}});
  const j=await r.json().catch(()=>({}));
  if(!r.ok||!j.success) throw new Error(j.error||("HTTP "+r.status));
  return j.data;
}
let toastTimer=null;
function toast(msg,err){
  document.querySelectorAll(".toast").forEach(t=>t.remove());
  const t=document.createElement("div");
  t.className="toast"+(err?" err":"");
  t.textContent=msg;
  document.body.appendChild(t);
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.remove(),2600);
}

function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));}
function safeUrl(u){u=String(u||"");return /^https?:\/\//i.test(u)?u:"#";}
function scoreCls(s){return s>=80?"hi":s>=60?"mid":"lo";}
function fmtTime(iso){
  if(!iso) return "";
  const d=new Date(iso); if(isNaN(d)) return "";
  const now=new Date(), diff=(now-d)/36e5;
  const hm=d.toTimeString().slice(0,5);
  if(diff<1) return Math.max(1,Math.round(diff*60))+" 分钟前";
  if(diff<24) return Math.round(diff)+" 小时前";
  return (d.getMonth()+1)+"/"+d.getDate()+" "+hm;
}

// 按需懒加载当日单词候选 data/vocab/<date>.js；缺失记为 null（已尝试）避免重复请求
function ensureVocab(date,cb){
  if(!window.VOCAB_DATA) window.VOCAB_DATA={};
  if(window.VOCAB_DATA[date]!==undefined) return cb();
  const s=document.createElement("script");
  s.src="data/vocab/"+date+".js";
  s.onload=cb;
  s.onerror=()=>{window.VOCAB_DATA[date]=null;cb();};
  document.head.appendChild(s);
}
function loadDate(date){
  state.date=date; state.moreOpen=false; state.tag=null;
  const done=()=>ensureVocab(date,render);
  if(window.NEWS_DATA && window.NEWS_DATA[date]) return done();
  const s=document.createElement("script");
  s.src="data/daily/"+date+".js";
  s.onload=done;
  s.onerror=()=>{document.getElementById("app").innerHTML='<div class="empty">这一天没有数据（data/daily/'+esc(date)+'.js 不存在）</div>';};
  document.head.appendChild(s);
}

function srcLinks(it){

  ).join("");
}

/* ---------- 反馈操作行（仅持 token 的精选卡片） ---------- */
function actionRow(it){
  if(!TOKEN||it.tier!=="pick") return "";
  const rl=LS.get("news_rl")[itemKey(it.id)];
  const liked=LS.get("news_like")[itemKey(it.id)];
  const tracked=LS.get("news_tracked")[it.event_id]===true;
  return `<div class="acts">
    <span class="act ${rl?"done":""}" title="${rl?"再点一次移出稍后读":"加入稍后读"}" onclick="rlToggle(this,'${esc(it.id)}')">${rl?"✓ 已收":"⏳ 稍后读"}</span>
    <span class="act ${liked?"done":""}" title="${liked?"再点一次撤销这条反馈":"让明天的排序更偏向类似内容"}" onclick="fbLike(this,'${esc(it.id)}')">${liked?"👍 已记录":"👍 更多类似"}</span>
    ${it.event_id?`<span class="act ${tracked?"done":""}" onclick="fbTrack('${esc(it.id)}')">${tracked?"📌 追踪中":"📌 追踪"}</span>`:""}
    <span class="act" onclick="fbPanel(this,'${esc(it.id)}','src')">🚫 来源</span>
    <span class="act" onclick="fbPanel(this,'${esc(it.id)}','ni')">✕ 不感兴趣</span>
  </div>
  <div class="fb-panel"></div>`;
}

function fbPanel(el,id,kind){
  const panel=el.closest(".card").querySelector(".fb-panel");
  if(panel.dataset.kind===kind&&panel.innerHTML){panel.innerHTML="";panel.dataset.kind="";return;}
  panel.dataset.kind=kind;
  const it=state.itemsById[id]||{};
  if(kind==="src"){
    panel.innerHTML='<div class="fb-tip">哪个来源质量低？点击即提交</div><div class="chips">'+
      (it.sources||[]).map((s,i)=>`<span class="chip" onclick="fbSrc(this,'${esc(id)}',${i})">${esc(s.name)}</span>`).join("")+"</div>";
  }else{
    panel.innerHTML='<div class="fb-tip">为什么不感兴趣？（可多选，可不选）</div><div class="chips">'+
      NI_REASONS.map(r=>`<span class="chip" onclick="this.classList.toggle('on')">${r}</span>`).join("")+
      `</div><textarea class="fb-note" placeholder="补充说明（可选，会进兴趣画像）"></textarea>
      <div class="fb-btns"><button class="fb-go" onclick="fbNiSubmit(this,'${esc(id)}')">隐藏并提交</button>
      <button class="fb-cancel" onclick="fbPanel(this,'${esc(id)}','ni')">取消</button></div>`;
  }
}

function fbBase(it){
  const p={date:state.date,item_id:it.id,title:it.title||"",category:it.category||""};
  if(it.event_id) p.event_id=it.event_id;
  return p;
}

function fbNiSubmit(el,id){
  const it=state.itemsById[id]||{};
  const panel=el.closest(".fb-panel");
  const reasons=[...panel.querySelectorAll(".chip.on")].map(c=>c.textContent);
  const note=(panel.querySelector(".fb-note")||{}).value||"";
  const hid=LS.get("news_hidden");
  hid[itemKey(id)]=it.title||id;
  LS.set("news_hidden",hid);
  render();
  toast("已隐藏，明天的排序会参考这条反馈");
  postState("feedback",{...fbBase(it),action:"not_interested",reasons,note})
    .catch(e=>toast("同步失败（本地已隐藏）："+e.message,true));
}

function fbLike(el,id){
  const it=state.itemsById[id]||{};
  const key=itemKey(id);
  const lk=LS.get("news_like");
  if(lk[key]){
    // 再点一次 = 删除式撤销：从 feedback.json 删掉那条记录
    delete lk[key];LS.set("news_like",lk);
    el.classList.remove("done");el.textContent="👍 更多类似";
    el.title="让明天的排序更偏向类似内容";
    postState("feedback",{...fbBase(it),action:"more_like_this",op:"remove"})
      .then(()=>toast("已撤销：更多类似"))
      .catch(e=>toast("撤销同步失败（本地已撤销）："+e.message,true));
    return;
  }
  lk[key]=1;LS.set("news_like",lk);
  el.classList.add("done");el.textContent="👍 已记录";
  el.title="再点一次撤销这条反馈";
  postState("feedback",{...fbBase(it),action:"more_like_this"})
    .then(()=>toast("已记录：更多类似内容"))
    .catch(e=>toast("同步失败："+e.message,true));
}

function fbSrc(el,id,srcIdx){
  const it=state.itemsById[id]||{};
  const src=(it.sources||[])[srcIdx];
  if(!src) return;
  el.classList.add("on");
  postState("feedback",{...fbBase(it),action:"low_quality_source",source:src.name})
    .then(()=>toast(`已记录：${src.name} 质量低`))
    .catch(e=>toast("同步失败："+e.message,true));
  setTimeout(()=>fbPanel(el,id,"src"),400);
}

function fbTrack(id){
  const it=state.itemsById[id]||{};
  if(!it.event_id) return;
  const lt=LS.get("news_tracked");
  const next=lt[it.event_id]!==true;
  lt[it.event_id]=next;
  LS.set("news_tracked",lt);
  render();
  postState("feedback",{...fbBase(it),action:next?"track":"untrack"})
    .then(()=>toast(next?"已钉选：即使不进精选也会出现在「追踪中」":"已取消追踪"))
    .catch(e=>toast("同步失败："+e.message,true));
}

function trkUntrack(eventId){
  // 标题从当日数据按 event_id 查，不经 onclick 属性传自由文本（防注入/断引号）
  const d=window.NEWS_DATA[state.date]||{};
  const t=(d.tracking||[]).find(x=>x.event_id===eventId)||{};
  const lt=LS.get("news_tracked");
  lt[eventId]=false;
  LS.set("news_tracked",lt);
  render();
  postState("feedback",{date:state.date,item_id:eventId,title:t.title||"",
    category:t.category||"",action:"untrack",event_id:eventId})
    .then(()=>toast("已取消追踪，明日生效"))
    .catch(e=>toast("同步失败："+e.message,true));
}

function rlToggle(el,id){
  const it=state.itemsById[id]||{};
  const key=itemKey(id);
  const rl=LS.get("news_rl");
  if(rl[key]){
    // 再点一次 = 移出稍后读，与抽屉里的「移除」同一条路
    delete rl[key];LS.set("news_rl",rl);
    el.classList.remove("done");el.textContent="⏳ 稍后读";
    el.title="加入稍后读";
    postState("read_later",{date:state.date,item_id:id,op:"remove"})
      .then(()=>toast("已移出稍后读"))
      .catch(e=>toast("同步失败（本地已移除）："+e.message,true));
    return;
  }
  // 深读条目 url 直接在条目上；新闻条目取首来源链接
  const url=it.url||((it.sources||[])[0]||{}).url||"";
  if(!/^https?:\/\//i.test(url)){toast("该条目没有可收藏的链接",true);return;}
  rl[key]=1;LS.set("news_rl",rl);
  el.classList.add("done");el.textContent="✓ 已收";
  el.title="再点一次移出稍后读";
  postState("read_later",{date:state.date,item_id:id,title:it.title_zh||it.title||"",
    category:it.category||"deep",url})
    .then(()=>toast("已加入稍后读"))
    .catch(e=>toast("同步失败："+e.message,true));
}

function restoreHidden(key){
  const hid=LS.get("news_hidden");
  if(key){delete hid[key];}else{
    for(const k of Object.keys(hid)) if(k.startsWith(state.date+":")) delete hid[k];
  }
  LS.set("news_hidden",hid);
  render();
}
function toggleShowHidden(){state.showHidden=!state.showHidden;render();}
function toggleTrk(el){el.closest(".trk").classList.toggle("open");}

function row(it){
  const main=it.sources[0]||{};
  return `<div class="row" data-id="${esc(it.id)}">
    <span class="score ${scoreCls(it.score)}">${it.score}</span>
    <span class="tag cat-${it.category}">${CAT[it.category]||it.category}</span>
    ${it.status?`<span class="tag st-${esc(it.status)}">${esc(it.status)}</span>`:""}
    <span class="rt"><a href="${esc(safeUrl(main.url))}" target="_blank" rel="noopener">${esc(it.title)}</a></span>
    <span class="rs">${esc(main.name||"")} · ${fmtTime(it.time)}</span>
  </div>`;
}

function render(){
  const d=window.NEWS_DATA[state.date];
  const app=document.getElementById("app");
  if(!d){app.innerHTML='<div class="empty">数据为空</div>';return;}
  const items=d.items||[];
  state.itemsById={};
  for(const it of items) state.itemsById[it.id]=it;
  for(const dp of (d.deep||[])) state.itemsById[dp.id]=dp;
  const HID=LS.get("news_hidden");
  const flt=it=>state.cat==="all"||it.category===state.cat;
  const pickPool=items.filter(i=>i.tier==="pick"&&flt(i)&&!HID[itemKey(i.id)]);
  const hiddenPicks=items.filter(i=>i.tier==="pick"&&flt(i)&&HID[itemKey(i.id)]);
  // 标签计数取自"当前类目下全部精选"（先于标签过滤），保证标签条始终完整
  const tagCounts={};
  for(const it of pickPool) for(const t of (it.tags||[])) tagCounts[t]=(tagCounts[t]||0)+1;
  if(state.tag&&!tagCounts[state.tag]) state.tag=null;
  const picks=state.tag?pickPool.filter(i=>(i.tags||[]).includes(state.tag)):pickPool;
  const mores=items.filter(i=>i.tier==="more"&&flt(i));
  const counts={all:items.length};
  for(const c of Object.keys(CAT)) counts[c]=items.filter(i=>i.category===c).length;

  let h="";
  if(d.brief) h+=`<div class="brief"><div class="bt">今日导语 · ${esc(d.date)}</div><p>${esc(d.brief)}</p></div>`;
  const st=d.stats||{};
  h+=`<div class="meta-line">扫描 <b>${st.sources_count||"?"}</b> 个来源 / <b>${st.raw_count||"?"}</b> 条原始资讯 → 精选 <b>${st.pick_count||picks.length}</b> 条 · 预计阅读 <b>15 分钟</b> · 生成于 ${d.generated_at?fmtTime(d.generated_at):""}</div>`;

  h+='<div class="tabs">'+["all",...Object.keys(CAT)].map(c=>
    `<span class="tab ${state.cat===c?"on":""}" onclick="setCat('${c}')">${c==="all"?"全部":CAT[c]}<span class="n">${counts[c]||0}</span></span>`
  ).join("")+"</div>";

  // 细粒度标签条：旧日期数据无 tags 字段时自动隐藏
  const tagList=Object.keys(tagCounts).sort((a,b)=>tagCounts[b]-tagCounts[a]);
  if(tagList.length){
    h+='<div class="tabs sub">'+tagList.map(t=>
      `<span class="tab sub ${state.tag===t?"on":""}" onclick="setTag('${esc(t)}')">${esc(t)}<span class="n">${tagCounts[t]}</span></span>`
    ).join("")+"</div>";
  }

  h+=`<div class="sec-title">每日精选</div>`;
  h+=picks.length?`<div class="grid">${picks.map(card).join("")}</div>`:'<div class="empty">该分类下今天没有精选</div>';

  if(hiddenPicks.length){
    h+=`<div class="hidden-bar">已隐藏 ${hiddenPicks.length} 条 · <a onclick="toggleShowHidden()">${state.showHidden?"收起":"查看"}</a> · <a onclick="restoreHidden()">全部恢复</a></div>`;
    if(state.showHidden){
      h+=hiddenPicks.map(i=>`<div class="hidden-row"><span class="rt">${esc(i.title)}</span><a onclick="restoreHidden('${esc(itemKey(i.id))}')">恢复</a></div>`).join("");
    }
  }

  // 深度阅读：管线深读频道推荐（0-3 篇，阈值制）
  const deep=(d.deep||[]);
  if(deep.length){
    h+=`<div class="sec-title">深度阅读 <span style="font-size:12px;color:var(--text3);font-weight:400">(今日 ${deep.length} 篇长文推荐)</span></div>`;
    h+=deep.map(dp=>{
      const rl=LS.get("news_rl")[itemKey(dp.id)];
      return `<div class="deep" data-id="${esc(dp.id)}">
      <div class="deep-top">
        <span class="tag mins">📖 约 ${+dp.read_minutes||"?"} 分钟</span>
        <span class="tag stype">${esc(dp.source||"")}</span>
        ${dp.lang==="en"?'<span class="tag stype">EN</span>':""}
        <a class="deep-t" href="${esc(safeUrl(dp.url))}" target="_blank" rel="noopener">${esc(dp.title_zh||dp.title||"")}</a>
      </div>
      ${dp.brief?`<div class="sum">${esc(dp.brief)}</div>`:""}
      ${dp.why?`<div class="kv why"><b>为什么值得读</b> · ${esc(dp.why)}</div>`:""}
      ${dp.lang==="en"&&dp.title!==dp.title_zh?`<div class="kv"><b>原题</b> · ${esc(dp.title||"")}</div>`:""}
      ${TOKEN?`<div class="acts"><span class="act ${rl?"done":""}" title="${rl?"再点一次移出稍后读":"加入稍后读"}" onclick="rlToggle(this,'${esc(dp.id)}')">${rl?"✓ 已收":"⏳ 稍后读"}</span></div>`:""}
    </div>`;}).join("");
  }

  // 追踪中：钉选且今天没进精选的事件（数据来自管线 payload.tracking）
  const trk=(d.tracking||[]).filter(t=>state.cat==="all"||t.category===state.cat);
  if(trk.length){
    h+=`<div class="sec-title">追踪中 <span style="font-size:12px;color:var(--text3);font-weight:400">(${trk.length} 个钉选事件，点击展开进展)</span></div>`;
    h+=trk.map(t=>`<div class="trk">
      <div class="trk-top" onclick="toggleTrk(this)">
        <span class="tag day">📌 第${+t.day_count||1}天</span>
        <span class="tag cat-${esc(t.category)}">${CAT[t.category]||esc(t.category)}</span>
        <b>${esc(t.title)}</b>
        <span class="trk-upd">${t.updated_today?"今日有新进展":"今日无新进展 · 最后 "+esc(t.last_seen)}</span>
        ${TOKEN?`<span class="act" onclick="event.stopPropagation();trkUntrack('${esc(t.event_id)}')">取消追踪</span>`:""}
      </div>
      <div class="trk-hist">${(t.history||[]).map(hh=>`<div><span class="eh-d">${esc(hh.date)}</span>${esc(hh.summary)}</div>`).join("")}</div>
    </div>`).join("");
  }

  if(mores.length){
    h+=`<div class="sec-title">更多资讯 <span style="font-size:12px;color:var(--text3);font-weight:400">(${mores.length} 条)</span></div>`;
    if(state.moreOpen){
      h+=`<div class="more-list">${mores.map(row).join("")}</div>`;
      h+=`<button class="toggle-more" onclick="toggleMore()">收起 ▲</button>`;
    }else{
      h+=`<div class="more-list">${mores.slice(0,5).map(row).join("")}</div>`;
      if(mores.length>5) h+=`<button class="toggle-more" onclick="toggleMore()">展开全部 ${mores.length} 条 ▼</button>`;
    }
  }
  // 今日单词：管线从精选英文原文挑的高价值词（候选对所有访客可见，收藏按钮仅本人）
  const vd=(window.VOCAB_DATA||{})[state.date];
  const vwords=vd&&Array.isArray(vd.words)?vd.words:[];
  if(vwords.length){
    const open=state.vocabOpen;
    h+=`<div class="sec-title vocab-sec vocab-fold" onclick="toggleVocabDay()">📖 今日单词 <span class="vf-i">(${vwords.length} 个高价值词 · 点击${open?"收起":"展开"})</span></div>`;
    if(open) h+=`<div class="vgrid">${vwords.map(w=>vocabDayCard(w)).join("")}</div>`;
  }

  app.innerHTML=h;
  updateNav();
  if(state.pendingHighlight){
    const el=document.querySelector(`[data-id="${CSS.escape(state.pendingHighlight)}"]`);
    state.pendingHighlight=null;
    if(el){
      el.scrollIntoView({block:"center"});
      el.classList.add("hl");
      setTimeout(()=>el.classList.remove("hl"),2600);
    }
  }
}

function setCat(c){state.cat=c;state.tag=null;render();}
function setTag(t){state.tag=(state.tag===t?null:t);render();}
function toggleMore(){state.moreOpen=!state.moreOpen;render();}
function toggleVocabDay(){state.vocabOpen=!state.vocabOpen;render();}

/* ---------- 英语单词本 ---------- */
async function getVocab(){
  const r=await fetch("/api/vocab",{headers:{Authorization:"Bearer "+TOKEN}});
  const j=await r.json().catch(()=>({}));
  if(!r.ok||!j.success) throw new Error(j.error||("HTTP "+r.status));
  return j.data;
}
async function vocabOp(op,payload){
  const r=await fetch("/api/vocab",{method:"POST",
    headers:{"Content-Type":"application/json",Authorization:"Bearer "+TOKEN},
    body:JSON.stringify({op,payload})});
  const j=await r.json().catch(()=>({}));
  if(!r.ok||!j.success) throw new Error(j.error||("HTTP "+r.status));
  return j.data;
}

// 今日单词候选卡（日报语境区）。收藏状态本地乐观缓存，键为词元
function vocabDayCard(w){
  const lm=w.lemma||String(w.word||"").toLowerCase().replace(/[^a-z]/g,"");
  const got=LS.get("vocab_collected")[lm];
  const btn=TOKEN?`<div class="vacts"><span class="act ${got?"done":""}" onclick="vocabCollect(this,'${esc(lm)}')">${got?"✓ 已收藏":"➕ 收藏到单词本"}</span></div>`:"";
  return `<div class="vcard" data-lm="${esc(lm)}">
    <div class="vhead"><span class="vword">${esc(w.word)}</span>
      ${w.phonetic?`<span class="vph">${esc(w.phonetic)}</span>`:""}
      ${w.pos?`<span class="vpos">${esc(w.pos)}</span>`:""}</div>
    ${w.sense_zh?`<div class="vsense">${esc(w.sense_zh)}</div>`:""}
    ${w.example_en?`<div class="vex">${esc(w.example_en)}</div>`:""}
    ${w.item_title?`<div class="vmeta"><span>📰 ${esc(w.item_title)}</span></div>`:""}
    ${btn}</div>`;
}
function vocabCollect(el,lm){
  const vd=(window.VOCAB_DATA||{})[state.date]||{};
  const w=(vd.words||[]).find(x=>(x.lemma||String(x.word||"").toLowerCase().replace(/[^a-z]/g,""))===lm);
  if(!w) return;
  const col=LS.get("vocab_collected");
  if(col[lm]){toast("已在单词本里");return;}
  col[lm]=1;LS.set("vocab_collected",col);
  el.classList.add("done");el.textContent="✓ 已收藏";
  vocabOp("collect",{word:w.word,lemma:w.lemma,phonetic:w.phonetic,pos:w.pos,
    sense_zh:w.sense_zh,example_en:w.example_en,item_id:w.item_id,
    item_title:w.item_title,date:state.date})
    .then(()=>toast("已收藏到单词本"))
    .catch(e=>{col[lm]=undefined;delete col[lm];LS.set("vocab_collected",col);
      el.classList.remove("done");el.textContent="➕ 收藏到单词本";
      toast("收藏失败："+e.message,true);});
}

function updateVocabBtn(){
  const b=document.getElementById("vocabBtn");
  if(b) b.textContent=state.view==="vocab"?"📅 日视图":"📖 单词本";
}
function toggleVocab(){
  if(state.view==="vocab"){state.view="day";updateVocabBtn();loadDate(state.date||(window.NEWS_MANIFEST||[])[0]);return;}
  state.view="vocab";
  document.getElementById("viewBtn").textContent="🗓 周视图";
  updateVocabBtn();
  renderVocab();
}
async function renderVocab(refetch){
  const app=document.getElementById("app");
  updateNav();
  if(refetch!==false&&!vocab.book){
    app.innerHTML='<div class="empty">加载单词本…</div>';
    try{vocab.book=await getVocab();}
    catch(e){app.innerHTML='<div class="empty">加载失败：'+esc(e.message)+"</div>";return;}
  }
  if(state.view!=="vocab") return;   // 加载期间用户已切走
  const book=vocab.book||{words:[],pending:[]};
  const words=(book.words||[]).slice().reverse();
  const pend=book.pending||[];
  const q=vocab.q.trim().toLowerCase();
  const filtered=words.filter(w=>{
    if(vocab.filter==="mastered"&&!w.mastered) return false;
    if(vocab.filter==="learning"&&w.mastered) return false;
    if(vocab.src!=="all"&&(w.source||"auto")!==vocab.src) return false;
    if(q){const hay=((w.word||"")+" "+(w.sense_zh||"")+" "+(w.example_en||"")).toLowerCase();
      if(!hay.includes(q)) return false;}
    return true;
  });
  const total=words.length, mastered=words.filter(w=>w.mastered).length;
  const chip=(k,v,label)=>`<span class="tab sub ${vocab[k]===v?"on":""}" onclick="vocabSetFilter('${k}','${v}')">${label}</span>`;
  let h=`<div class="sec-title">📖 我的单词本 <span style="font-size:12px;color:var(--text3);font-weight:400">(共 ${total} 词 · 已掌握 ${mastered})</span></div>`;
  h+=`<div class="vbar">
    <input class="vsearch" id="vSearch" placeholder="🔍 搜索单词/释义" value="${esc(vocab.q)}" autocomplete="off">
    <div class="tabs sub" style="margin:0">
      ${chip("filter","all","全部")}${chip("filter","learning","未掌握")}${chip("filter","mastered","已掌握")}
    </div>
    <div class="tabs sub" style="margin:0">
      ${chip("src","all","不限来源")}${chip("src","auto","自动挑")}${chip("src","manual","手动加")}
    </div>
    <div class="vadd">
      <input id="vAddInput" placeholder="手动加词：输入英文单词，明日补全音标释义" autocomplete="off">
      <button onclick="vocabAdd()">加入</button>
    </div>
  </div>`;
  if(pend.length){
    h+=`<div class="vpending"><b>补全中 ${pend.length} 个</b> · 手动加的词会在管线次日运行时补齐音标释义：`
      +pend.map(p=>esc(p.word)).join("、")+"</div>";
  }
  h+=filtered.length?`<div class="vgrid">${filtered.map(vocabBookCard).join("")}</div>`
    :'<div class="empty">'+(total?"没有匹配的单词":"单词本还是空的——去日报的「今日单词」区收藏，或在上面手动加词")+"</div>";
  app.innerHTML=h;
  const si=document.getElementById("vSearch");
  if(si){si.oninput=()=>{vocab.q=si.value;renderVocab(false);};
    // 保持焦点与光标（重渲染后）
    si.focus();si.setSelectionRange(si.value.length,si.value.length);}
  const ai=document.getElementById("vAddInput");
  if(ai) ai.onkeydown=e=>{if(e.key==="Enter") vocabAdd();};
}
function vocabBookCard(w){
  const lm=w.lemma||String(w.word||"").toLowerCase().replace(/[^a-z]/g,"");
  return `<div class="vcard ${w.mastered?"mastered":""}" data-lm="${esc(lm)}">
    <div class="vhead"><span class="vword">${esc(w.word)}</span>
      ${w.phonetic?`<span class="vph">${esc(w.phonetic)}</span>`:""}
      ${w.pos?`<span class="vpos">${esc(w.pos)}</span>`:""}</div>
    ${w.sense_zh?`<div class="vsense">${esc(w.sense_zh)}</div>`:""}
    ${w.example_en?`<div class="vex">${esc(w.example_en)}</div>`:""}
    <div class="vmeta">
      <span class="vsrc ${w.source==="manual"?"manual":""}">${w.source==="manual"?"手动":"自动"}</span>
      ${w.date?`<span>${esc(w.date)}</span>`:""}
      ${w.item_title?`<span>📰 ${esc(w.item_title)}</span>`:""}
    </div>
    <div class="vacts">
      <span class="act ${w.mastered?"done":""}" onclick="vocabMaster('${esc(lm)}',${w.mastered?"false":"true"})">${w.mastered?"✓ 已掌握":"◎ 标为已掌握"}</span>
      <span class="act" onclick="vocabRemove('${esc(lm)}')">✕ 移除</span>
    </div></div>`;
}
function vocabSetFilter(k,v){vocab[k]=v;renderVocab(false);}
function vocabAdd(){
  const ai=document.getElementById("vAddInput");
  const word=(ai.value||"").trim();
  if(!word){toast("请输入单词",true);return;}
  if(!/[a-zA-Z]/.test(word)){toast("请输入英文单词",true);return;}
  ai.value="";
  vocabOp("add",{word})
    .then(d=>{if(d.changed){vocab.book=null;toast("已加入，明日补全音标释义");renderVocab();}
      else toast("这个词已经在单词本里了");})
    .catch(e=>toast("加入失败："+e.message,true));
}
function vocabMaster(lm,want){
  vocabOp(want?"master":"unmaster",{word:lm})
    .then(()=>{const w=(vocab.book.words||[]).find(x=>(x.lemma||"")===lm||String(x.word||"").toLowerCase().replace(/[^a-z]/g,"")===lm);
      if(w) w.mastered=want;renderVocab(false);
      toast(want?"已标为掌握":"已取消掌握");})
    .catch(e=>toast("操作失败："+e.message,true));
}
function vocabRemove(lm){
  vocabOp("remove",{word:lm})
    .then(()=>{if(vocab.book){vocab.book.words=(vocab.book.words||[]).filter(x=>(x.lemma||String(x.word||"").toLowerCase().replace(/[^a-z]/g,""))!==lm);
      vocab.book.pending=(vocab.book.pending||[]).filter(p=>(p.lemma||String(p.word||"").toLowerCase().replace(/[^a-z]/g,""))!==lm);}
      // 同步清掉本地收藏标记，便于重新收藏
      const col=LS.get("vocab_collected");if(col[lm]){delete col[lm];LS.set("vocab_collected",col);}
      renderVocab(false);toast("已移除");})
    .catch(e=>toast("移除失败："+e.message,true));
}

/* ---------- 稍后读抽屉 ---------- */
function openRl(){
  const dr=document.getElementById("rlDrawer");
  dr.classList.toggle("open");
  if(dr.classList.contains("open")) loadRl();
}
async function loadRl(){
  const dr=document.getElementById("rlDrawer");
  dr.innerHTML='<div class="rl-head">📥 稍后读 <span class="rl-close" onclick="openRl()">✕</span></div><div class="empty">加载中…</div>';
  try{
    const data=await getState("read_later");
    const all=(data.items||[]).slice().reverse();
    const todo=all.filter(i=>!i.done), done=all.filter(i=>i.done).slice(0,20);
    const row=i=>`<div class="rl-item ${i.done?"done":""}">
      <div class="rl-t"><a href="${esc(safeUrl(i.url))}" target="_blank" rel="noopener">${esc(i.title||i.item_id)}</a></div>
      <div class="rl-meta">${esc(i.date||"")} · ${CAT[i.category]||esc(i.category||"")}</div>
      <div class="rl-ops">${i.done?"":`<span onclick="rlOp('${esc(i.item_id)}','${esc(i.date)}','done')">✓ 读完了</span>`}
      <span onclick="rlOp('${esc(i.item_id)}','${esc(i.date)}','remove')">✕ 移除</span></div>
    </div>`;
    dr.innerHTML='<div class="rl-head">📥 稍后读 <span class="rl-close" onclick="openRl()">✕</span></div>'
      +(todo.length?todo.map(row).join(""):'<div class="empty" style="padding:20px 0">队列是空的</div>')
      +(done.length?'<div class="rl-head" style="margin-top:18px;font-size:13px;color:var(--text3)">最近读完</div>'+done.map(row).join(""):"");
  }catch(e){
    dr.innerHTML='<div class="rl-head">📥 稍后读 <span class="rl-close" onclick="openRl()">✕</span></div><div class="empty">加载失败：'+esc(e.message)+"</div>";
  }
}
function rlOp(id,date,op){
  postState("read_later",{date,item_id:id,op})
    .then(()=>{if(op==="remove"){const rl=LS.get("news_rl");delete rl[date+":"+id];LS.set("news_rl",rl);}loadRl();})
    .catch(e=>toast("操作失败："+e.message,true));
}

function updateNav(){
  const M=window.NEWS_MANIFEST||[];
  const locked=state.view!=="day";   // 周视图 / 单词本视图都锁住日期导航
  const i=M.indexOf(state.date);
  document.getElementById("prevBtn").disabled=locked||(i>=M.length-1);
  document.getElementById("nextBtn").disabled=locked||(i<=0);
  document.getElementById("dateSel").disabled=locked;
}

/* ---------- 站内搜索（懒加载 search_index.js） ---------- */
let idxLoading=false;
function ensureIndex(cb){
  if(window.NEWS_INDEX){cb&&cb();return;}
  if(idxLoading) return;
  idxLoading=true;
  const s=document.createElement("script");
  s.src="data/search_index.js";
  s.onload=()=>{cb&&cb();};
  s.onerror=()=>{window.NEWS_INDEX=[];cb&&cb();};
  document.head.appendChild(s);
}
function doSearch(){
  const box=document.getElementById("searchRes");
  const q=document.getElementById("searchInput").value.trim().toLowerCase();
  if(!q){box.innerHTML="";box.classList.remove("open");return;}
  const terms=q.split(/\s+/);
  const hits=(window.NEWS_INDEX||[]).filter(r=>{
    const hay=((r[4]||"")+" "+(r[5]||"")).toLowerCase();
    return terms.every(t=>hay.includes(t));
  }).slice(0,30);
  box.classList.add("open");
  box.innerHTML=hits.length?hits.map(r=>
    `<div class="sr" onclick="gotoItem('${esc(r[0])}','${esc(r[1])}')"><span class="sr-d">${esc(r[0])}</span><span class="sr-c">${r[2]==="deep"?"深读":(CAT[r[3]]||esc(r[3]))}</span>${esc(r[4])}</div>`
  ).join(""):'<div class="sr none">没有匹配条目</div>';
}
function gotoItem(date,id){
  document.getElementById("searchRes").classList.remove("open");
  document.getElementById("searchInput").value="";
  state.view="day";
  document.getElementById("viewBtn").textContent="🗓 周视图";
  state.pendingHighlight=id;
  state.moreOpen=true;   // 目标可能在"更多资讯"折叠部分
  const sel=document.getElementById("dateSel");
  if([...sel.options].some(o=>o.value===date)) sel.value=date;
  loadDate(date);
}

/* ---------- 周视图（纯前端聚合近 7 天 + 本周事件线） ---------- */
function loadDates(dates){
  return Promise.all(dates.map(dt=>new Promise(res=>{
    if(window.NEWS_DATA&&window.NEWS_DATA[dt]) return res();
    const s=document.createElement("script");
    s.src="data/daily/"+dt+".js";
    s.onload=res; s.onerror=res;
    document.head.appendChild(s);
  })));
}
function toggleView(){
  state.view=state.view==="week"?"day":"week";
  document.getElementById("viewBtn").textContent=state.view==="week"?"📅 日视图":"🗓 周视图";
  updateVocabBtn();   // 从单词本视图切过来时把按钮标签复位
  if(state.view==="week") renderWeek(); else render();
}
async function renderWeek(){
  const app=document.getElementById("app");
  const dates=(window.NEWS_MANIFEST||[]).slice(0,7);
  if(!dates.length){app.innerHTML='<div class="empty">还没有数据</div>';return;}
  app.innerHTML='<div class="empty">加载本周数据…</div>';
  await loadDates(dates);
  let h=`<div class="sec-title">本周概览 <span style="font-size:12px;color:var(--text3);font-weight:400">${esc(dates[dates.length-1])} ~ ${esc(dates[0])} · 每日 Top3</span></div>`;
  for(const dt of dates){
    const d=window.NEWS_DATA[dt];
    if(!d) continue;
    const top=(d.items||[]).filter(i=>i.tier==="pick").sort((a,b)=>(b.score||0)-(a.score||0)).slice(0,3);
    h+=`<div class="wk-day"><div class="wk-date" onclick="gotoDay('${esc(dt)}')">${esc(dt)} ▸</div><div class="more-list">${top.map(row).join("")}</div></div>`;
  }
  // 本周事件线：events.json 拉不到时静默隐藏
  try{
    const resp=await fetch("data/events.json");
    if(resp.ok){
      const reg=await resp.json();
      const win=new Set(dates);
      const evs=(reg.events||[]).filter(e=>{
        const ds=new Set((e.history||[]).map(x=>x.date));
        return ds.size>=2&&[...ds].some(x=>win.has(x));
      });
      if(evs.length){
        h+=`<div class="sec-title">本周事件线 <span style="font-size:12px;color:var(--text3);font-weight:400">(${evs.length} 条跨天事件)</span></div>`;
        h+=evs.map(e=>{
          const days=new Set((e.history||[]).map(x=>x.date)).size;
          const hist=(e.history||[]).slice(-7).reverse();
          return `<div class="trk open">
            <div class="trk-top" onclick="toggleTrk(this)">
              <span class="tag day">📅 第${days}天</span>
              <span class="tag cat-${esc(e.category)}">${CAT[e.category]||esc(e.category)}</span>
              <b>${esc(e.title)}</b>
              ${e.pinned?'<span class="tag stype">📌 已钉选</span>':""}
              <span class="trk-upd">${e.status==="active"?"进行中":"已归档"}</span>
            </div>
            <div class="trk-hist">${hist.map(x=>`<div><span class="eh-d">${esc(x.date)}</span>${esc(x.summary)}</div>`).join("")}</div>
          </div>`;
        }).join("");
      }
    }
  }catch(e){}
  if(state.view!=="week") return;   // 加载期间用户已切回日视图
  app.innerHTML=h;
  updateNav();
}
function gotoDay(dt){
  state.view="day";
  document.getElementById("viewBtn").textContent="🗓 周视图";
  const sel=document.getElementById("dateSel");
  if([...sel.options].some(o=>o.value===dt)) sel.value=dt;
  loadDate(dt);
}

(function init(){
  pruneLocal();
  if(TOKEN){
    const drawer=document.createElement("div");
    drawer.id="rlDrawer";drawer.className="drawer";
    document.body.appendChild(drawer);
    const btn=document.createElement("button");
    btn.textContent="📥 稍后读";
    btn.onclick=openRl;
    const nav=document.querySelector(".datenav");
    nav.insertBefore(btn,nav.firstChild);
    const vbtn=document.createElement("button");
    vbtn.id="vocabBtn";
    vbtn.textContent="📖 单词本";
    vbtn.onclick=toggleVocab;
    nav.insertBefore(vbtn,nav.firstChild);
  }
  const si=document.getElementById("searchInput");
  si.addEventListener("focus",()=>ensureIndex(doSearch));
  si.addEventListener("input",()=>ensureIndex(doSearch));
  document.addEventListener("click",e=>{
    if(!e.target.closest(".searchbox")) document.getElementById("searchRes").classList.remove("open");
  });
  document.getElementById("viewBtn").onclick=toggleView;
  const M=window.NEWS_MANIFEST||[];
  const sel=document.getElementById("dateSel");
  if(!M.length){document.getElementById("app").innerHTML='<div class="empty">还没有任何日报数据。<br><br>先运行 <code style="color:var(--accent2)">python daily_news.py</code> 生成今天的数据。</div>';return;}
  sel.innerHTML=M.map(d=>`<option value="${d}">${d}</option>`).join("");
  sel.onchange=()=>loadDate(sel.value);
  document.getElementById("prevBtn").onclick=()=>{const i=M.indexOf(state.date);if(i<M.length-1){sel.value=M[i+1];loadDate(M[i+1]);}};
  document.getElementById("nextBtn").onclick=()=>{const i=M.indexOf(state.date);if(i>0){sel.value=M[i-1];loadDate(M[i-1]);}};
  loadDate(M[0]);
})();
</script>
