<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的文章 - 我的个人博客</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- 引入 Twikoo 评论系统核心脚本 -->
    <script src="https://cdn.staticfile.net/twikoo/1.6.32/twikoo.all.min.js"></script>
    <script>
        // 初始化主题
        const savedTheme = localStorage.getItem('theme') || 'light';
        if (savedTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <h1 class="logo">我的博客</h1>
                <nav class="nav">
                    <ul class="nav-list">
                        <li class="nav-item"><a href="index.html#home" class="nav-link">首页</a></li>
                        <li class="nav-item"><a href="index.html#blog" class="nav-link">博客</a></li>
                        <li class="nav-item"><a href="articles.html" class="nav-link">我的文章</a></li>
                        <li class="nav-item"><a href="index.html#about" class="nav-link">关于我</a></li>
                        <li class="nav-item"><a href="index.html#contact" class="nav-link">联系</a></li>
                        <li class="nav-item">
                            <button id="theme-toggle" class="theme-toggle" aria-label="切换主题">
                                🌞
                            </button>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <main class="main">
        <section class="articles-section">
            <div class="articles-container">
                <h2 class="section-title">我的文章</h2>
                
                <div class="articles-layout">
                    <!-- 左侧文章列表 -->
                    <aside class="articles-sidebar">
                        <div class="articles-list">
                            <h3>文章列表</h3>
                            <div class="search-box">
                                <input type="text" id="search-input" placeholder="搜索文章标题或内容...">
                            </div>
                            
                            <!-- 新增分类筛选 -->
                            <div class="category-filter" style="margin-bottom: 20px; display: flex; gap: 10px;">
                                <button class="filter-btn active" data-category="all" style="flex: 1; padding: 6px; border: 1px solid var(--border-color); background: var(--nav-hover); color: white; border-radius: 4px; cursor: pointer; transition: all 0.3s ease;">全部</button>
                                <button class="filter-btn" data-category="技术学习" style="flex: 1; padding: 6px; border: 1px solid var(--border-color); background: transparent; color: var(--text-color); border-radius: 4px; cursor: pointer; transition: all 0.3s ease;">技术学习</button>
                                <button class="filter-btn" data-category="随笔" style="flex: 1; padding: 6px; border: 1px solid var(--border-color); background: transparent; color: var(--text-color); border-radius: 4px; cursor: pointer; transition: all 0.3s ease;">生活随笔</button>
                            </div>

                            <div id="articles-nav">加载中...</div>
                        </div>
                    </aside>
                    
                    <!-- 中间文章内容 -->
                    <article class="articles-content">
                        <div id="article-detail">
                            <h3>请选择一篇文章开始阅读</h3>
                            <p>从左侧列表中选择一篇文章，即可在右侧查看完整内容。</p>
                        </div>
                    </article>
                    
                    <!-- 右侧 TOC 大纲 -->
                    <aside class="articles-toc">
                        <div class="toc-container">
                            <h3>文章大纲</h3>
                            <ul id="toc-list">
                                <li class="toc-item"><span style="color: var(--meta-color); font-size: 14px;">暂无目录</span></li>
                            </ul>
                        </div>
                    </aside>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <p>&copy; 2026 我的个人博客. 保留所有权利.</p>
                <div class="social-links">
                    <a href="#" class="https://github.com/langhuanaibu">GitHub</a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        let blogArticles = [];

        // Base64 解码函数（支持中文）
        function b64_to_utf8(str) {
            // 修复 atob 解码包含中文等特殊字符时的问题
            try {
                return decodeURIComponent(escape(window.atob(str)));
            } catch (e) {
                // 如果 escape 失败，尝试更现代的解码方式
                const binString = window.atob(str);
                const bytes = new Uint8Array(binString.length);
                for (let i = 0; i < binString.length; i++) {
                    bytes[i] = binString.charCodeAt(i);
                }
                return new TextDecoder('utf-8').decode(bytes);
            }
        }

        // 获取文章数据
        async function loadArticles() {
            try {
                // 从 GitHub API 实时拉取最新数据
                const owner = 'langhuanaibu';
                const repo = 'my-blog';
                const url = `https://api.github.com/repos/${owner}/${repo}/contents/articles.json?t=` + new Date().getTime();
                
                const response = await fetch(url, {
                    headers: {
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    if (!data || !data.content) {
                        throw new Error('API返回数据格式错误，未包含content字段');
                    }
                    const content = b64_to_utf8(data.content);
                    blogArticles = JSON.parse(content);
                    
                    if (!Array.isArray(blogArticles)) {
                         blogArticles = [];
                    }
                    
                    blogArticles.sort((a, b) => new Date(b.date) - new Date(a.date));
                    renderArticlesList();
                    
                    // 如果URL中有文章ID，显示对应的文章
                    const hash = window.location.hash;
                    if (hash) {
                        const articleId = hash.substring(1);
                        showArticle(articleId);
                    }
                } else {
                    document.getElementById('articles-nav').innerHTML = '加载失败: ' + response.status;
                }
            } catch (error) {
                console.error('加载文章失败:', error);
                const nav = document.getElementById('articles-nav');
                if (nav) nav.innerHTML = '加载失败，请检查网络或刷新重试';
            }
        }

        // 渲染文章列表
        function renderArticlesList(articlesToRender) {
            const articlesNav = document.getElementById('articles-nav');
            articlesNav.innerHTML = '';
            
            const listToRender = articlesToRender || blogArticles;
            
            if (listToRender.length === 0) {
                articlesNav.innerHTML = '<p style="color: var(--meta-color); text-align: center; padding: 20px 0;">暂无文章</p>';
                return;
            }

            listToRender.forEach(article => {
                const articleItem = document.createElement('div');
                articleItem.className = 'article-item';
                
                // 检查阅读历史
                const readHistory = JSON.parse(localStorage.getItem('readHistory') || '{}');
                const isRead = readHistory[article.id] ? true : false;
                const readIcon = isRead ? '<span style="color: #4caf50; font-size: 12px; margin-left: 5px;" title="已读">✔️已读</span>' : '';

                articleItem.innerHTML = `
                    <a href="#${article.id}" class="article-link" data-id="${article.id}">
                        <span class="article-item-title">${article.title} ${readIcon}</span>
                        <span class="article-item-date">${article.date}</span>
                    </a>
                `;
                articlesNav.appendChild(articleItem);
            });

            // 添加点击事件监听
            const articleLinks = document.querySelectorAll('.article-link');
            articleLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    
                    // 移除所有 active 状态
                    document.querySelectorAll('.article-link').forEach(a => a.classList.remove('active'));
                    this.classList.add('active');
                    
                    const articleId = this.getAttribute('data-id');
                    showArticle(articleId);
                    
                    // 只有在浏览器支持 history API 时才更新 URL
                    if (window.history && window.history.pushState) {
                        window.history.pushState(null, null, '#' + articleId);
                    } else {
                        window.location.hash = articleId;
                    }
                });
            });
        }

        // 显示文章内容
        function showArticle(articleId) {
            const articleDetail = document.getElementById('article-detail');
            const article = blogArticles.find(a => a.id === articleId);
            
            if (article) {
                articleDetail.innerHTML = `
                    <div class="article-header">
                        <h2 class="article-title">${article.title}</h2>
                        <div class="article-meta">
                            <span class="article-date">发布日期：${article.date}</span>
                            <span class="article-category">分类：${article.category}</span>
                            <!-- 阅读量显示：需要特定的 ID 才能被 Twikoo 识别 -->
                    <span class="article-views">
                        阅读量：<span id="twikoo_visitors" class="twikoo_visitors" data-flag-title="文章阅读量">0</span>
                    </span>
                        </div>
                    </div>
                    <!-- 阅读进度条 -->
                    <div id="read-progress-container" style="width: 100%; height: 4px; background: #eee; position: sticky; top: 80px; z-index: 99; display: none;">
                        <div id="read-progress-bar" style="height: 100%; width: 0%; background: var(--nav-hover); transition: width 0.1s;"></div>
                    </div>
                    <div style="text-align: right; font-size: 12px; color: var(--meta-color); margin-top: 5px; display: none;" id="read-progress-text">阅读进度: 0%</div>
                    
                    <div id="article-content" class="article-content" data-article-id="${articleId}">
                        ${article.content}
                    </div>
                    <div class="article-modify">
                        <p>最后修改日期：<span>${article.modifyDate}</span></p>
                    </div>
                    
                    <!-- 评论区容器 -->
                    <div style="margin-top: 50px; padding-top: 30px; border-top: 1px solid #eee;">
                        <h3>评论区</h3>
                        <div id="twikoo-comments"></div>
                    </div>
                `;
                
                // 动态加载 Twikoo 评论系统，并记录访问量
                loadTwikoo(articleId);
                
                // 渲染文章大纲 (TOC)
                generateTOC();
                
                // 初始化阅读进度监控
                initReadProgress(articleId);
            } else {
                articleDetail.innerHTML = `<h3>文章未找到</h3>`;
            }
        }

        // 生成文章大纲 (TOC)
        function generateTOC() {
            const content = document.getElementById('article-content');
            const tocList = document.getElementById('toc-list');
            if (!content || !tocList) return;

            const headings = content.querySelectorAll('h2, h3');
            tocList.innerHTML = '';

            if (headings.length === 0) {
                tocList.innerHTML = '<li class="toc-item"><span style="color: var(--meta-color); font-size: 14px;">暂无目录</span></li>';
                return;
            }

            headings.forEach((heading, index) => {
                // 给标题添加 id 以便跳转
                const id = `heading-${index}`;
                heading.id = id;

                const li = document.createElement('li');
                li.className = `toc-item toc-${heading.tagName.toLowerCase()}`;

                const a = document.createElement('a');
                a.href = `#${id}`;
                a.textContent = heading.innerText;

                // 平滑滚动
                a.addEventListener('click', (e) => {
                    e.preventDefault();
                    // 考虑 fixed header 的高度
                    const headerHeight = document.querySelector('.header').offsetHeight || 80;
                    const targetPosition = heading.getBoundingClientRect().top + window.scrollY - headerHeight - 20;
                    
                    window.scrollTo({
                        top: targetPosition,
                        behavior: 'smooth'
                    });
                    
                    // 手动更新高亮
                    document.querySelectorAll('.toc-item a').forEach(link => link.classList.remove('active'));
                    a.classList.add('active');
                });

                li.appendChild(a);
                tocList.appendChild(li);
            });
            
            // 默认高亮第一个
            if (tocList.querySelector('a')) {
                tocList.querySelector('a').classList.add('active');
            }
        }

        // 滚动监听 (ScrollSpy)
        window.addEventListener('scroll', () => {
            const content = document.getElementById('article-content');
            if (!content) return;
            
            const headings = content.querySelectorAll('h2, h3');
            if (headings.length === 0) return;

            const headerHeight = document.querySelector('.header').offsetHeight || 80;
            let currentId = '';

            headings.forEach(heading => {
                const rect = heading.getBoundingClientRect();
                // 100 加上 header 高度的容差
                if (rect.top <= headerHeight + 50) {
                    currentId = heading.id;
                }
            });

            // 如果都没有到达顶部，可能在最上面，默认第一个
            if (!currentId && headings.length > 0) {
                currentId = headings[0].id;
            }

            if (currentId) {
                document.querySelectorAll('.toc-item a').forEach(a => {
                    a.classList.remove('active');
                    if (a.getAttribute('href') === `#${currentId}`) {
                        a.classList.add('active');
                    }
                });
            }
            
            // 计算阅读进度
            const articleContent = document.getElementById('article-content');
            const progressBar = document.getElementById('read-progress-bar');
            const progressText = document.getElementById('read-progress-text');
            
            if (articleContent && progressBar && progressText) {
                const rect = articleContent.getBoundingClientRect();
                const windowHeight = window.innerHeight;
                
                // 计算文章内容顶部到视口顶部的距离
                const topDist = -rect.top + headerHeight;
                // 文章总高度减去视口高度，即为可滚动的总距离
                const totalScrollable = rect.height - windowHeight + headerHeight;
                
                let progress = 0;
                
                if (topDist > 0 && totalScrollable > 0) {
                    progress = Math.min(100, Math.max(0, Math.round((topDist / totalScrollable) * 100)));
                } else if (topDist > 0 && totalScrollable <= 0) {
                    // 如果文章很短，一屏就能看完
                    progress = 100;
                }
                
                progressBar.style.width = `${progress}%`;
                progressText.innerText = `阅读进度: ${progress}%`;
                
                // 如果阅读进度达到 90% 以上，标记为已读
                if (progress >= 90) {
                    const articleId = articleContent.getAttribute('data-article-id');
                    markAsRead(articleId);
                }
            }
        });

        // 标记文章为已读
        function markAsRead(articleId) {
            const readHistory = JSON.parse(localStorage.getItem('readHistory') || '{}');
            if (!readHistory[articleId]) {
                readHistory[articleId] = new Date().getTime();
                localStorage.setItem('readHistory', JSON.stringify(readHistory));
                
                // 更新左侧列表的已读图标
                const currentLink = document.querySelector(`.article-link[data-id="${articleId}"]`);
                if (currentLink) {
                    const titleSpan = currentLink.querySelector('.article-item-title');
                    if (titleSpan && !titleSpan.innerHTML.includes('✔️已读')) {
                        titleSpan.innerHTML += ' <span style="color: #4caf50; font-size: 12px; margin-left: 5px;" title="已读">✔️已读</span>';
                    }
                }
            }
        }
        
        // 初始化阅读进度显示
        function initReadProgress(articleId) {
            const progressContainer = document.getElementById('read-progress-container');
            const progressText = document.getElementById('read-progress-text');
            const progressBar = document.getElementById('read-progress-bar');
            
            if (progressContainer && progressText && progressBar) {
                progressContainer.style.display = 'block';
                progressText.style.display = 'block';
                progressBar.style.width = '0%';
                progressText.innerText = '阅读进度: 0%';
                
                // 触发一次滚动事件以初始化短文章的进度
                window.dispatchEvent(new Event('scroll'));
            }
        }

        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', () => {
            loadArticles().then(() => {
                // 处理 URL 参数，支持分类过滤
                const urlParams = new URLSearchParams(window.location.search);
                const categoryFilter = urlParams.get('category');
                
                if (categoryFilter) {
                    // 更新分类按钮状态
                    document.querySelectorAll('.filter-btn').forEach(btn => {
                        if (btn.getAttribute('data-category') === categoryFilter) {
                            btn.click(); // 触发点击事件来处理过滤逻辑
                        }
                    });
                }
            }).catch(error => {
                console.error("加载文章列表失败:", error);
            });
            
            // 分类筛选功能实现
            const filterBtns = document.querySelectorAll('.filter-btn');
            filterBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    // 更新按钮样式
                    filterBtns.forEach(b => {
                        b.style.background = 'transparent';
                        b.style.color = 'var(--text-color)';
                        b.classList.remove('active');
                    });
                    this.style.background = 'var(--nav-hover)';
                    this.style.color = 'white';
                    this.classList.add('active');

                    // 过滤文章
                    const category = this.getAttribute('data-category');
                    const searchInput = document.getElementById('search-input');
                    const keyword = searchInput ? searchInput.value.toLowerCase().trim() : '';
                    
                    let filtered = blogArticles;
                    
                    // 1. 先按分类过滤
                    if (category !== 'all') {
                        filtered = filtered.filter(article => article.category === category);
                    }
                    
                    // 2. 再按搜索框过滤（如果有输入的话）
                    if (keyword) {
                        filtered = filtered.filter(article => {
                            const titleMatch = article.title.toLowerCase().includes(keyword);
                            const contentText = article.content.replace(/<[^>]+>/g, '').toLowerCase();
                            const contentMatch = contentText.includes(keyword);
                            return titleMatch || contentMatch;
                        });
                    }
                    
                    renderArticlesList(filtered);
                });
            });

            // 搜索功能实现
            const searchInput = document.getElementById('search-input');
            if (searchInput) {
                searchInput.addEventListener('input', function(e) {
                    const keyword = e.target.value.toLowerCase().trim();
                    
                    // 获取当前激活的分类
                    const activeFilter = document.querySelector('.filter-btn.active');
                    const category = activeFilter ? activeFilter.getAttribute('data-category') : 'all';
                    
                    let filtered = blogArticles;
                    
                    // 1. 先按当前分类过滤
                    if (category !== 'all') {
                        filtered = filtered.filter(article => article.category === category);
                    }
                    
                    // 2. 再按关键字过滤
                    if (keyword) {
                        filtered = filtered.filter(article => {
                            const titleMatch = article.title.toLowerCase().includes(keyword);
                            const contentText = article.content.replace(/<[^>]+>/g, '').toLowerCase();
                            const contentMatch = contentText.includes(keyword);
                            return titleMatch || contentMatch;
                        });
                    }
                    
                    renderArticlesList(filtered);
                });
            }
        });

    </script>
    
    <!-- 悬浮快捷菜单 -->
    <div class="floating-menu">
        <button class="floating-btn main-btn" id="floating-main-btn" aria-label="快捷菜单">🤖</button>
        <div class="floating-actions">
            <button class="floating-btn action-btn" id="float-top-btn" aria-label="返回顶部" title="返回顶部">⬆️</button>
            <button class="floating-btn action-btn" id="float-random-btn" aria-label="随机阅读" title="随机阅读">🎲</button>
            <button class="floating-btn action-btn" id="float-theme-btn" aria-label="切换主题" title="切换主题">🌙</button>
        </div>
    </div>

    <!-- Twikoo 初始化脚本 -->
    <script>
        function loadTwikoo(articleId) {
            // 给容器一点时间渲染到 DOM 中
            setTimeout(() => {
                const container = document.getElementById('twikoo-comments');
                if (!container) {
                    console.error('Twikoo 容器未找到');
                    return;
                }

                // 每次切换文章时，先清空之前的评论内容，让 Twikoo 重新渲染
                container.innerHTML = '';

                // 初始化 Twikoo 实例
                twikoo.init({
                    envId: 'https://twikoo.aoiblog.top', 
                    el: '#twikoo-comments', // 评论容器
                    path: articleId,        // 关键：用文章 ID 区分不同文章的评论
                    lang: 'zh-CN',          // 设置语言
                });
            }, 100);
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
