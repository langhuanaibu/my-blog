name: Objectivity Acceptance

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: news-pipeline/requirements.txt

      - name: Install dependencies
        run: pip install --require-hashes -r news-pipeline/requirements.txt

      - name: Evaluate fixed objectivity corpus
        shell: bash
        run: |
          set -o pipefail
          python news-pipeline/objectivity_eval.py \
            | tee "${RUNNER_TEMP}/objectivity-acceptance.json"

      - name: Upload acceptance report
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: objectivity-acceptance
          path: ${{ runner.temp }}/objectivity-acceptance.json
          if-no-files-found: warn
          retention-days: 14
