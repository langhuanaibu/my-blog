# 每日新闻日报：定时生成数据并推送上线
#
# - cron 为 UTC 时间，23:00 UTC = 北京 07:00（GitHub 高峰期可能延迟 15-60 分钟）
# - 需要仓库 Secret: LLM_API_KEY（Settings -> Secrets and variables -> Actions）
# - 手动补跑：Actions 页面选本 workflow -> Run workflow
# - 本 workflow 是 CLAUDE.md「严禁自动 push」规则的唯一例外，
#   仅允许提交 source/news/data/ 路径，脚本内置数据校验，校验失败则不提交。
name: Daily News Briefing

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-news
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: Asia/Shanghai
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: news-pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r news-pipeline/requirements.txt

      - name: Check LLM API connectivity (diagnostic)
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          echo "--- DNS ---"
          getent hosts api.deepseek.com || echo "DNS resolution FAILED"
          echo "--- HTTPS ---"
          curl -sS -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n" --max-time 20 \
            -H "Authorization: Bearer $LLM_API_KEY" \
            https://api.deepseek.com/v1/models || echo "curl FAILED with exit $?"

      - name: Generate daily briefing
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          DATA_DIR: ${{ github.workspace }}/source/news/data
        run: python news-pipeline/daily_news.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add source/news/data
          if git diff --cached --quiet; then
            echo "No data changes, skip commit."
            exit 0
          fi
          git commit -m "Update daily briefing data ($(date +%F))"
          git pull --rebase origin main
          git push
