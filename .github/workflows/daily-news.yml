# 每日新闻日报：定时生成数据并推送上线
#
# - cron 为 UTC 时间，23:00 UTC = 北京 07:00（GitHub 高峰期可能延迟 15-60 分钟）
# - 需要仓库 Secret: LLM_API_KEY（Settings -> Secrets and variables -> Actions）
#   自建 RSSHub 源需再加两个 Secret: RSSHUB_BASE（实例地址）、RSSHUB_KEY（ACCESS_KEY）
# - 手动补跑：Actions 页面选本 workflow -> Run workflow
# - 本 workflow 是 CLAUDE.md「严禁自动 push」规则的唯一例外，
#   仅允许提交 source/news/data/ 路径，脚本内置数据校验，校验失败则不提交。
name: Daily News Briefing

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: daily-news
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    env:
      TZ: Asia/Shanghai
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: news-pipeline/requirements.txt

      - name: Install dependencies
        run: pip install --require-hashes -r news-pipeline/requirements.txt

      - name: Generate daily briefing
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          RSSHUB_BASE: ${{ secrets.RSSHUB_BASE }}
          RSSHUB_KEY: ${{ secrets.RSSHUB_KEY }}
          DATA_DIR: ${{ github.workspace }}/source/news/data
          ROLLOUT_EVIDENCE_PATH: ${{ runner.temp }}/rollout-evidence.json
        run: python news-pipeline/daily_news.py

      - name: Upload rollout evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: rollout-evidence
          path: ${{ runner.temp }}/rollout-evidence.json
          if-no-files-found: warn
          retention-days: 3

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add source/news/data
          if git diff --cached --quiet; then
            echo "No data changes, skip commit."
            exit 0
          fi
          git commit -m "Update daily briefing data ($(date +%F))"
          git pull --rebase origin main
          git push

  shadow:
    needs: generate
    if: ${{ needs.generate.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 24
    continue-on-error: true
    permissions:
      contents: read
    env:
      TZ: Asia/Shanghai
      SHADOW_STATUS_PATH: /tmp/daily-news-shadow-status.json
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: news-pipeline/requirements.txt

      - name: Install dependencies
        run: pip install --require-hashes -r news-pipeline/requirements.txt

      - name: Run objectivity shadow
        id: shadow_run
        continue-on-error: true
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          RSSHUB_BASE: ${{ secrets.RSSHUB_BASE }}
          RSSHUB_KEY: ${{ secrets.RSSHUB_KEY }}
          DATA_DIR: ${{ github.workspace }}/source/news/data
        run: python news-pipeline/daily_news.py --objectivity-shadow

      - name: Record shadow status
        if: ${{ always() }}
        env:
          SHADOW_OUTCOME: ${{ steps.shadow_run.outcome }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          outcome = os.environ.get("SHADOW_OUTCOME") or "not_run"
          target = Path(os.environ["SHADOW_STATUS_PATH"])
          target.write_text(
              json.dumps({"outcome": outcome}, separators=(",", ":")) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload shadow status
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: shadow-status
          path: ${{ env.SHADOW_STATUS_PATH }}
          if-no-files-found: error
          retention-days: 3

  rollout-review:
    needs: [generate, shadow]
    if: ${{ always() }}
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      contents: read
      issues: write
    env:
      TZ: Asia/Shanghai
      REVIEW_DIR: /tmp/daily-news-rollout-review
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check rollout issue
        id: issue
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python news-pipeline/issue_ledger.py check-open --issue 15

      - name: Download rollout evidence
        if: ${{ steps.issue.outputs.open == 'true' }}
        continue-on-error: true
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: rollout-evidence
          path: ${{ env.REVIEW_DIR }}/rollout-evidence

      - name: Download shadow status
        if: ${{ steps.issue.outputs.open == 'true' }}
        continue-on-error: true
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: shadow-status
          path: ${{ env.REVIEW_DIR }}/shadow-status

      - name: Prepare rollout review
        id: prepare
        if: ${{ steps.issue.outputs.open == 'true' }}
        env:
          GENERATE_RESULT: ${{ needs.generate.result }}
          EVIDENCE_PATH: ${{ env.REVIEW_DIR }}/rollout-evidence/rollout-evidence.json
          SHADOW_STATUS_PATH: ${{ env.REVIEW_DIR }}/shadow-status/shadow-status.json
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime
          from pathlib import Path
          from zoneinfo import ZoneInfo

          evidence = Path(os.environ["EVIDENCE_PATH"])
          generate_result = os.environ.get("GENERATE_RESULT", "failure")
          publication = "success"
          reason = ""
          judge_ready = generate_result == "success" and evidence.is_file()
          if generate_result != "success":
              publication = "failure"
              reason = f"generate job {generate_result}"
          elif not evidence.is_file():
              publication = "failure"
              reason = "rollout evidence artifact missing"

          shadow_outcome = "failure"
          try:
              status = json.loads(Path(os.environ["SHADOW_STATUS_PATH"]).read_text(
                  encoding="utf-8"))
              if status.get("outcome") == "success":
                  shadow_outcome = "success"
          except (OSError, TypeError, ValueError):
              pass

          outputs = {
              "date": datetime.now(ZoneInfo("Asia/Shanghai")).date().isoformat(),
              "judge_ready": str(judge_ready).lower(),
              "publication": publication,
              "publication_reason": reason,
              "shadow_outcome": shadow_outcome,
          }
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as handle:
              for name, value in outputs.items():
                  handle.write(f"{name}={value}\n")
          PY

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        id: setup
        if: ${{ steps.issue.outputs.open == 'true' && steps.prepare.outputs.judge_ready == 'true' }}
        continue-on-error: true
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: news-pipeline/requirements.txt

      - name: Install review dependencies
        id: install
        if: ${{ steps.issue.outputs.open == 'true' && steps.prepare.outputs.judge_ready == 'true' && steps.setup.outcome == 'success' }}
        continue-on-error: true
        run: pip install --require-hashes -r news-pipeline/requirements.txt

      - name: Evaluate rollout
        id: judge
        if: ${{ steps.issue.outputs.open == 'true' && steps.prepare.outputs.judge_ready == 'true' && steps.setup.outcome == 'success' && steps.install.outcome == 'success' }}
        continue-on-error: true
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          SHADOW_OUTCOME: ${{ steps.prepare.outputs.shadow_outcome }}
          EVIDENCE_PATH: ${{ env.REVIEW_DIR }}/rollout-evidence/rollout-evidence.json
          REPORT_PATH: ${{ env.REVIEW_DIR }}/rollout-report.json
        run: |
          python news-pipeline/rollout_validation.py \
            --evidence "$EVIDENCE_PATH" \
            --shadow-outcome "$SHADOW_OUTCOME" \
            --output "$REPORT_PATH"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report = json.loads(Path(os.environ["REPORT_PATH"]).read_text(encoding="utf-8"))
          statuses = {
              report.get("selection", {}).get("status"),
              report.get("trajectory", {}).get("status"),
          }
          if "needs_review" in statuses:
              print("::warning::Rollout Judge needs review; the Issue ledger will record it.")
          PY

      - name: Update rollout issue ledger
        id: ledger
        if: ${{ always() && steps.issue.outputs.open == 'true' }}
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPORT_PATH: ${{ env.REVIEW_DIR }}/rollout-report.json
          REVIEW_DATE: ${{ steps.prepare.outputs.date }}
          PUBLICATION: ${{ steps.prepare.outputs.publication }}
          PUBLICATION_REASON: ${{ steps.prepare.outputs.publication_reason }}
        run: |
          python news-pipeline/issue_ledger.py sync \
            --issue 15 \
            --date "$REVIEW_DATE" \
            --publication "$PUBLICATION" \
            --publication-reason "$PUBLICATION_REASON" \
            --report "$REPORT_PATH" \
            --run-id "${{ github.run_id }}" \
            --run-attempt "${{ github.run_attempt }}" \
            --sha "${{ github.sha }}"

      - name: Warn on review failure
        if: ${{ always() && (steps.issue.outcome == 'failure' || steps.setup.outcome == 'failure' || steps.install.outcome == 'failure' || steps.judge.outcome == 'failure' || steps.ledger.outcome == 'failure') }}
        run: echo "::warning::Rollout review or Issue ledger update failed; publication was not blocked."
